<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | طريقة البطل (الكيرف البسيط)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #FAFAFA; --dark: #1A1A1A; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* منطقة الترس بالكيرف البسيط (طريقة البطل) */
        .hero-viewport {
            position: relative; height: 180px; width: 100%;
            display: flex; justify-content: center; overflow: hidden;
            background: #fff; padding-top: 85px; touch-action: none;
        }

        .hero-gear {
            position: absolute; 
            top: 110px; /* رفع المركز لجعل الكيرف مسطح أكثر */
            width: 1200px; height: 1200px; /* قطر عملاق لجعل الانحناء بسيط جداً */
            border-radius: 50%; will-change: transform;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 80px; display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.3s;
        }

        .cat-img-wrapper {
            width: 65px; height: 65px; border-radius: 50%;
            overflow: hidden; border: 2px solid transparent;
            background: #f9f9f9; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        .cat-img-wrapper img { width: 85%; height: 85%; object-fit: contain; }

        .hero-cat-item.active .cat-img-wrapper { 
            background: #fff; border-color: var(--gold); transform: scale(1.15) translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .hero-cat-item span { font-size: 11px; font-weight: 700; color: #999; margin-top: 8px; transition: 0.3s; }
        .hero-cat-item.active span { color: #4CAF50; font-weight: 900; } /* أخضر مثل الصورة */

        /* المؤشر السفلي الصغير */
        .hero-indicator {
            position: absolute; top: 172px; width: 25px; height: 4px;
            background: #4CAF50; border-radius: 10px; z-index: 10;
        }

        /* المدخلات في السلة */
        .user-input {
            width: 100%; background: #f9f9f9; border: 1px solid #eee;
            padding: 14px 18px; border-radius: 15px; margin-bottom: 12px;
            outline: none; font-size: 14px; text-align: right;
            display: block; transition: 0.3s;
        }

        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 2000; padding: 25px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.2);
            overflow-y: auto; text-align: right;
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-lg font-black">إبن سوريا</h1>
        <div class="bg-black text-white px-5 py-2 rounded-2xl flex gap-2 items-center cursor-pointer" onclick="toggleCart(true)">
            <i class="fa-solid fa-cart-shopping text-sm"></i>
            <span id="badge" class="font-bold">0</span>
        </div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="hero-indicator"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="px-6 py-4">
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black">طلبك الآن</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>
        <div id="cart-items" class="space-y-4 mb-8"></div>
        <div class="border-t pt-6">
            <div class="flex justify-between mb-6 font-black text-lg">
                <span>الإجمالي</span>
                <span id="total-price" class="text-gold">0 ج.م</span>
            </div>
            <div class="space-y-3 mb-6">
                <input type="text" id="user-name" class="user-input" placeholder="الاسم بالكامل">
                <input type="tel" id="user-phone" class="user-input" placeholder="رقم الهاتف">
                <input type="text" id="user-addr" class="user-input" placeholder="عنوان التوصيل">
            </div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 rounded-xl font-bold active:scale-95 transition">إرسال الطلب</button>
        </div>
    </div>

    <script>
        const categories = [
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'السندوتشات', img: 'https://cdn-icons-png.flaticon.com/512/2362/2362253.png' },
            { name: 'مكرونات', img: 'https://cdn-icons-png.flaticon.com/512/1046/1046784.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/606/606305.png' }
        ];

        const products = [
            { id: 1, name: 'برجر كلاسيكي', price: 120, img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { id: 2, name: 'بيتزا مارجريتا', price: 260, img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' }
        ];

        let cart = [];
        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');
        const step = 6; // زاوية صغيرة جداً لتقريب الأيقونات من بعضها (Step صغير = مسافة قريبة)

        function initHeroGear() {
            const radius = 600; // قطر كبير لجعل الكيرف مسطح
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<div class="cat-img-wrapper"><img src="${cat.img}"></div><span>${cat.name}</span>`;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        let startRot = 0;

        hammer.on("panstart", () => startRot = gearRotation);
        hammer.on("panmove", (e) => {
            let targetRot = startRot + (e.deltaX * 0.1); // حساسية أبطأ لتناسب المسافات القريبة
            const minRot = - (categories.length - 1) * step;
            if (targetRot > 0) targetRot *= 0.2;
            if (targetRot < minRot) targetRot = minRot + (targetRot - minRot) * 0.2;
            gearRotation = targetRot;
            applyRotation(gearRotation);
        });

        hammer.on("panend", () => {
            const minRot = - (categories.length - 1) * step;
            let finalRot = Math.round(gearRotation / step) * step;
            if (finalRot > 0) finalRot = 0;
            if (finalRot < minRot) finalRot = minRot;

            gsap.to(window, { duration: 0.5, onUpdate: () => {
                gearRotation += (finalRot - gearRotation) * 0.2;
                applyRotation(gearRotation);
            }, onComplete: () => {
                gearRotation = finalRot;
                updateActive(Math.abs(finalRot / step));
            }, ease: "power2.out"});
        });

        function applyRotation(rot) {
            gear.style.transform = `rotate(${rot}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(item => {
                gsap.set(item.querySelector('.cat-img-wrapper'), { rotation: -rot });
                gsap.set(item.querySelector('span'), { rotation: -rot });
            });
        }

        function updateActive(idx) {
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === idx));
            renderFood();
        }

        function renderFood() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="food-card p-4 bg-white rounded-[2rem] border border-gray-100 shadow-sm">
                        <img src="${p.img}" class="w-24 h-24 mx-auto mb-3" id="img-${p.id}">
                        <h3 class="font-bold text-sm">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="font-black text-xs">${p.price} ج.م</span>
                            <div class="w-8 h-8 bg-black text-white rounded-lg flex items-center justify-center cursor-pointer" onclick="addToCart(event, ${p.id})">+</div>
                        </div>
                    </div>`;
            });
        }

        function addToCart(e, id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('badge').innerText = cart.length;
            updateCartUI();
            
            // انيميشن بسيط جداً
            gsap.from(e.target, { scale: 1.5, duration: 0.2 });
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                    <span class="font-bold text-xs">${item.name}</span>
                    <span class="font-black text-xs text-gold">${item.price} ج.م</span>
                </div>`;
            });
            document.getElementById('total-price').innerText = total + ' ج.م';
        }

        function toggleCart(show) { document.getElementById('cart-panel').style.left = show ? '0' : '-100%'; }

        function checkout() {
            const n = document.getElementById('user-name').value;
            const p = document.getElementById('user-phone').value;
            if(!n || !p) return alert('أكمل بياناتك يا بطل!');
            alert('تم استلام طلبك يا بطل!');
        }

        window.onload = initHeroGear;
    </script>
</body>
</html>
