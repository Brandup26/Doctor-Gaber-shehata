<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | محاكاة التصميم الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }

        /* منطقة الهيدر كما في الصورة */
        .header-section { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .logo-area { font-weight: 900; font-size: 18px; }
        .logo-area span { color: var(--gold); }

        /* منطقة الأنبوبة الدائرية - محاكاة دقيقة */
        .hero-viewport {
            position: relative; height: 350px; width: 100%;
            background: #fff; overflow: hidden; display: flex; justify-content: center;
            touch-action: none;
        }

        /* الخط المنقط الدائري كما في الصورة */
        .dashed-path {
            position: absolute; top: 160px; width: 520px; height: 520px;
            border: 1.5px dashed rgba(0,0,0,0.1); border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        /* الكيرف السفلي المتقاطع مع كروت المنتجات */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -80px; left: -10%;
            width: 120%; height: 150px; background: var(--bg);
            border-top-left-radius: 50% 120px; border-top-right-radius: 50% 120px; z-index: 10;
        }

        /* محرك الأقسام */
        .category-gear {
            position: absolute; top: 160px; width: 580px; height: 580px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .cat-item {
            position: absolute; top: 50%; left: 50%; width: 100px;
            margin-left: -50px; margin-top: -50px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* إطار الصورة الدائري */
        .img-container {
            width: 80px; height: 80px; border-radius: 50%;
            background: #fff; border: 2.5px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cat-item.active .img-container { 
            border-color: #82b440; /* اللون الأخضر كما في الصورة المرفقة */
            transform: scale(1.15) translateY(-10px); 
        }
        .img-container img { width: 85%; height: 85%; object-fit: contain; }

        .cat-item span { font-size: 12px; margin-top: 10px; color: #999; font-weight: 700; transition: 0.3s; }
        .cat-item.active span { color: #82b440; font-weight: 900; }

        /* منطقة المنتجات والكروت */
        .food-grid { padding: 20px; position: relative; z-index: 20; margin-top: -70px; }
        .product-card {
            background: #fff; border-radius: 25px; padding: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.04); transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="logo-area">ليالي <span>الشام</span></div>
        <div class="text-sm font-bold">1200</div>
    </div>

    <div class="hero-viewport" id="slider-box">
        <div class="dashed-path"></div>
        <div id="gear" class="category-gear"></div>
    </div>

    <main class="food-grid">
        <h2 id="cat-name" class="text-3xl font-black mb-8 text-center text-gray-800">بيتزا</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="product-card">
                <img src="https://i.ibb.co/VWhpYp4/pizza-slice.png" class="w-full h-32 object-contain mb-4">
                <h3 class="font-black text-sm text-center">بيتزا المارغريتا</h3>
                <div class="flex justify-center items-center mt-3 gap-2">
                    <span class="text-xs text-gray-400">1256 🔥</span>
                </div>
            </div>
            <div class="product-card">
                <img src="https://i.ibb.co/VWhpYp4/pizza-slice.png" class="w-full h-32 object-contain mb-4">
                <h3 class="font-black text-sm text-center">بيتزا البيبروني</h3>
                <div class="flex justify-center items-center mt-3 gap-2">
                    <span class="text-xs text-gray-400">1256 🔥</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const categories = [
            { name: 'السندوتشات', img: 'https://i.ibb.co/7Xp9p9p/shawarma.png' },
            { name: 'بيتزا', img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' },
            { name: 'برجر', img: 'https://i.ibb.co/vX8p5vX/burger.png' },
            { name: 'مشويات', img: 'https://i.ibb.co/MSX9p9p/grill.png' }
        ];

        const gear = document.getElementById('gear');
        const step = 38; // تقارب الأقسام كما طلبت
        let currentRot = -38; // البداية من القسم الثاني (بيتزا) كما في الصورة

        categories.forEach((cat, i) => {
            const div = document.createElement('div');
            div.className = `cat-item ${i === 1 ? 'active' : ''}`; // البيتزا هي النشطة في الصورة
            const angle = i * step;
            
            const x = 280 * Math.sin(angle * Math.PI / 180);
            const y = -280 * Math.cos(angle * Math.PI / 180);
            
            div.style.transform = `translate(${x}px, ${y}px)`;
            div.innerHTML = `<div class="img-container"><img src="${cat.img}"></div><span>${cat.name}</span>`;
            gear.appendChild(div);
        });

        // تطبيق الدوران الأولي
        gsap.set(gear, { rotation: -step });
        updateNodes(-step);

        const mc = new Hammer(document.getElementById('slider-box'));
        mc.on("pan", (e) => {
            const drag = currentRot + (e.deltaX / 6);
            gsap.set(gear, { rotation: drag });
            updateNodes(drag);
        });

        mc.on("panend", (e) => {
            const velocity = e.velocityX * 12;
            currentRot = Math.round((currentRotation() + velocity) / step) * step;

            const min = -(categories.length - 1) * step;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < min) currentRot = min;

            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.6, 
                ease: "power2.out",
                onUpdate: () => updateNodes(gsap.getProperty(gear, "rotation"))
            });

            const idx = Math.abs(currentRot / step);
            document.querySelectorAll('.cat-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('cat-name').innerText = categories[idx].name;
        });

        function currentRotation() { return gsap.getProperty(gear, "rotation"); }

        function updateNodes(r) {
            document.querySelectorAll('.cat-item').forEach(n => {
                gsap.set(n.querySelector('.img-container'), { rotation: -r });
                gsap.set(n.querySelector('span'), { rotation: -r });
            });
        }
    </script>
</body>
</html>
