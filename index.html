<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Food Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-right">
            <div class="menu-icon"><i class="fa-solid fa-bars"></i></div>
            <div class="cart-icon"><i class="fa-solid fa-shopping-bag"></i></div>
        </div>
        <div class="header-left">
            <div class="restaurant-info">
                <h3>مطعمك</h3>
                <p>الاسكندرية ميامي</p>
            </div>
            <img src="https://via.placeholder.com/50" alt="Logo" class="logo-img">
        </div>
    </header>

    <main class="app-container">
        
        <section class="hero-text">
            <h1>طعم لذيذ ؟<br>اطلب الان</h1>
        </section>

        <section class="circular-layer red-layer">
            <div class="layer-content">
                <div class="category-grid">
                    <div class="cat-item small">
                        <div class="circle-img"><img src="https://i.ibb.co/VvM6p7h/pasta.png" alt="باستا"></div>
                        <span>باستا</span>
                    </div>
                    <div class="cat-item large">
                        <div class="circle-img"><img src="https://i.ibb.co/mS7zZ3S/burger.png" alt="برجر"></div>
                        <span>برجر</span>
                    </div>
                    <div class="cat-item small">
                        <div class="circle-img"><img src="https://i.ibb.co/L5M4f4B/soup.png" alt="شوربة"></div>
                        <span>الشوربة</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="circular-layer pink-layer">
            <div class="products-container">
                <div class="product-featured">
                    <img src="https://i.ibb.co/mS7zZ3S/burger.png" alt="تشكن برجر">
                    <div class="product-info">
                        <h4>تشكن برجر</h4>
                        <span class="price">350 ج.م</span>
                    </div>
                </div>
                
                <div class="side-product left">
                    <img src="https://i.ibb.co/mS7zZ3S/burger.png" alt="side">
                </div>
                <div class="side-product right">
                    <img src="https://i.ibb.co/mS7zZ3S/burger.png" alt="side">
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
