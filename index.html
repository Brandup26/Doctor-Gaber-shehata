<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Food Menu - Fix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="nav-right"><i class="fa-solid fa-bars"></i> <i class="fa-solid fa-shopping-bag"></i></div>
        <div class="nav-left">
            <div class="brand-text"><h3>مطعمك</h3><p>الاسكندرية ميامي</p></div>
            <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="mini-logo">
        </div>
    </header>

    <div class="hero-text">
        <h1>طعم لذيذ ؟<br>اطلب الان</h1>
    </div>

    <div class="section red-section">
        <div class="category-wrapper">
            <div class="cat"><div class="circle"><img src="https://i.ibb.co/VvM6p7h/pasta.png"></div><span>باستا</span></div>
            <div class="cat main"><div class="circle border"><img src="https://i.ibb.co/mS7zZ3S/burger.png"></div><span>برجر</span></div>
            <div class="cat"><div class="circle"><img src="https://i.ibb.co/L5M4f4B/soup.png"></div><span>الشوربة</span></div>
        </div>
        
        <div class="section pink-section">
            <div class="product-featured">
                <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="hero-burger">
                <div class="price-tag">
                    <h2>تشكن برجر</h2>
                    <p>350 ج.م</p>
                </div>
            </div>
            <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="side-burger left">
            <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="side-burger right">
        </div>
    </div>

</body>
</html>
