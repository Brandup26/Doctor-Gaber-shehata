<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | الأقسام الانسيابية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root { --brand-gold: #D4AF37; --bg-light: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg-light); overflow-x: hidden; }

        /* منطقة الأنبوبة الدائرية المحدثة */
        .tube-hero {
            position: relative; height: 320px; width: 100%;
            background: #fff; overflow: hidden; display: flex; justify-content: center;
        }

        /* كيرف علوي وسفلي متوازيين 100% كما طلبت سابقاً */
        .tube-edge {
            position: absolute; width: 650px; height: 650px;
            border-radius: 50%; z-index: 10; pointer-events: none;
        }
        .edge-top { top: -410px; border-bottom: 1.5px dashed rgba(0,0,0,0.08); }
        .edge-bottom { 
            bottom: -410px; background: var(--bg-light); 
            border-top: 1.5px dashed rgba(0,0,0,0.1);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.03);
        }

        /* محرك الدوران (Gear) */
        .gear-container {
            position: absolute; top: 180px; width: 650px; height: 650px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .cat-node {
            position: absolute; top: 50%; left: 50%; width: 85px;
            margin-left: -42.5px; margin-top: -42.5px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* تصميم الصورة الحقيقية */
        .img-frame {
            width: 70px; height: 70px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.07);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cat-node.active .img-frame { 
            border-color: var(--brand-gold); 
            transform: scale(1.2) translateY(-8px); 
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }
        .img-frame img { width: 85%; height: 85%; object-fit: contain; }

        .cat-node span { font-size: 11px; margin-top: 8px; color: #aaa; font-weight: 700; }
        .cat-node.active span { color: #111; font-weight: 900; }

        /* منطقة المنتجات */
        .product-section { position: relative; z-index: 20; margin-top: -60px; padding: 20px; }
    </style>
</head>
<body>

    <div class="tube-hero" id="touch-area">
        <div class="tube-edge edge-top"></div>
        <div id="gear" class="gear-container"></div>
        <div class="tube-edge edge-bottom"></div>
    </div>

    <main class="product-section">
        <h2 id="active-title" class="text-2xl font-black mb-6 text-center">المشويات</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-[25px] shadow-sm">
                <div class="w-full h-28 bg-gray-100 rounded-2xl mb-3"></div>
                <div class="h-4 w-3/4 bg-gray-100 rounded mb-2"></div>
                <div class="flex justify-between items-center"><b class="text-amber-600">120ج</b><button class="bg-black text-white px-3 py-1 rounded-full text-xs">+</button></div>
            </div>
            <div class="bg-white p-4 rounded-[25px] shadow-sm">
                <div class="w-full h-28 bg-gray-100 rounded-2xl mb-3"></div>
                <div class="h-4 w-3/4 bg-gray-100 rounded mb-2"></div>
                <div class="flex justify-between items-center"><b class="text-amber-600">150ج</b><button class="bg-black text-white px-3 py-1 rounded-full text-xs">+</button></div>
            </div>
        </div>
    </main>

    <script>
        const categories = [
            { name: 'مشويات', img: 'https://i.ibb.co/MSX9p9p/grill.png' },
            { name: 'شاورما', img: 'https://i.ibb.co/7Xp9p9p/shawarma.png' },
            { name: 'بيتزا', img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' },
            { name: 'برجر', img: 'https://i.ibb.co/vX8p5vX/burger.png' },
            { name: 'مقبلات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' }
        ];

        const gear = document.getElementById('gear');
        const stepAngle = 32; // تقليل الزاوية من 40 إلى 32 لجعل الأقسام "أقرب لبعضها" كما طلبت
        let currentRot = 0;

        // بناء الأقسام
        categories.forEach((cat, i) => {
            const node = document.createElement('div');
            node.className = `cat-node ${i === 0 ? 'active' : ''}`;
            const angle = i * stepAngle;
            
            // توزيع الأقسام على نصف قطر 325px
            const x = 325 * Math.sin(angle * Math.PI / 180);
            const y = -325 * Math.cos(angle * Math.PI / 180);
            
            node.style.transform = `translate(${x}px, ${y}px)`;
            node.innerHTML = `<div class="img-frame"><img src="${cat.img}"></div><span>${cat.name}</span>`;
            gear.appendChild(node);
        });

        // استخدام Hammer.js لتحكم فائق السلاسة
        const mc = new Hammer(document.getElementById('touch-area'));
        mc.on("pan", (e) => {
            // إضافة معامل تباطؤ خفيف للمسة
            const dragPos = currentRot + (e.deltaX / 6);
            gsap.set(gear, { rotation: dragPos });
            
            // تعديل دوران العناصر الداخلية لتبقى معدولة أثناء السحب
            document.querySelectorAll('.cat-node').forEach(n => {
                gsap.set(n.querySelector('.img-frame'), { rotation: -dragPos });
                gsap.set(n.querySelector('span'), { rotation: -dragPos });
            });
        });

        mc.on("panend", (e) => {
            // حساب "القوة الدافعة" (Inertia) بناءً على سرعة السحب لزيادة السلاسة
            const velocity = e.velocityX * 10;
            currentRot = Math.round((currentRot + velocity) / stepAngle) * stepAngle;

            // ضبط الحدود
            const min = -(categories.length - 1) * stepAngle;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < min) currentRot = min;

            // استخدام خاصية Elastic out لحركة مطاطية ناعمة جداً
            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.8, 
                ease: "power3.out",
                onUpdate: () => {
                    const r = gsap.getProperty(gear, "rotation");
                    document.querySelectorAll('.cat-node').forEach(n => {
                        gsap.set(n.querySelector('.img-frame'), { rotation: -r });
                        gsap.set(n.querySelector('span'), { rotation: -r });
                    });
                }
            });

            const activeIdx = Math.abs(currentRot / stepAngle);
            document.querySelectorAll('.cat-node').forEach((n, i) => n.classList.toggle('active', i === activeIdx));
            document.getElementById('active-title').innerText = categories[activeIdx].name;
        });
    </script>
</body>
</html>
