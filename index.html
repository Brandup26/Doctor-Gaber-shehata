<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | التصميم المتكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #f3f4f6; --dark: #1A1A1A; --active-green: #89B42D; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
        }

        .cart-box { background: var(--dark); color: white; padding: 10px 22px; border-radius: 20px; position: relative; cursor: pointer; }

        /* منطقة الأقسام مع الكيرف الداخلي المطلوب */
        .hero-section {
            position: relative;
            background: white; 
            padding-top: 80px;
            overflow: hidden;
            /* الكيرف الداخلي ناحية الأصناف (أسفل منطقة الأقسام) */
            border-bottom-left-radius: 50% 40px;
            border-bottom-right-radius: 50% 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .hero-viewport {
            position: relative; height: 260px; width: 100%;
            display: flex; justify-content: center; touch-action: none;
        }

        .hero-gear {
            position: absolute; top: 180px;
            width: 600px; height: 600px;
            border-radius: 50%; will-change: transform;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 90px; height: 110px; margin-left: -45px; margin-top: -45px;
            display: flex; flex-direction: column; align-items: center;
        }

        .hero-cat-item span { 
            position: absolute; top: -30px;
            font-size: 13px; font-weight: 700; color: #aaa; transition: 0.3s;
        }
        .hero-cat-item.active span { color: var(--active-green); font-weight: 900; transform: scale(1.1); }

        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%;
            background: white; overflow: hidden; border: 2.5px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.07); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hero-cat-item.active .cat-img-wrapper { transform: scale(1.25); border-color: var(--active-green); }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }

        /* منطقة المنتجات تظهر خلف الكيرف */
        .content-area { 
            position: relative; z-index: 5; 
            padding: 40px 20px 100px; 
            margin-top: -20px; /* لدمجها مع كيرف الأقسام */
        }
        
        .food-card { background: white; border-radius: 28px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; transition: 0.3s; }
        .food-card:active { transform: scale(0.97); }

        /* بانل السلة الثابت */
        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 2000; padding: 25px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); text-align: right;
        }

        .user-input { width: 100%; background: #f8f8f8; padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #eee; outline: none; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-xl font-black tracking-tighter">إبن سوريا <span class="text-gold">.</span></h1>
        <div class="cart-box" id="main-cart" onclick="toggleCart(true)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <div class="hero-section">
        <div class="hero-viewport" id="hero-touch">
            <div id="hero-gear" class="hero-gear"></div>
        </div>
    </div>

    <main class="content-area">
        <div class="flex items-center justify-between mb-6">
             <h2 id="cat-title" class="text-2xl font-black text-gray-800">الأصناف</h2>
             <div class="h-[2px] flex-1 bg-gray-100 mx-4"></div>
        </div>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">طلباتك</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>
        <div id="cart-items" class="space-y-3 mb-8"></div>
        <div class="border-t pt-6">
            <div class="flex justify-between mb-6 font-black text-xl">
                <span>الإجمالي</span>
                <span id="total-price" class="text-gold">0 ج.م</span>
            </div>
            <input type="text" id="user-name" class="user-input" placeholder="الاسم الكامل">
            <input type="tel" id="user-phone" class="user-input" placeholder="رقم الهاتف">
            <input type="text" id="user-addr" class="user-input" placeholder="العنوان بالتفصيل">
            <button onclick="checkout()" class="w-full bg-black text-white py-5 rounded-2xl font-black mt-4 active:bg-gray-800">إتمام الطلب (WhatsApp)</button>
        </div>
    </div>

    <script>
        const categories = [
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مقبلات', img: 'https://cdn-icons-png.flaticon.com/512/2515/2515183.png' }
        ];

        const products = [
            { id: 1, name: 'شاورما دجاج', price: 95, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
            { id: 2, name: 'بيتزا بريميوم', price: 180, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' },
            { id: 3, name: 'برجر كلاسيك', price: 120, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400' }
        ];

        let cart = [];
        let gearRotation = 0;
        const step = 32; 
        const gear = document.getElementById('hero-gear');

        function init() {
            const radius = 250;
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<span>${cat.name}</span><div class="cat-img-wrapper"><img src="${cat.img}"></div>`;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        
        // إعادة سهولة الحركة (Inertia & Smoothness)
        hammer.on("panmove", (e) => {
            let movement = e.deltaX * 0.15; // سرعة استجابة متوازنة
            gearRotation += movement;
            applyRotation();
        });

        hammer.on("panend", (e) => {
            // إضافة ميكانيكا السحب القوي (Swipe) لسهولة التنقل
            let velocity = e.velocityX * 15;
            gearRotation += velocity;

            // محاذاة تلقائية (Snap)
            gearRotation = Math.round(gearRotation / step) * step;
            
            if (gearRotation > 0) gearRotation = 0;
            const min = -(categories.length-1)*step;
            if (gearRotation < min) gearRotation = min;

            gsap.to(gear, { 
                rotation: gearRotation, 
                duration: 0.6, 
                ease: "back.out(1.2)", // حركة ارتدادية خفيفة تعطي شعور بالفخامة
                onUpdate: applyRotation 
            });
            updateActive(Math.abs(gearRotation/step));
        });

        function applyRotation() {
            gear.style.transform = `rotate(${gearRotation}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                it.querySelector('.cat-img-wrapper').style.transform = `rotate(${-gearRotation}deg)`;
                it.querySelector('span').style.transform = `rotate(${-gearRotation}deg)`;
            });
        }

        function updateActive(idx) {
            const clean = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === clean));
            document.getElementById('cat-title').innerText = categories[clean].name;
        }

        function renderFood() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = products.map(p => `
                <div class="food-card">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="font-black text-green-600 text-sm">${p.price} ج.م</span>
                        <div class="w-8 h-8 bg-black text-white rounded-lg flex items-center justify-center cursor-pointer" onclick="addToCart(${p.id})">+</div>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('badge').innerText = cart.length;
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total + ' ج.م';
        }

        function toggleCart(show) { document.getElementById('cart-panel').style.left = show ? '0' : '-100%'; }

        function checkout() {
            const n = document.getElementById('user-name').value;
            if(!n) return alert('برجاء إدخال اسمك');
            window.open(`https://wa.me/201016991319?text=طلب جديد من ${n}\nالإجمالي: ${document.getElementById('total-price').innerText}`);
        }

        window.onload = init;
    </script>
</body>
</html>
