<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>منيو إبن سوريا - النسخة الاحترافية</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="إبن سوريا">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-ios: #F2F2F7;
            --blue-ios: #007AFF;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --gradient: linear-gradient(135deg, #007AFF 0%, #00C6FF 100%);
            --dev-color: #00BFFF;
            --green-ios: #34C759;
            --address-text: #0056b3;
            --text-color: #1C1C1E;
            --card-bg: #FFFFFF;
        }

        /* إعدادات الوضع الليلي */
        [data-theme="dark"] {
            --bg-ios: #000000;
            --white: #1C1C1E;
            --text-color: #FFFFFF;
            --card-bg: #1C1C1E;
            --address-text: #0A84FF;
            --shadow: 0 4px 20px rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        
        body { 
            background-color: var(--bg-ios); 
            color: var(--text-color); 
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            background: var(--white); padding: 25px 20px;
            text-align: center; position: relative;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        /* زر تبديل الوضع الليلي */
        .theme-toggle {
            position: absolute; top: 25px; right: 20px; width: 55px; height: 55px;
            background: var(--white); border-radius: 18px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: var(--shadow); color: var(--blue-ios); font-size: 20px;
        }

        .main-logo { width: 90px; height: 90px; border-radius: 22px; margin-bottom: 8px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .header-address { 
            font-size: 12px; 
            font-weight: 800; 
            color: var(--address-text); 
            background: rgba(0, 122, 255, 0.1);
            display: inline-block; 
            padding: 5px 15px; 
            border-radius: 12px; 
            margin-top: 5px;
        }

        .cart-trigger {
            position: absolute; top: 25px; left: 20px; width: 55px; height: 55px;
            background: var(--white); border-radius: 18px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: var(--shadow);
        }
        #cart-count {
            position: absolute; top: -5px; right: -5px; background: #FF3B30;
            color: white; font-size: 11px; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid white;
        }

        .sticky-wrapper {
            position: sticky; top: 0; z-index: 1000; background: var(--bg-ios);
            padding: 10px 0;
        }
        .categories-scroll { display: flex; gap: 12px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-card { text-align: center; min-width: 85px; cursor: pointer; }
        .cat-card img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: var(--shadow); transition: 0.3s; background: white; }
        .cat-card.active img { border-color: var(--blue-ios); transform: scale(1.1); }
        .cat-card span { display: block; margin-top: 8px; font-weight: 800; font-size: 12px; color: var(--text-color); }

        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px 20px; }
        
        .food-item { background: var(--card-bg); border-radius: 25px; padding: 15px; box-shadow: var(--shadow); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .food-item h3 { font-size: 15px; font-weight: 900; text-align: center; min-height: 40px; margin-bottom: 12px; line-height: 1.4; color: var(--text-color); }

        .price-options { display: flex; flex-direction: column; gap: 8px; }
        .price-btn {
            background: rgba(120, 120, 128, 0.08); border: none; padding: 14px 10px; border-radius: 16px;
            font-size: 13px; font-weight: 800; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; color: var(--text-color);
        }
        .price-btn i { color: var(--blue-ios); font-size: 18px; }
        
        .price-btn.added { background: #E8F5E9; color: var(--green-ios); }

        .add-toast { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--green-ios); color: white; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; opacity: 0; pointer-events: none; transition: 0.3s; }
        .add-toast.show { top: 5px; opacity: 1; }

        .footer-info { text-align: center; padding: 20px; background: var(--bg-ios); }
        .dev-credit { font-size: 13px; font-weight: 800; color: var(--blue-ios); display: block; }
        .dev-num { font-size: 15px; font-weight: 900; color: var(--dev-color); text-decoration: none; display: block; margin-bottom: 15px; direction: ltr; }
        .footer-nums a { font-size: 16px; font-weight: 900; color: var(--text-color); text-decoration: none; display: block; }

        .ios-bottom-sheet {
            width: 100%; background: var(--white); border-top-left-radius: 40px;
            border-top-right-radius: 40px; padding: 25px; color: var(--text-color);
        }
        .input-group input { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid rgba(120, 120, 128, 0.2); background: var(--bg-ios); color: var(--text-color); text-align: right; }
    </style>
</head>
<body>

<header>
    <div class="cart-trigger" onclick="toggleCart(true)">
        <i class="fas fa-shopping-bag" style="font-size: 24px; color: var(--blue-ios);"></i>
        <span id="cart-count">0</span>
    </div>
    
    <div class="theme-toggle" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <img src="logoo.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/100'">
    <h2 style="font-size: 24px; font-weight: 900;">إبن سوريا</h2>
    <div class="header-address"><i class="fas fa-map-marker-alt"></i> العنوان: نشا شارع السوق مقابل الريماس للسياحه والسفر</div>
</header>

<div class="sticky-wrapper">
    <div class="categories-scroll" id="cat-list"></div>
</div>

<div class="menu-container" id="food-grid"></div>

<div class="footer-info">
    <div class="dev-credit">Designed by Eng/ Anas Gaber Shehata</div>
    <a href="tel:01003800314" class="dev-num">01003800314</a>
    <div class="footer-nums">
        <a href="tel:01550035447">01550035447</a>
        <a href="tel:01279616968">01279616968</a>
        <a href="tel:01016991319">01016991319</a>
    </div>
    <div style="font-size: 10px; color: #BBB; margin-top: 10px;">جميع الحقوق محفوظة لـ مطعم ابن سوريا 2026 ©</div>
</div>

<div id="cart-sheet-overlay" onclick="if(event.target.id==='cart-sheet-overlay') toggleCart(false)" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; visibility: hidden; opacity: 0; transition: 0.4s; display: flex; align-items: flex-end;">
    <div class="ios-bottom-sheet" style="transform: translateY(100%); transition: 0.4s; width: 100%; max-height: 85vh; overflow-y: auto;">
        <div class="handle-bar" style="width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 20px;"></div>
        <h2 style="text-align: center; margin-bottom: 20px; font-weight: 900;">سلة طلباتك</h2>
        <div id="cart-items-list"></div>
        <div style="padding: 15px 0; border-top: 2px solid rgba(120, 120, 128, 0.2); display: flex; justify-content: space-between; font-size: 22px; font-weight: 900; color: var(--blue-ios);">
            <span>الإجمالي</span><span id="total-val">0 ج.م</span>
        </div>
        <div class="input-group" style="margin-bottom:10px;"><input type="text" id="c-name" placeholder="الاسم"></div>
        <div class="input-group" style="margin-bottom:10px;"><input type="tel" id="c-phone" placeholder="رقم الهاتف"></div>
        <div class="input-group" style="margin-bottom:10px;"><input type="text" id="c-address" placeholder="العنوان بالتفصيل"></div>
        <button class="confirm-btn" onclick="submitFinalOrder()" style="width: 100%; padding: 22px; background: var(--gradient); color: white; border: none; border-radius: 22px; font-size: 20px; font-weight: 900; cursor: pointer;">تأكيد الطلب</button>
    </div>
</div>

<script>
    // كود تبديل الوضع الليلي
    function toggleTheme() {
        const body = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        }
    }

    // تذكر اختيار المستخدم أو اتباع إعداد الموبايل
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').className = 'fas fa-sun';
    }

    // باقي الكود البرمجي الخاص بك كما هو بدون أي تغيير
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwVeN6ohlItpy6_3Fr5nIPaPgJoMoffwDfq85i8oG1c92XjW3wFknmB6Ahvj8BpQ/pub?output=csv';
    let products = [], cart = [], categories = [];

    function parseCSV(text) {
        const rows = text.split('\n');
        return rows.slice(1).map(row => {
            const cols = row.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g);
            if (cols) {
                const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                return { cat: cleanCols[0], name: cleanCols[1], small: cleanCols[2], medium: cleanCols[3], large: cleanCols[4] };
            }
        }).filter(item => item && item.name);
    }

    async function loadData() {
        try {
            const res = await fetch(sheetURL);
            const text = await res.text();
            products = parseCSV(text);
            categories = [...new Set(products.map(p => p.cat))];
            renderCats();
            if(categories.length > 0) filter(categories[0]);
        } catch (e) { console.error(e); }
    }

    function renderCats() {
        document.getElementById('cat-list').innerHTML = categories.map((c, i) => `
            <div class="cat-card ${i===0?'active':''}" onclick="filter('${c}', event)">
                <img src="logo${i+1}.png" onerror="this.src='logoo.jpg'">
                <span>${c}</span>
            </div>
        `).join('');
    }

    function render(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => {
            const isPizza = p.cat.includes('بيتزا');
            const labelSmall = isPizza ? 'صغير' : 'السعر';
            return `
            <div class="food-item">
                <div class="add-toast">تمت الإضافة ✓</div>
                <h3>${p.name}</h3>
                <div class="price-options">
                    ${p.small && p.small !== '-' ? `<button class="price-btn" onclick="add('${p.name} (${labelSmall})', ${p.small}, event)"><span>${labelSmall}: ${p.small}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.medium && p.medium !== '-' ? `<button class="price-btn" onclick="add('${p.name} (وسط)', ${p.medium}, event)"><span>وسط: ${p.medium}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.large && p.large !== '-' ? `<button class="price-btn" onclick="add('${p.name} (كبير)', ${p.large}, event)"><span>كبير: ${p.large}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                </div>
            </div>
        `}).join('');
    }

    function add(n, p, e) {
        cart.push({name:n, price:parseFloat(p)});
        updateUI();
        flyAnimation(e);
        const btn = e.currentTarget;
        const icon = btn.querySelector('i');
        const toast = btn.closest('.food-item').querySelector('.add-toast');
        btn.classList.add('added');
        icon.className = 'fas fa-check-circle';
        toast.classList.add('show');
        setTimeout(() => {
            btn.classList.remove('added');
            icon.className = 'fas fa-plus-circle';
            toast.classList.remove('show');
        }, 1200);
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let t = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map((i, index) => {
            t += i.price;
            return `<div class="cart-item-row" style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(120,120,128,0.1);">
                <i class="fas fa-trash-alt" style="color:#FF3B30;" onclick="removeItem(${index})"></i>
                <span>${i.name}</span>
                <span>${i.price}ج</span>
            </div>`;
        }).join('');
        document.getElementById('total-val').innerText = t + " ج.م";
    }

    function removeItem(index) { cart.splice(index, 1); updateUI(); }

    function toggleCart(s) {
        const o = document.getElementById('cart-sheet-overlay');
        const b = o.querySelector('.ios-bottom-sheet');
        if(s) { o.style.visibility = 'visible'; o.style.opacity = '1'; b.style.transform = 'translateY(0)'; }
        else { o.style.opacity = '0'; b.style.transform = 'translateY(100%)'; setTimeout(()=>o.style.visibility='hidden',400); }
    }

    function flyAnimation(e) {
        const flyer = document.createElement('div');
        flyer.style.position = 'fixed'; flyer.style.zIndex = '9999'; flyer.style.width = '30px'; flyer.style.height = '30px';
        flyer.style.background = 'var(--blue-ios)'; flyer.style.borderRadius = '50%'; flyer.style.left = e.clientX + 'px';
        flyer.style.top = e.clientY + 'px'; flyer.style.transition = 'all 0.7s';
        document.body.appendChild(flyer);
        setTimeout(() => { flyer.style.left = '20px'; flyer.style.top = '25px'; flyer.style.opacity = '0'; }, 50);
        setTimeout(() => flyer.remove(), 750);
    }

    function submitFinalOrder() {
        const n = document.getElementById('c-name').value, p = document.getElementById('c-phone').value, a = document.getElementById('c-address').value;
        if(!n || !p || !a || cart.length === 0) return alert("برجاء إكمال البيانات");
        let msg = `*طلب جديد من إبن سوريا* 🌯%0A%0A👤 *الاسم:* ${n}%0A📱 *الهاتف:* ${p}%0A📍 *العنوان:* ${a}%0A%0A📑 *الطلبات:*%0A`;
        cart.forEach((i, idx) => { msg += `${idx + 1}- ${i.name} (${i.price}ج)%0A`; });
        msg += `%0A💰 *الإجمالي:* ${document.getElementById('total-val').innerText}`;
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    function filter(cat, e) {
        if(e) { document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active')); e.currentTarget.classList.add('active'); }
        render(products.filter(p => p.cat === cat));
    }

    loadData();
</script>
</body>
</html>
