<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام - نظام الأنبوبة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-color: #89B42D; --surface: #F2F2F2; }
        body { font-family: 'Alexandria', sans-serif; background: white; margin: 0; overflow-x: hidden; }

        /* منطقة الأنبوبة (Tube Section) */
        .tube-section {
            position: relative; height: 320px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
            touch-action: none;
        }

        /* الكيرف العلوي الخارجي */
        .curve-outer {
            position: absolute; top: -380px; width: 620px; height: 620px;
            border-bottom: 2px dashed rgba(0,0,0,0.1); border-radius: 50%; z-index: 2;
        }

        /* الكيرف السفلي الداخلي (نفس درجة الانحناء تماماً) */
        .curve-inner {
            position: absolute; bottom: -380px; width: 620px; height: 620px;
            background: var(--surface); border-top: 2px dashed rgba(0,0,0,0.1);
            border-radius: 50%; z-index: 10;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.03);
        }

        /* محرك الدوران المحصور في الأنبوبة */
        .tube-engine {
            position: absolute; top: 160px; width: 620px; height: 620px;
            border-radius: 50%; z-index: 5;
        }

        .cat-item {
            position: absolute; top: 50%; left: 50%; width: 80px;
            margin-left: -40px; margin-top: -40px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .icon-shield {
            width: 60px; height: 60px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .cat-item.active .icon-shield { border-color: var(--brand-color); transform: scale(1.1); }
        .icon-shield img { width: 70%; height: 70%; }

        .cat-item span { font-size: 11px; margin-top: 6px; color: #999; font-weight: 700; }
        .cat-item.active span { color: var(--brand-color); }

        /* حاوية الأصناف لتبدأ من حافة الكيرف */
        .menu-list {
            position: relative; z-index: 20; background: var(--surface);
            margin-top: -80px; padding: 20px; min-height: 400px;
        }
    </style>
</head>
<body>

    <div class="tube-section" id="slider-zone">
        <div class="curve-outer"></div>
        <div class="tube-engine" id="wheel-engine"></div>
        <div class="curve-inner"></div>
    </div>

    <main class="menu-list">
        <h2 id="display-title" style="text-align:center; font-weight:900; margin-bottom:20px;">شاورما</h2>
        </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' }
        ];

        const engine = document.getElementById('wheel-engine');
        const slider = document.getElementById('slider-zone');
        const step = 45;
        let rot = 0;
        let startPos = 0;
        let activeDrag = false;

        categories.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = `cat-item ${i === 0 ? 'active' : ''}`;
            const angle = i * step;
            const x = 310 * Math.sin(angle * Math.PI / 180);
            const y = -310 * Math.cos(angle * Math.PI / 180);
            el.style.transform = `translate(${x}px, ${y}px)`;
            el.innerHTML = `<div class="icon-shield"><img src="${c.img}"></div><span>${c.name}</span>`;
            engine.appendChild(el);
        });

        // تحكم السحب البسيط لضمان العمل فوراً
        slider.onmousedown = slider.ontouchstart = (e) => { 
            activeDrag = true; 
            startPos = e.pageX || e.touches[0].pageX; 
            engine.style.transition = 'none'; 
        };

        window.onmousemove = window.ontouchmove = (e) => {
            if(!activeDrag) return;
            const x = e.pageX || e.touches[0].pageX;
            const delta = (x - startPos) * 0.2;
            applyRot(rot + delta);
        };

        window.onmouseup = window.ontouchend = (e) => {
            if(!activeDrag) return;
            activeDrag = false;
            rot = Math.round(rot / step) * step;
            if(rot > 0) rot = 0;
            if(rot < -(categories.length-1)*step) rot = -(categories.length-1)*step;
            engine.style.transition = 'transform 0.5s ease-out';
            applyRot(rot);
            updateUI();
        };

        function applyRot(r) {
            engine.style.transform = `rotate(${r}deg)`;
            document.querySelectorAll('.cat-item').forEach(n => {
                const base = n.style.transform.split('rotate')[0];
                n.style.transform = `${base} rotate(${-r}deg)`;
            });
        }

        function updateUI() {
            const idx = Math.abs(rot / step);
            document.querySelectorAll('.cat-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('display-title').innerText = categories[idx].name;
        }
    </script>
</body>
</html>
