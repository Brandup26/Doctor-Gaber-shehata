<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مطعم فاخر</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>طعمه لذيذ؟ اطلب الان</h1>
  </header>

  <main>
    <section class="menu-section">
      <h2 class="section-title">قائمة الطعام</h2>
      <div class="menu-grid">
        <!-- Food Cards -->
        <div class="food-card">
          <img src="burger1.jpg" alt="برجر">
          <h3>برجر</h3>
          <p class="price">350 ج</p>
        </div>
        <div class="food-card">
          <img src="burger2.jpg" alt="برجر كبير">
          <h3>برجر كبير</h3>
          <p class="price">450 ج</p>
        </div>
        <div class="food-card">
          <img src="pasta.jpg" alt="باستا">
          <h3>باستا</h3>
          <p class="price">550 ج</p>
        </div>
        <div class="food-card">
          <img src="burger3.jpg" alt="برجر ديلوكس">
          <h3>برجر ديلوكس</h3>
          <p class="price">650 ج</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="sticky-navigation">
    <button>الرئيسية</button>
    <button>القائمة</button>
    <button>التواصل</button>
  </footer>

  <button class="floating-whatsapp">
    <img src="whatsapp-icon.png" alt="WhatsApp">
  </button>

  <script src="script.js"></script>
</body>
</html>
