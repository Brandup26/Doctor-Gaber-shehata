<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | النسخة النهائية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #F5F5F5; --active-green: #89B42D; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        /* الهيدر العلوي */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
        }

        .cart-box { background: #1A1A1A; color: white; width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }

        /* منطقة الأقسام - تم رفعها للأعلى */
        .hero-viewport {
            position: relative; height: 280px; width: 100%;
            background: #fff; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; padding-top: 40px;
        }

        /* المسار الوهمي المنقط */
        .category-path-line {
            position: absolute; top: 180px; width: 500px; height: 500px;
            border: 1.5px dashed rgba(0,0,0,0.08); border-radius: 50%;
            pointer-events: none; z-index: 0;
        }

        /* الكيرف الداخلي السفلي */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -50px; left: -10%;
            width: 120%; height: 100px; background: var(--bg);
            border-top-left-radius: 50% 80px; border-top-right-radius: 50% 80px; z-index: 5;
        }

        .hero-gear {
            position: absolute; top: 180px; width: 600px; height: 600px;
            border-radius: 50%; will-change: transform; z-index: 1;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 90px; height: 110px;
            margin-left: -45px; margin-top: -45px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .hero-cat-item span { font-size: 13px; font-weight: 700; color: #777; margin-bottom: 8px; transition: 0.3s; }
        .hero-cat-item.active span { color: var(--active-green); font-weight: 900; }

        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%; background: #fff;
            overflow: hidden; border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        .hero-cat-item.active .cat-img-wrapper { transform: scale(1.2); border-color: var(--active-green); }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .active-indicator {
            position: absolute; bottom: 35px; width: 35px; height: 5px;
            background: var(--active-green); border-radius: 10px; z-index: 10;
        }

        /* أنميشن الطيران */
        .flying-item {
            position: fixed; z-index: 9999; pointer-events: none;
            width: 50px; height: 50px; border-radius: 50%;
            object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 2000; padding: 25px;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
        <div class="cart-box" id="cart-btn" onclick="toggleCart(true)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="category-path-line"></div>
        <div id="hero-gear" class="hero-gear"></div>
        <div class="active-indicator"></div>
    </div>

    <main class="p-5">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-gray-800">الأصناف</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">سلتك</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>
        <div id="cart-items" class="space-y-4 h-[60vh] overflow-y-auto mb-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between mb-4 font-black text-xl">
                <span>الإجمالي:</span>
                <span id="total-price" class="text-green-600">0 ج.م</span>
            </div>
            <button onclick="alert('تم الطلب!')" class="w-full bg-black text-white py-4 rounded-2xl font-black">تأكيد الطلب</button>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'cat1', name: 'شاورما', img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=200' },
            { id: 'cat2', name: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200' },
            { id: 'cat3', name: 'برجر', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200' },
            { id: 'cat4', name: 'مكرونة', img: 'https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=200' },
            { id: 'cat5', name: 'مشويات', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=200' }
        ];

        const allProducts = {
            'cat1': [
                { id: 1, name: 'شاورما دجاج مارينا', price: 90, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=300' },
                { id: 2, name: 'شاورما لحم عربي', price: 110, img: 'https://images.unsplash.com/photo-1633384006004-5047d75e4785?w=300' }
            ],
            'cat2': [
                { id: 3, name: 'بيتزا مارجريتا', price: 130, img: 'https://images.unsplash.com/photo-1574071318508-1cdbad80ad38?w=300' },
                { id: 4, name: 'بيتزا سوبر سوبريم', price: 180, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300' }
            ],
            'cat3': [
                { id: 5, name: 'برجر دبل تشيز', price: 140, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300' },
                { id: 6, name: 'برجر بيج سوريا', price: 160, img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=300' }
            ],
            'cat4': [
                { id: 7, name: 'باستا الفريدو', price: 95, img: 'https://images.unsplash.com/photo-1645112481338-35623bb16f64?w=300' }
            ],
            'cat5': [
                { id: 8, name: 'كفتة مشوية', price: 220, img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=300' }
            ]
        };

        let cart = [];
        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');
        const step = 40; 

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = 250 * Math.sin(angle * Math.PI / 180);
                const y = -250 * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<span>${cat.name}</span><div class="cat-img-wrapper"><img src="${cat.img}"></div>`;
                gear.appendChild(item);
            });
            renderFood('cat1');
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("panmove", (e) => {
            gearRotation += e.velocityX * 4;
            applyRotation();
        });

        hammer.on("panend", () => {
            gearRotation = Math.round(gearRotation / step) * step;
            const min = -(categories.length - 1) * step;
            if (gearRotation > 0) gearRotation = 0;
            if (gearRotation < min) gearRotation = min;
            gsap.to(gear, { rotation: gearRotation, duration: 0.6, ease: "back.out(1.2)" });
            const activeIdx = Math.abs(gearRotation / step);
            updateActive(activeIdx);
        });

        function applyRotation() {
            gear.style.transform = `rotate(${gearRotation}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                it.querySelector('.cat-img-wrapper').style.transform = `rotate(${-gearRotation}deg)`;
                it.querySelector('span').style.transform = `rotate(${-gearRotation}deg)`;
            });
        }

        function updateActive(idx) {
            const i = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, j) => it.classList.toggle('active', j === i));
            document.getElementById('cat-title').innerText = categories[i].name;
            renderFood(categories[i].id);
        }

        function renderFood(catId) {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = (allProducts[catId] || []).map(p => `
                <div class="bg-white p-4 rounded-[25px] shadow-sm">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-600 font-black">${p.price}ج</span>
                        <button onclick="addToCart('${catId}', ${p.id}, event)" class="bg-black text-white w-9 h-9 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>`).join('');
        }

        function addToCart(catId, prodId, event) {
            const product = allProducts[catId].find(p => p.id === prodId);
            cart.push(product);
            
            // أنميشن الطيران
            const btn = event.currentTarget;
            const rect = btn.getBoundingClientRect();
            const cartBtn = document.getElementById('cart-btn').getBoundingClientRect();

            const flyer = document.createElement('img');
            flyer.src = product.img;
            flyer.className = 'flying-item';
            flyer.style.top = rect.top + 'px';
            flyer.style.left = rect.left + 'px';
            document.body.appendChild(flyer);

            gsap.to(flyer, {
                top: cartBtn.top + 10,
                left: cartBtn.left + 10,
                scale: 0.1,
                opacity: 0.5,
                duration: 0.8,
                ease: "power2.inOut",
                onComplete: () => {
                    flyer.remove();
                    updateCartUI();
                    gsap.fromTo("#cart-btn", { scale: 1.3 }, { scale: 1, duration: 0.3 });
                }
            });
        }

        function updateCartUI() {
            document.getElementById('badge').innerText = cart.length;
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0) + ' ج.م';
            document.getElementById('cart-items').innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                    <p class="font-bold text-xs flex-1 px-3">${item.name}</p>
                    <i onclick="removeFromCart(${index})" class="fa-solid fa-trash text-red-500"></i>
                </div>`).join('');
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
        function toggleCart(s) { document.getElementById('cart-panel').style.left = s ? '0' : '-100%'; }

        init();
    </script>
</body>
</html>
