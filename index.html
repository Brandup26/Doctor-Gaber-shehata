<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الدكتور جابر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #F9FAFB; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div class="flex flex-col items-center pt-12 pb-8 px-4">
        <div class="w-24 h-24 bg-white rounded-[2.5rem] shadow-xl flex items-center justify-center p-1 mb-4 border-2 border-white overflow-hidden">
            <img src="https://ui-avatars.com/api/?name=Dr+Gaber&background=0ea5e9&color=fff&size=128" class="w-full h-full rounded-[2rem] object-cover">
        </div>
        <h1 class="text-2xl font-black text-gray-900">مطعم الدكتور جابر</h1>
        <p class="text-gray-500 text-sm mt-1 font-medium text-center">نقدم لكم أجود أنواع المأكولات الشرقية</p>
    </div>

    <div class="max-w-md mx-auto px-5 space-y-4">
        <div class="card-hover bg-white p-4 rounded-[2rem] shadow-sm flex items-center justify-between border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🍖</div>
                <div>
                    <h3 class="font-bold text-gray-800 text-lg leading-tight">قسم المشويات</h3>
                    <p class="text-xs text-gray-400 font-medium">كباب وكفتة وطواجن طازجة</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-orange-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
            </div>
        </div>

        <div class="card-hover bg-white p-4 rounded-[2rem] shadow-sm flex items-center justify-between border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🥗</div>
                <div>
                    <h3 class="font-bold text-gray-800 text-lg leading-tight">المقبلات</h3>
                    <p class="text-xs text-gray-400 font-medium">سلطات ومقبلات شامية ومصرية</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-orange-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
            </div>
        </div>

        <div class="card-hover bg-white p-4 rounded-[2rem] shadow-sm flex items-center justify-between border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center text-2xl shadow-inner">📞</div>
                <div>
                    <h3 class="font-bold text-gray-800 text-lg leading-tight">تواصل معنا</h3>
                    <p class="text-xs text-gray-400 font-medium">اتصل بنا أو راسلنا واتساب</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
            </div>
        </div>
    </div>

    <p class="text-center text-gray-300 text-[10px] mt-10 font-bold tracking-widest uppercase">Powered by TechLab</p>
</body>
</html>
