<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام - التصميم البطل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }

        /* الهيدر العلوي */
        .header-nav {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: white; position: relative; z-index: 100;
        }

        /* منطقة الأنبوبة (نفس كود الله ينور) */
        .hero-viewport {
            position: relative; height: 320px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
            touch-action: none;
        }

        /* الكيرفات المتوازية */
        .curve-border {
            position: absolute; width: 620px; height: 620px;
            border-radius: 50%; pointer-events: none; z-index: 10;
        }
        .top-dashed { top: -380px; border-bottom: 2px dashed rgba(0,0,0,0.08); }
        .bottom-filled { 
            bottom: -380px; background: var(--bg); 
            border-top: 2px dashed rgba(0,0,0,0.1);
            box-shadow: 0 -15px 30px rgba(0,0,0,0.02);
        }

        /* المحرك الدائري للأقسام */
        .gear-hub {
            position: absolute; top: 160px; width: 620px; height: 620px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .cat-node {
            position: absolute; top: 50%; left: 50%; width: 85px;
            margin-left: -42.5px; margin-top: -42.5px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .img-wrapper {
            width: 70px; height: 70px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cat-node.active .img-wrapper { 
            border-color: var(--gold); 
            transform: scale(1.15) translateY(-5px); 
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }
        .img-wrapper img { width: 80%; height: 80%; object-fit: contain; }

        .cat-node span { font-size: 11px; margin-top: 6px; color: #aaa; font-weight: 700; }
        .cat-node.active span { color: #111; font-weight: 900; }

        /* منطقة المنتجات */
        .product-area { padding: 20px; position: relative; z-index: 20; margin-top: -60px; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <div style="font-weight:900;">ليالي <span style="color:var(--gold);">الشام</span></div>
        <div><i class="fa-solid fa-gem text-amber-500"></i> 1200</div>
    </nav>

    <div class="hero-viewport" id="slider-area">
        <div class="curve-border top-dashed"></div>
        <div id="gear-hub" class="gear-hub"></div>
        <div class="curve-border bottom-filled"></div>
    </div>

    <main class="product-area">
        <h2 id="active-cat-name" style="text-align:center; font-weight:900; margin-bottom:20px;">مشويات</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div style="background:white; height:180px; border-radius:20px;"></div>
            <div style="background:white; height:180px; border-radius:20px;"></div>
        </div>
    </main>

    <script>
        const categories = [
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مقبلات', img: 'https://cdn-icons-png.flaticon.com/512/3014/3014545.png' }
        ];

        const hub = document.getElementById('gear-hub');
        const stepAngle = 35; // تم تقليل الزاوية من 45 لـ 35 لجعل الأقسام "أقرب لبعضها"
        let currentRotation = 0;

        // إنشاء وتوزيع الأقسام
        categories.forEach((cat, i) => {
            const node = document.createElement('div');
            node.className = `cat-node ${i === 0 ? 'active' : ''}`;
            const angle = i * stepAngle;
            
            const x = 310 * Math.sin(angle * Math.PI / 180);
            const y = -310 * Math.cos(angle * Math.PI / 180);
            
            node.style.transform = `translate(${x}px, ${y}px)`;
            node.innerHTML = `<div class="img-wrapper"><img src="${cat.img}"></div><span>${cat.name}</span>`;
            hub.appendChild(node);
        });

        // تشغيل نظام السحب باستخدام Hammer.js لسلاسة مطلقة
        const mc = new Hammer(document.getElementById('slider-area'));
        
        mc.on("pan", (e) => {
            const dragRotation = currentRotation + (e.deltaX / 6);
            gsap.set(hub, { rotation: dragRotation });
            
            // تصحيح زوايا الأيقونات أثناء السحب
            document.querySelectorAll('.cat-node').forEach(n => {
                gsap.set(n.querySelector('.img-wrapper'), { rotation: -dragRotation });
                gsap.set(n.querySelector('span'), { rotation: -dragRotation });
            });
        });

        mc.on("panend", (e) => {
            // إضافة خاصية الـ Momentum (القصور الذاتي) لسلاسة التنقل
            const velocity = e.velocityX * 15;
            currentRotation = Math.round((currentRotation + velocity) / stepAngle) * stepAngle;

            // ضبط الحدود
            const minRot = -(categories.length - 1) * stepAngle;
            if (currentRotation > 0) currentRotation = 0;
            if (currentRotation < minRot) currentRotation = minRot;

            // حركة Snap ناعمة جداً
            gsap.to(hub, { 
                rotation: currentRotation, 
                duration: 0.7, 
                ease: "power2.out",
                onUpdate: () => {
                    const r = gsap.getProperty(hub, "rotation");
                    document.querySelectorAll('.cat-node').forEach(n => {
                        gsap.set(n.querySelector('.img-wrapper'), { rotation: -r });
                        gsap.set(n.querySelector('span'), { rotation: -r });
                    });
                }
            });

            // تحديث العنصر النشط
            const activeIdx = Math.abs(currentRotation / stepAngle);
            document.querySelectorAll('.cat-node').forEach((n, i) => n.classList.toggle('active', i === activeIdx));
            document.getElementById('active-cat-name').innerText = categories[activeIdx].name;
        });
    </script>
</body>
</html>
