<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم إبن سوريا - المنيو الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #F8F9FA;
            --primary-green: #2ecc71;
            --text-dark: #2D3436;
            --white: #FFFFFF;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition-smooth: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* الهيدر العلوي */
        .top-header {
            padding: 25px 20px;
            background: var(--white);
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .header-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* السلة في الأعلى على الشمال */
        .cart-trigger-top {
            width: 50px;
            height: 50px;
            background: var(--white);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .cart-trigger-top:active { transform: scale(0.9); }

        #cart-count {
            position: absolute;
            top: -5px;
            left: -5px;
            background: #ff4757;
            color: white;
            font-size: 11px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .restaurant-brand { display: flex; align-items: center; gap: 10px; }
        .logo-box { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }

        /* البحث */
        .search-box {
            position: relative;
            margin-top: 10px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border-radius: 18px;
            border: none;
            background: #f1f2f6;
            outline: none;
            font-size: 14px;
        }

        .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #a4b0be; }

        /* الأقسام بصور حقيقية */
        .cat-scroll {
            display: flex;
            gap: 18px;
            padding: 25px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-scroll::-webkit-scrollbar { display: none; }

        .cat-item {
            text-align: center;
            min-width: 85px;
            cursor: pointer;
        }

        .cat-img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--white);
            box-shadow: var(--shadow);
            transition: var(--transition-smooth);
            margin-bottom: 8px;
        }

        .cat-item.active .cat-img {
            border-color: var(--primary-green);
            transform: scale(1.1);
        }

        .cat-item span { font-size: 13px; font-weight: 700; color: #57606f; }
        .cat-item.active span { color: var(--primary-green); }

        /* المنتجات */
        .products-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 15px 100px;
        }

        .food-card {
            background: var(--white);
            border-radius: 30px;
            padding: 12px;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        .food-card img {
            width: 100%;
            height: 130px;
            border-radius: 22px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .food-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
        .food-card p { font-size: 11px; color: #a4b0be; line-height: 1.3; height: 30px; overflow: hidden; }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .food-price { color: var(--text-dark); font-weight: 900; font-size: 16px; }

        .add-btn {
            width: 38px;
            height: 38px;
            background: #2f3542;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        /* أنيميشن طيران بسيط */
        .fly-dot {
            position: fixed;
            z-index: 9999;
            width: 30px;
            height: 30px;
            background: var(--primary-green);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* السلة (الأسفل) */
        #cart-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 3000;
            transition: 0.5s;
            display: flex;
            align-items: flex-end;
        }

        .cart-content {
            width: 100%;
            background: var(--bg-color);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            padding: 30px 20px;
            max-height: 85%;
            overflow-y: auto;
        }

        .handle { width: 45px; height: 5px; background: #dfe4ea; border-radius: 10px; margin: 0 auto 25px; }

        .input-group { margin-bottom: 12px; }
        .input-group input {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 1px solid #eee;
            outline: none;
            font-size: 14px;
        }

        .order-submit {
            width: 100%;
            padding: 20px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            margin-top: 15px;
        }

        @media (max-width: 500px) {
            .products-container { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="top-header">
    <div class="header-top-row">
        <div class="cart-trigger-top" onclick="toggleCart()">
            <i class="fas fa-shopping-bag" style="font-size: 20px; color: #2f3542;"></i>
            <span id="cart-count">0</span>
        </div>
        
        <div class="restaurant-brand">
            <div style="text-align: left;">
                <p style="font-size: 11px; color: #a4b0be;">أهلاً بك في</p>
                <h2 style="font-size: 18px; font-weight: 900;">إبن سوريا</h2>
            </div>
            <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=100" class="logo-box">
        </div>
    </div>

    <h1 style="font-size: 24px; font-weight: 900; line-height: 1.3;">أشهى المأكولات الشامية<br>بين يديك الآن 😋</h1>
    
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="ابحث عن وجبتك المفضلة...">
    </div>
</div>

<div class="cat-scroll" id="category-list">
    </div>

<div class="products-container" id="food-grid">
    </div>

<div id="cart-modal" onclick="if(event.target.id==='cart-modal') toggleCart()">
    <div class="cart-content">
        <div class="handle" onclick="toggleCart()"></div>
        <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">سلة طلباتك</h2>
        
        <div id="items-list" style="margin-bottom: 20px;"></div>
        
        <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: 900; margin-bottom: 25px;">
            <span>الإجمالي:</span>
            <span style="color: var(--primary-green);"><span id="total-val">0</span> ج.م</span>
        </div>

        <div class="input-group"><input type="text" id="u-name" placeholder="الاسم بالكامل"></div>
        <div class="input-group"><input type="tel" id="u-phone" placeholder="رقم الهاتف"></div>
        <div class="input-group"><input type="text" id="u-address" placeholder="العنوان (الشارع / رقم البيت)"></div>
        
        <button class="order-submit" onclick="confirmOrder()">
            تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<script>
    let cart = [];
    const products = [
        {id: 1, name: 'شاورما دجاج', price: 85, cat: 'شاورما', img: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=400', desc: 'شاورما دجاج سوري أصلية مع التومية'},
        {id: 2, name: 'برجر عائلي', price: 160, cat: 'برجر', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=400', desc: 'برجر لحم مشوي على اللهب مع الجبن'},
        {id: 3, name: 'بيتزا إيطالي', price: 140, cat: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=400', desc: 'عجينة رقيقة مع صلصة طماطم فريش'},
        {id: 4, name: 'فتة شامي', price: 110, cat: 'أطباق', img: 'https://images.unsplash.com/photo-1541518763669-27fef04b14ea?q=80&w=400', desc: 'أرز بسمتي مع قطع الدجاج المقرمش'}
    ];

    const categories = [
        {name: 'شاورما', img: 'https://images.unsplash.com/photo-1633383718081-22ac93e3dbf1?q=80&w=150'},
        {name: 'برجر', img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=150'},
        {name: 'بيتزا', img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=150'},
        {name: 'أطباق', img: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=150'}
    ];

    function init() {
        const catDiv = document.getElementById('category-list');
        catDiv.innerHTML = categories.map(c => `
            <div class="cat-item" onclick="filterMenu('${c.name}', event)">
                <img src="${c.img}" class="cat-img">
                <span>${c.name}</span>
            </div>
        `).join('');
        renderProducts(products);
    }

    function renderProducts(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <div class="card-footer">
                    <span class="food-price">${p.price} ج.م</span>
                    <button class="add-btn" onclick="addToCart(${p.id}, event)">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, e) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCartUI();
        simpleFly(e);
    }

    // أنيميشن طيران بسيط ونظيف
    function simpleFly(e) {
        const dot = document.createElement('div');
        dot.className = 'fly-dot';
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        document.body.appendChild(dot);

        const cartIcon = document.querySelector('.cart-trigger-top').getBoundingClientRect();

        setTimeout(() => {
            dot.style.left = cartIcon.left + 25 + 'px';
            dot.style.top = cartIcon.top + 25 + 'px';
            dot.style.transform = 'scale(0.2)';
            dot.style.opacity = '0';
        }, 50);

        setTimeout(() => dot.remove(), 750);
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('items-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f1f2f6;">
                        <span>${i.name}</span><b>${i.price} ج.م</b>
                    </div>`;
        }).join('');
        document.getElementById('total-val').innerText = total;
    }

    function toggleCart() {
        const modal = document.getElementById('cart-modal');
        modal.style.bottom = modal.style.bottom === '0px' ? '-100%' : '0px';
    }

    function filterMenu(name, e) {
        document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
        e.currentTarget.classList.add('active');
        renderProducts(products.filter(p => p.cat === name));
    }

    function confirmOrder() {
        const n = document.getElementById('u-name').value;
        const a = document.getElementById('u-address').value;
        if(!n || cart.length === 0) return alert("فضلاً، أكمل البيانات واختر وجباتك");
        
        let msg = `*طلب جديد من مطعم إبن سوريا*%0A*الاسم:* ${n}%0A*العنوان:* ${a}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText} ج.م`;
        
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    init();
</script>

</body>
</html>
