<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تأثير الأنبوبة الدائرية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F5F5F5; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; margin: 0; }

        /* منطقة الأنبوبة (The Tube Container) */
        .tube-viewport {
            position: relative; height: 280px; width: 100%;
            background: #fff; overflow: hidden; display: flex; justify-content: center;
        }

        /* الكيرف العلوي (سقف الأنبوبة) */
        .tube-upper-edge {
            position: absolute; 
            top: -240px; /* يسحب الدائرة للأعلى ليظهر قعرها كقوس علوي */
            width: 500px; height: 500px;
            border-bottom: 1.5px dashed rgba(0,0,0,0.1);
            border-radius: 50%; z-index: 2;
        }

        /* الكيرف السفلي (أرضية الأنبوبة - أعلى الأصناف) */
        .tube-lower-edge {
            position: absolute; 
            bottom: -240px; /* يسحب الدائرة للأسفل ليظهر رأسها كقوس سفلي */
            width: 500px; height: 500px;
            background: var(--bg); /* لون منطقة الأصناف */
            border-top: 1.5px dashed rgba(0,0,0,0.1);
            border-radius: 50%; z-index: 10;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.02);
        }

        /* المحرك الذي تدور فيه الأقسام (داخل جوف الأنبوبة) */
        .rotation-engine {
            position: absolute; 
            top: 50%; /* في منتصف المسافة بين القوسين */
            transform: translateY(-50%);
            width: 500px; height: 500px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .category-item {
            position: absolute; top: 50%; left: 50%; width: 70px;
            margin-left: -35px; margin-top: -35px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .icon-circle {
            width: 55px; height: 55px; border-radius: 50%;
            background: white; border: 1.5px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .category-item.active .icon-circle { border-color: var(--active-green); transform: scale(1.1); }
        .icon-circle img { width: 70%; height: 70%; object-fit: contain; }

        .category-item span { font-size: 10px; margin-top: 5px; color: #999; font-weight: 700; }
        .category-item.active span { color: var(--active-green); }

        /* منطقة المنتجات */
        .products-area {
            position: relative; z-index: 20; 
            margin-top: -100px; /* تتداخل مع الكيرف السفلي */
            padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="tube-viewport" id="interaction-zone">
        <div class="tube-upper-edge"></div> <div id="engine" class="rotation-engine"></div> <div class="tube-lower-edge"></div> </div>

    <main class="products-area">
        <h2 id="cat-name" class="text-xl font-black mb-6">شاورما</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' }
        ];

        let currentRotation = 0;
        const engine = document.getElementById('engine');
        const angleStep = 40;

        function build() {
            categories.forEach((cat, i) => {
                const node = document.createElement('div');
                node.className = `category-item ${i === 0 ? 'active' : ''}`;
                const angle = i * angleStep;
                
                // الأيقونات تدور في مسار قطره 250px لتبقى في جوف الأنبوبة
                const x = 250 * Math.sin(angle * Math.PI / 180);
                const y = -250 * Math.cos(angle * Math.PI / 180);
                
                node.style.transform = `translate(${x}px, ${y}px)`;
                node.innerHTML = `<div class="icon-circle"><img src="${cat.img}"></div><span>${cat.name}</span>`;
                engine.appendChild(node);
            });
            renderProducts();
        }

        const hammer = new Hammer(document.getElementById('interaction-zone'));
        hammer.on("pan", (e) => {
            let move = currentRotation + (e.deltaX / 5);
            gsap.set(engine, { rotation: move });
            document.querySelectorAll('.category-item').forEach(n => gsap.set(n, { rotation: -move }));
        });

        hammer.on("panend", () => {
            currentRotation = Math.round(gsap.getProperty(engine, "rotation") / angleStep) * angleStep;
            if (currentRotation > 0) currentRotation = 0;
            const limit = -(categories.length - 1) * angleStep;
            if (currentRotation < limit) currentRotation = limit;

            gsap.to(engine, { 
                rotation: currentRotation, duration: 0.4, 
                onUpdate: () => {
                    const r = gsap.getProperty(engine, "rotation");
                    document.querySelectorAll('.category-item').forEach(n => gsap.set(n, { rotation: -r }));
                }
            });
            const idx = Math.round(Math.abs(currentRotation / angleStep));
            document.querySelectorAll('.category-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('cat-name').innerText = categories[idx].name;
        });

        function renderProducts() {
            document.getElementById('product-grid').innerHTML = [1,2].map(() => `
                <div class="bg-white p-3 rounded-2xl shadow-sm">
                    <div class="w-full h-24 bg-gray-100 rounded-xl mb-2"></div>
                    <div class="h-3 w-1/2 bg-gray-200 rounded mx-auto"></div>
                </div>`).join('');
        }

        build();
    </script>
</body>
</html>
