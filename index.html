<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم ابن سوريا - أطلب الآن</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">ابن سوريا</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <section class="categories">
        <div class="cat-item" onclick="filterMenu('all')">
            <img src="https://via.placeholder.com/80" alt="الكل">
            <p>الكل</p>
        </div>
        <div class="cat-item" onclick="filterMenu('شاورما')">
            <img src="https://via.placeholder.com/80" alt="شاورما">
            <p>شاورما</p>
        </div>
        <div class="cat-item" onclick="filterMenu('مشويات')">
            <img src="https://via.placeholder.com/80" alt="مشويات">
            <p>مشويات</p>
        </div>
        <div class="cat-item" onclick="filterMenu('مقبلات')">
            <img src="https://via.placeholder.com/80" alt="مقبلات">
            <p>مقبلات</p>
        </div>
    </section>

    <h2 class="section-title">قائمة الطعام</h2>
    
    <section class="menu-grid" id="menu-container">
        </section>

    <div class="cart-sidebar" id="cart-sidebar">
        <h3>طلباتك</h3>
        <div id="cart-items"></div>
        <hr>
        <div class="user-info">
            <input type="text" id="user-name" placeholder="الاسم بالكامل">
            <input type="tel" id="user-phone" placeholder="رقم الهاتف">
            <input type="text" id="user-address" placeholder="العنوان بالتفصيل">
        </div>
        <button class="btn-whatsapp" onclick="sendToWhatsApp()">
            إرسال الطلب عبر واتساب <i class="fab fa-whatsapp"></i>
        </button>
        <button class="btn-close" onclick="toggleCart()">إغلاق</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
