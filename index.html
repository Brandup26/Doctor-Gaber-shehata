<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الدكتور جابر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #ffffff; margin: 0; padding: 0; }
        .category-card {
            background: #ffffff;
            border-radius: 24px;
            margin-bottom: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f1f1;
            transition: transform 0.2s ease;
        }
        .category-card:active { transform: scale(0.97); }
        .icon-box {
            width: 60px; height: 60px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        .arrow-box {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF512F 0%, #DD2476 100%);
            display: flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 5px 15px rgba(221, 36, 118, 0.3);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md px-6 py-10">
        
        <div class="text-center mb-12">
            <div class="relative inline-block mb-6">
                <div class="w-28 h-28 bg-white rounded-[2.5rem] shadow-2xl flex items-center justify-center p-1 border-2 border-gray-50 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Dr+G&background=be1c21&color=fff&size=200" class="w-full h-full rounded-[2.2rem] object-cover">
                </div>
            </div>
            <h1 class="text-[26px] font-black text-gray-900 leading-tight">مطعم الدكتور جابر</h1>
            <p class="text-gray-400 text-sm mt-2 font-medium">أشهى المأكولات بجودة استثنائية ونكهات أصيلة</p>
        </div>

        <div class="space-y-4">
            
            <div class="category-card">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-emerald-50 text-emerald-500">🥗</div>
                    <div>
                        <h2 class="font-black text-[18px] text-gray-800">المقبلات</h2>
                        <p class="text-[12px] text-gray-400 font-bold">تشكيلة مميزة من المقبلات الطازجة</p>
                    </div>
                </div>
                <div class="arrow-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="transform rotate-180"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

            <div class="category-card">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-orange-50 text-orange-500">🔥</div>
                    <div>
                        <h2 class="font-black text-[18px] text-gray-800">المشويات</h2>
                        <p class="text-[12px] text-gray-400 font-bold">لحوم طازجة مشوية على الفحم</p>
                    </div>
                </div>
                <div class="arrow-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="transform rotate-180"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

            <div class="category-card">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-blue-50 text-blue-500">🍱</div>
                    <div>
                        <h2 class="font-black text-[18px] text-gray-800">الأطباق الرئيسية</h2>
                        <p class="text-[12px] text-gray-400 font-bold">وجباتنا المميزة لكل العائلة</p>
                    </div>
                </div>
                <div class="arrow-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="transform rotate-180"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

        </div>

        <div class="mt-20 text-center">
            <p class="text-[10px] font-black text-gray-300 tracking-[0.3em] uppercase">Powered By TechLab</p>
        </div>

    </div>

</body>
</html>
