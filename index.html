<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | سلاسة الحركة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        /* منطقة الأنبوبة الدائرية */
        .hero-viewport {
            position: relative; height: 350px; width: 100%;
            background: #fff; overflow: hidden; display: flex; justify-content: center;
            touch-action: none;
        }

        /* الكيرفات المتوازية */
        .curve-overlay {
            position: absolute; width: 650px; height: 650px;
            border-radius: 50%; pointer-events: none; z-index: 10;
        }
        .top-path { top: -410px; border-bottom: 2px dashed rgba(0,0,0,0.08); }
        .bottom-filled { 
            bottom: -410px; background: var(--bg); 
            border-top: 2.5px dashed rgba(0,0,0,0.1);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.03);
        }

        /* ترس الأقسام */
        .gear-system {
            position: absolute; top: 180px; width: 650px; height: 650px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .cat-item {
            position: absolute; top: 50%; left: 50%; width: 90px;
            margin-left: -45px; margin-top: -45px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .img-frame {
            width: 75px; height: 75px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .cat-item.active .img-frame { 
            border-color: var(--gold); 
            transform: scale(1.15) translateY(-8px); 
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }
        
        /* صور حقيقية عالية الجودة */
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }

        .cat-item span { font-size: 11px; margin-top: 8px; color: #aaa; font-weight: 700; }
        .cat-item.active span { color: #111; font-weight: 900; }

        .food-section { padding: 20px; position: relative; z-index: 20; margin-top: -60px; }
    </style>
</head>
<body>

    <nav class="p-5 flex justify-between items-center bg-white">
        <div class="logo font-black text-xl">ليالي <span class="text-amber-500">الشام</span></div>
        <div class="font-bold"><i class="fa-solid fa-gem text-amber-500"></i> 1256</div>
    </nav>

    <div class="hero-viewport" id="drag-zone">
        <div class="curve-overlay top-path"></div>
        <div id="gear" class="gear-system"></div>
        <div class="curve-overlay bottom-filled"></div>
    </div>

    <main class="food-section">
        <h2 id="cat-title" class="text-3xl font-black mb-8 text-center text-gray-800">مشويات</h2>
        <div id="food-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const categories = [
            // صور واقعية للأقسام
            { name: 'مشويات', img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=200&h=200&fit=crop' },
            { name: 'شاورما', img: 'https://images.unsplash.com/photo-1633383718081-22ac93e3dbf1?w=200&h=200&fit=crop' },
            { name: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200&h=200&fit=crop' },
            { name: 'برجر', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200&h=200&fit=crop' },
            { name: 'مقبلات', img: 'https://images.unsplash.com/photo-1541529086526-db283c563270?w=200&h=200&fit=crop' }
        ];

        const gear = document.getElementById('gear');
        const stepAngle = 35; // تقريب الأقسام لبعضها (من 40 لـ 35) لتعطي شكل ممتلئ
        let currentRot = 0;

        // بناء الأقسام
        categories.forEach((cat, i) => {
            const el = document.createElement('div');
            el.className = `cat-item ${i === 0 ? 'active' : ''}`;
            const angle = i * stepAngle;
            
            const x = 325 * Math.sin(angle * Math.PI / 180);
            const y = -325 * Math.cos(angle * Math.PI / 180);
            
            el.style.transform = `translate(${x}px, ${y}px)`;
            el.innerHTML = `<div class="img-frame"><img src="${cat.img}"></div><span>${cat.name}</span>`;
            gear.appendChild(el);
        });

        // نظام الحركة الانسيابية (Inertia)
        const mc = new Hammer(document.getElementById('drag-zone'));
        
        mc.on("pan", (e) => {
            // سحب مباشر بخفة 
            const dragPos = currentRot + (e.deltaX / 6);
            applyRot(dragPos);
        });

        mc.on("panend", (e) => {
            // إضافة ميزة الـ Momentum (السرعة) للحركة
            const velocity = e.velocityX * 15; 
            currentRot = Math.round((currentRot + velocity) / stepAngle) * stepAngle;

            // ضبط الحدود لعدم الخروج عن الأقسام
            const min = -(categories.length - 1) * stepAngle;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < min) currentRot = min;

            // حركة Snap ناعمة جداً باستخدام GSAP
            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.7, 
                ease: "power2.out", 
                onUpdate: () => {
                    const r = gsap.getProperty(gear, "rotation");
                    document.querySelectorAll('.cat-item').forEach(n => {
                        gsap.set(n.querySelector('.img-frame'), { rotation: -r });
                        gsap.set(n.querySelector('span'), { rotation: -r });
                    });
                }
            });

            const activeIdx = Math.abs(currentRot / stepAngle);
            updateUI(activeIdx);
        });

        function applyRot(r) {
            gsap.set(gear, { rotation: r });
            document.querySelectorAll('.cat-node').forEach(n => {
                gsap.set(n.querySelector('.img-frame'), { rotation: -r });
                gsap.set(n.querySelector('span'), { rotation: -r });
            });
        }

        function updateUI(idx) {
            document.querySelectorAll('.cat-item').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('cat-title').innerText = categories[idx].name;
        }

        init(); // استدعاء الوظائف الأساسية
    </script>
</body>
</html>
