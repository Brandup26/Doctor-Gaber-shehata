<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | التصميم المتكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #F5F5F5; --active-green: #89B42D; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        /* الهيدر العلوي */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
        }

        .cart-box { background: #1A1A1A; color: white; padding: 10px 22px; border-radius: 20px; position: relative; cursor: pointer; }

        /* منطقة الأقسام والكيرف */
        .hero-viewport {
            position: relative; height: 320px; width: 100%;
            background: #fff; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; padding-top: 60px;
        }

        /* الكيرف الداخلي السفلي */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -50px; left: -10%;
            width: 120%; height: 100px; background: var(--bg);
            border-top-left-radius: 50% 80px; border-top-right-radius: 50% 80px; z-index: 5;
        }

        .hero-gear {
            position: absolute; top: 220px; width: 600px; height: 600px;
            border-radius: 50%; will-change: transform; z-index: 1;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 90px; height: 110px;
            margin-left: -45px; margin-top: -45px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .hero-cat-item span { font-size: 13px; font-weight: 700; color: #777; margin-bottom: 8px; transition: 0.3s; }
        .hero-cat-item.active span { color: var(--active-green); font-weight: 900; }

        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%; background: #fff;
            overflow: hidden; border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-cat-item.active .cat-img-wrapper { transform: scale(1.15); border-color: var(--active-green); }
        .cat-img-wrapper img { width: 85%; height: 85%; object-fit: contain; }

        .active-indicator {
            position: absolute; bottom: 35px; width: 35px; height: 5px;
            background: var(--active-green); border-radius: 10px; z-index: 10;
        }

        /* السلة */
        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 2000; padding: 25px;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.1);
        }
        .user-input { width: 100%; background: #f8f8f8; padding: 15px; border-radius: 15px; margin-bottom: 10px; outline: none; border: 1px solid #eee; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
        <div class="cart-box" onclick="toggleCart(true)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div id="hero-gear" class="hero-gear"></div>
        <div class="active-indicator"></div>
    </div>

    <main class="p-5">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-gray-800">الأصناف</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">سلتك</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>
        <div id="cart-items" class="space-y-4 h-[50vh] overflow-y-auto mb-4"></div>
        <div class="border-t pt-4">
            <div class="flex justify-between mb-4 font-black text-xl">
                <span>الإجمالي:</span>
                <span id="total-price" class="text-green-600">0 ج.م</span>
            </div>
            <input type="text" id="u-name" class="user-input" placeholder="الاسم">
            <input type="tel" id="u-phone" class="user-input" placeholder="رقم الهاتف">
            <button onclick="sendOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-black">تأكيد عبر واتساب</button>
        </div>
    </div>

    <script>
        const categories = [
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' }
        ];

        const products = [
            { id: 1, name: 'شاورما عائلي', price: 150, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
            { id: 2, name: 'بيتزا إيطالي', price: 120, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' }
        ];

        let cart = [];
        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');
        const step = 35;

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = 250 * Math.sin(angle * Math.PI / 180);
                const y = -250 * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<span>${cat.name}</span><div class="cat-img-wrapper"><img src="${cat.img}"></div>`;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("panmove", (e) => {
            gearRotation += e.velocity * 4;
            applyRotation();
        });

        hammer.on("panend", () => {
            gearRotation = Math.round(gearRotation / step) * step;
            if (gearRotation > 0) gearRotation = 0;
            const min = -(categories.length - 1) * step;
            if (gearRotation < min) gearRotation = min;
            gsap.to(gear, { rotation: gearRotation, duration: 0.5 });
            updateActive(Math.abs(gearRotation/step));
        });

        function applyRotation() {
            gear.style.transform = `rotate(${gearRotation}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                it.querySelector('.cat-img-wrapper').style.transform = `rotate(${-gearRotation}deg)`;
                it.querySelector('span').style.transform = `rotate(${-gearRotation}deg)`;
            });
        }

        function updateActive(idx) {
            const cleanIdx = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === cleanIdx));
            document.getElementById('cat-title').innerText = categories[cleanIdx].name;
        }

        function renderFood() {
            document.getElementById('food-grid').innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-[25px] shadow-sm">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-600 font-black">${p.price}ج</span>
                        <button onclick="addToCart(${p.id})" class="bg-black text-white w-8 h-8 rounded-full">+</button>
                    </div>
                </div>`).join('');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('badge').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div><p class="font-bold text-sm">${item.name}</p><p class="text-xs text-gray-500">${item.price} ج.م</p></div>
                    </div>
                    <i onclick="removeFromCart(${index})" class="fa-solid fa-trash-can text-red-500 cursor-pointer"></i>
                </div>`).join('');
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0) + ' ج.م';
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); }
        function toggleCart(s) { document.getElementById('cart-panel').style.left = s ? '0' : '-100%'; }

        function sendOrder() {
            const name = document.getElementById('u-name').value;
            if(!name || cart.length === 0) return alert('أضف أصنافاً واكتب اسمك');
            const msg = `طلب جديد من: ${name}\nالأصناف: ${cart.map(i => i.name).join(', ')}\nالإجمالي: ${document.getElementById('total-price').innerText}`;
            window.open(`https://wa.me/201016991319?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
