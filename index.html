<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Food Menu - Perfect Match</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="luxury-header">
        <div class="nav-icons">
            <i class="fa-solid fa-bars"></i>
            <i class="fa-solid fa-shopping-bag"></i>
        </div>
        <div class="brand">
            <div class="text">
                <h3>مطعمك</h3>
                <p>الاسكندرية ميامي</p>
            </div>
            <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="logo">
        </div>
    </header>

    <div class="hero-title">
        <h1>طعم لذيذ ؟<br>اطلب الان</h1>
    </div>

    <div class="shape-container red-bg">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="curve-svg">
            <path d="M0,150 L0,50 C100,0 400,0 500,50 L500,150 Z" fill="#8b0000"></path>
        </svg>
        
        <div class="categories">
            <div class="cat-item">
                <div class="img-box"><img src="https://i.ibb.co/VvM6p7h/pasta.png"></div>
                <span>باستا</span>
            </div>
            <div class="cat-item featured">
                <div class="img-box"><img src="https://i.ibb.co/mS7zZ3S/burger.png"></div>
                <span>برجر</span>
            </div>
            <div class="cat-item">
                <div class="img-box"><img src="https://i.ibb.co/L5M4f4B/soup.png"></div>
                <span>الشوربة</span>
            </div>
        </div>
    </div>

    <div class="shape-container pink-bg">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="curve-svg secondary-curve">
            <path d="M0,150 L0,50 C100,0 400,0 500,50 L500,150 Z" fill="#d87070"></path>
        </svg>

        <div class="main-product">
            <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="floating-burger">
            <div class="info">
                <h2>تشكن برجر</h2>
                <p>350 ج.م</p>
            </div>
        </div>

        <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="side-img left">
        <img src="https://i.ibb.co/mS7zZ3S/burger.png" class="side-img right">
    </div>

</body>
</html>
