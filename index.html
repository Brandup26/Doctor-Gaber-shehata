<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو إبن سوريا - النسخة الذكية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-ios: #F2F2F7;
            --blue-ios: #007AFF;
            --white: #FFFFFF;
            --gray-ios: #8E8E93;
            --shadow: 0 4px 25px rgba(0,0,0,0.06);
            --transition-ios: all 0.5s cubic-bezier(0.32, 1, 0.23, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background-color: var(--bg-ios); color: #1C1C1E; overflow-x: hidden; }

        header {
            background: var(--white); padding: 20px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: var(--shadow); text-align: center; position: relative;
        }

        .main-logo { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 10px; object-fit: cover; }

        .cart-trigger {
            position: absolute; top: 25px; left: 20px; width: 50px; height: 50px;
            background: var(--white); border-radius: 15px; display: flex;
            align-items: center; justify-content: center; box-shadow: var(--shadow);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: #FF3B30;
            color: white; font-size: 11px; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid white;
        }

        .categories-scroll { display: flex; gap: 15px; padding: 25px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-card { text-align: center; min-width: 85px; cursor: pointer; }
        .cat-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: var(--shadow); transition: var(--transition-ios); }
        .cat-card.active img { border-color: var(--blue-ios); transform: scale(1.1); }
        .cat-card span { display: block; margin-top: 8px; font-weight: 700; font-size: 12px; }

        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px 120px; }

        .food-item { background: var(--white); border-radius: 24px; padding: 12px; box-shadow: var(--shadow); transition: 0.3s; }
        .food-item h3 { font-size: 14px; font-weight: 800; margin-bottom: 8px; text-align: center; }
        
        .price-options { display: flex; flex-direction: column; gap: 6px; }
        .price-btn {
            background: #F2F2F7; border: none; padding: 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
        }
        .price-btn:active { background: var(--blue-ios); color: white; transform: scale(0.95); }

        #cart-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 2000;
            visibility: hidden; opacity: 0; transition: var(--transition-ios);
            display: flex; align-items: flex-end;
        }
        #cart-sheet-overlay.active { visibility: visible; opacity: 1; }
        .ios-bottom-sheet {
            width: 100%; background: var(--white); border-top-left-radius: 35px;
            border-top-right-radius: 35px; padding: 20px; transform: translateY(100%);
            transition: var(--transition-ios); max-height: 85vh; overflow-y: auto;
        }
        #cart-sheet-overlay.active .ios-bottom-sheet { transform: translateY(0); }
        .handle-bar { width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 20px; }

        .cart-item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F2F2F7; }
        .customer-form input { width: 100%; padding: 16px; background: #F2F2F7; border: none; border-radius: 14px; margin-bottom: 10px; font-size: 14px; }
        .confirm-order-btn { width: 100%; padding: 18px; background: var(--blue-ios); color: white; border: none; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; }

        .flyer { position: fixed; z-index: 3000; width: 20px; height: 20px; background: var(--blue-ios); border-radius: 50%; pointer-events: none; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

<header>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-basket" style="font-size: 20px;"></i>
        <span id="cart-count">0</span>
    </div>
    <img src="logoo.jpg" alt="ابن سوريا" class="main-logo" onerror="this.src='https://via.placeholder.com/100'">
    <h2 style="font-size: 20px; font-weight: 900;">إبن سوريا</h2>
</header>

<div class="categories-scroll" id="cat-list"></div>
<div class="menu-container" id="food-grid">
    <p id="loading-msg" style="grid-column: 1/-1; text-align: center; padding: 40px;">جاري تحميل المنيو من الشيت الجديد...</p>
</div>

<div id="cart-sheet-overlay" onclick="if(event.target.id==='cart-sheet-overlay') toggleCart()">
    <div class="ios-bottom-sheet">
        <div class="handle-bar"></div>
        <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 15px;">طلباتك</h2>
        <div id="cart-items-list"></div>
        <div style="padding: 20px 0; display: flex; justify-content: space-between; font-size: 20px; font-weight: 900; color: var(--blue-ios);">
            <span>الإجمالي</span><span id="total-val">0 ج.م</span>
        </div>
        <div class="customer-form">
            <input type="text" id="c-name" placeholder="الاسم">
            <input type="tel" id="c-phone" placeholder="رقم الموبايل">
            <button class="confirm-order-btn" onclick="submitFinalOrder()">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>
</div>

<script>
    // الرابط المحدث الذي قمت بإرساله
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwVeN6ohlItpy6_3Fr5nIPaPgJoMoffwDfq85i8oG1c92XjW3wFknmB6Ahvj8BpQ/pub?output=csv';

    let products = [];
    let cart = [];

    async function loadData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            
            const rows = data.split('\n').filter(row => row.trim() !== '');
            products = rows.slice(1).map((row, index) => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                return {
                    id: index,
                    cat: cols[0] || 'أخرى',
                    name: cols[1] || 'صنف',
                    small: cols[2] || '',
                    medium: cols[3] || '',
                    large: cols[4] || ''
                };
            });

            document.getElementById('loading-msg').style.display = 'none';
            renderCats();
            render();
        } catch (e) { 
            console.error(e);
            document.getElementById('loading-msg').innerText = "حدث خطأ في تحميل البيانات.";
        }
    }

    function renderCats() {
        const uniqueCats = ['الكل', ...new Set(products.map(p => p.cat))];
        document.getElementById('cat-list').innerHTML = uniqueCats.map(c => `
            <div class="cat-card ${c === 'الكل' ? 'active' : ''}" onclick="filter('${c}', event)">
                <img src="logoo.jpg" onerror="this.src='https://via.placeholder.com/70'">
                <span>${c}</span>
            </div>
        `).join('');
    }

    function render(items = products) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-item">
                <h3>${p.name}</h3>
                <div class="price-options">
                    ${p.small && p.small !== '-' ? `<button class="price-btn" onclick="add('${p.name} (صغير)', ${p.small}, event)"><span>صغير</span> <span>${p.small}ج</span></button>` : ''}
                    ${p.medium && p.medium !== '-' ? `<button class="price-btn" onclick="add('${p.name} (وسط)', ${p.medium}, event)"><span>وسط</span> <span>${p.medium}ج</span></button>` : ''}
                    ${p.large && p.large !== '-' ? `<button class="price-btn" onclick="add('${p.name} (كبير)', ${p.large}, event)"><span>كبير</span> <span>${p.large}ج</span></button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function add(name, price, e) {
        cart.push({name, price: parseFloat(price)});
        updateUI();
        flyAnimation(e);
    }

    function flyAnimation(e) {
        const f = document.createElement('div');
        f.className = 'flyer';
        f.style.left = e.clientX + 'px';
        f.style.top = e.clientY + 'px';
        document.body.appendChild(f);
        const target = document.querySelector('.cart-trigger').getBoundingClientRect();
        setTimeout(() => { 
            f.style.left = (target.left + 25) + 'px'; 
            f.style.top = (target.top + 25) + 'px'; 
            f.style.opacity = '0'; 
        }, 50);
        setTimeout(() => f.remove(), 600);
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-item-row"><span>${i.name}</span><b>${i.price} ج.م</b></div>`;
        }).join('');
        document.getElementById('total-val').innerText = total + " ج.م";
    }

    function toggleCart() { document.getElementById('cart-sheet-overlay').classList.toggle('active'); }

    function filter(cat, e) {
        document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
        e.currentTarget.classList.add('active');
        render(cat === 'الكل' ? products : products.filter(p => p.cat === cat));
    }

    function submitFinalOrder() {
        const name = document.getElementById('c-name').value;
        const phone = document.getElementById('c-phone').value;
        if(!name || cart.length === 0) return alert("أكمل البيانات");
        let msg = `*طلب جديد من إبن سوريا*%0A*الاسم:* ${name}%0A*الهاتف:* ${phone}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText}`;
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    loadData();
</script>
</body>
</html>
