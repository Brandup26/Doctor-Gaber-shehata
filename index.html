<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | القياسات الدقيقة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        /* الهيدر المصغر */
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .cart-icon { width: 38px; height: 38px; background: #1A1A1A; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }

        /* منطقة الأقسام - تصغير الارتفاع */
        .slider-container {
            position: relative; height: 320px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
        }

        /* الخط الدائري (المسار الوهمي) - تصغير القطر ليناسب الأيقونات الصغيرة */
        .dotted-path {
            position: absolute; top: 160px; width: 420px; height: 420px;
            border: 1.2px dashed rgba(0,0,0,0.08); border-radius: 50%; z-index: 1;
        }

        .rotation-engine {
            position: absolute; top: 160px; width: 420px; height: 420px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .category-node {
            position: absolute; top: 50%; left: 50%; width: 80px;
            margin-left: -40px; margin-top: -40px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* تصغير الأيقونات */
        .img-circle {
            width: 65px; height: 65px; border-radius: 50%;
            background: white; border: 1.5px solid transparent;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
            display: flex; align-items: center; justify-content: center; transition: 0.4s ease;
        }
        .category-node.active .img-circle { border-color: var(--active-green); transform: scale(1.1); }
        .img-circle img { width: 80%; height: 80%; object-fit: contain; }

        /* تصغير الخط */
        .cat-label { margin-top: 8px; text-align: center; }
        .cat-label span { font-size: 11px; font-weight: 700; color: #aaa; transition: 0.3s; }
        .category-node.active span { color: var(--active-green); font-weight: 900; font-size: 12px; }

        .active-bar { width: 15px; height: 3px; background: transparent; border-radius: 10px; margin-top: 3px; }
        .category-node.active .active-bar { background: var(--active-green); }

        /* الكيرف السفلي الأبيض */
        .white-mask-curve {
            position: absolute; bottom: -40px; width: 130%; height: 140px;
            background: var(--bg); border-radius: 50% 50% 0 0; z-index: 20;
        }
    </style>
</head>
<body>

    <nav class="header">
        <div class="cart-icon"><i class="fa-solid fa-bag-shopping text-sm"></i><span class="absolute -top-1 -right-1 bg-red-600 text-[9px] w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">3</span></div>
        <h1 class="text-lg font-black">إبن سوريا<span class="text-green-600">.</span></h1>
    </nav>

    <div class="slider-container" id="touch-zone">
        <div class="dotted-path"></div>
        <div id="engine" class="rotation-engine"></div>
        <div class="white-mask-curve"></div>
    </div>

    <main class="p-4 relative z-30" style="margin-top: -45px;">
        <h2 id="current-title" class="text-2xl font-black mb-6 text-center text-gray-800">شاورما</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'سندوتشات', img: 'https://cdn-icons-png.flaticon.com/512/2362/2362313.png' }
        ];

        let rotationValue = 0;
        const engine = document.getElementById('engine');
        const angleStep = 45; 

        function createSlider() {
            categories.forEach((cat, i) => {
                const node = document.createElement('div');
                node.className = `category-node ${i === 0 ? 'active' : ''}`;
                const angle = i * angleStep;
                
                // تم وضع الأيقونة بدقة فوق المسار المنقط (نصف قطر 210)
                const x = 210 * Math.sin(angle * Math.PI / 180);
                const y = -210 * Math.cos(angle * Math.PI / 180);
                
                node.style.transform = `translate(${x}px, ${y}px)`;
                node.innerHTML = `
                    <div class="img-circle"><img src="${cat.img}"></div>
                    <div class="cat-label">
                        <span>${cat.name}</span>
                        <div class="active-bar mx-auto"></div>
                    </div>
                `;
                engine.appendChild(node);
            });
            renderProducts();
        }

        const hammer = new Hammer(document.getElementById('touch-zone'));
        hammer.on("pan", (e) => {
            let movement = rotationValue + (e.deltaX / 5);
            gsap.set(engine, { rotation: movement });
            keepIconsUpright(movement);
        });

        hammer.on("panend", (e) => {
            rotationValue = Math.round(gsap.getProperty(engine, "rotation") / angleStep) * angleStep;
            const minRot = -(categories.length - 1) * angleStep;
            if (rotationValue > 0) rotationValue = 0;
            if (rotationValue < minRot) rotationValue = minRot;

            gsap.to(engine, { 
                rotation: rotationValue, duration: 0.5, ease: "power2.out",
                onUpdate: () => keepIconsUpright(gsap.getProperty(engine, "rotation"))
            });
            updateActiveState(Math.abs(rotationValue / angleStep));
        });

        function keepIconsUpright(rot) {
            document.querySelectorAll('.category-node').forEach(node => {
                gsap.set(node, { rotation: -rot });
            });
        }

        function updateActiveState(idx) {
            const activeIndex = Math.round(idx);
            document.querySelectorAll('.category-node').forEach((node, i) => node.classList.toggle('active', i === activeIndex));
            document.getElementById('current-title').innerText = categories[activeIndex].name;
        }

        function renderProducts() {
            const data = [
                { name: 'شاورما عائلي', price: 150, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
                { name: 'بيتزا إيطالي', price: 120, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' }
            ];
            document.getElementById('product-list').innerHTML = data.map(p => `
                <div class="bg-white p-3 rounded-[25px] shadow-sm">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-[20px] mb-3">
                    <h3 class="font-bold text-gray-800 text-[12px] mb-2 text-right px-1">${p.name}</h3>
                    <div class="flex justify-between items-center px-1">
                        <span class="text-green-600 font-black text-sm">${p.price}ج</span>
                        <button class="bg-black text-white w-8 h-8 rounded-full flex items-center justify-center">+</button>
                    </div>
                </div>`).join('');
        }

        createSlider();
    </script>
</body>
</html>
