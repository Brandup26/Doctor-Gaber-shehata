<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | التصميم الدائري الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: pan-y; }

        /* الهيدر */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: white;
        }

        /* منطقة العرض */
        .hero-viewport {
            position: relative; height: 350px; width: 100%;
            background: white; overflow: hidden;
            display: flex; justify-content: center;
        }

        /* المسار الوهمي (الخرطوم) - يمر بمنتصف الأيقونات */
        .category-path-line {
            position: absolute; 
            top: 180px; /* مكان الخرطوم */
            width: 550px; height: 550px;
            border: 2px dashed rgba(0,0,0,0.1); 
            border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        /* الكيرف الأبيض السفلي لإخفاء باقي الدائرة */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -50px; left: -10%;
            width: 120%; height: 120px; background: var(--bg);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px; z-index: 10;
        }

        /* الترس الحامل للأقسام */
        .hero-gear {
            position: absolute; top: 180px; width: 600px; height: 600px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 90px; height: 120px;
            margin-left: -45px; margin-top: -60px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* اسم القسم فوق الأيقونة */
        .hero-cat-item span { 
            font-size: 14px; font-weight: 700; color: #999; 
            margin-bottom: 12px; transition: 0.3s;
            white-space: nowrap;
        }
        .hero-cat-item.active span { color: var(--active-green); font-weight: 900; transform: scale(1.1); }

        /* غلاف الصورة الدائري */
        .cat-img-wrapper {
            width: 85px; height: 85px; border-radius: 50%; background: #fff;
            padding: 5px; border: 2px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.07); transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
            background: white;
        }
        .hero-cat-item.active .cat-img-wrapper { 
            border-color: var(--active-green); 
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(137, 180, 45, 0.2);
        }
        .cat-img-wrapper img { width: 90%; height: 90%; object-fit: contain; border-radius: 50%; }

        /* مؤشر الاختيار */
        .active-indicator {
            position: absolute; bottom: 35px; width: 40px; height: 5px;
            background: var(--active-green); border-radius: 10px; z-index: 20;
        }

        /* تنسيق المنتجات */
        .product-card {
            background: white; border-radius: 25px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s;
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <div class="cart-box bg-black text-white p-2 px-4 rounded-full flex items-center gap-2">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="badge">0</span>
        </div>
        <h1 class="text-xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="category-path-line"></div> <div id="hero-gear" class="hero-gear"></div>
        <div class="active-indicator"></div>
    </div>

    <main class="p-5" style="margin-top: -20px; position: relative; z-index: 20;">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-gray-800 text-center">شاورما</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'ساندوتشات', img: 'https://cdn-icons-png.flaticon.com/512/2362/2362313.png' }
        ];

        const products = [
            { id: 1, name: 'شاورما عائلي', price: 150, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
            { id: 2, name: 'بيتزا إيطالي', price: 120, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' }
        ];

        let currentRot = 0;
        const gear = document.getElementById('hero-gear');
        const step = 50; // الزاوية بين كل قسم

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                // حساب الموقع على الدائرة (نصف القطر 275 ليكون فوق الخرطوم تماماً)
                const x = 275 * Math.sin(angle * Math.PI / 180);
                const y = -275 * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <span>${cat.name}</span>
                    <div class="cat-img-wrapper">
                        <img src="${cat.img}">
                    </div>
                `;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("pan", (e) => {
            // تحريك الترس مع حركة الإصبع
            let dragRot = currentRot + (e.deltaX / 5);
            gsap.set(gear, { rotation: dragRot });
            syncIcons(dragRot);
        });

        hammer.on("panend", (e) => {
            // حساب أقرب قسم للثبات عليه (Snapping)
            currentRot = Math.round(currentRot / step) * step;
            // حدود الدوران
            const maxRot = 0;
            const minRot = -(categories.length - 1) * step;
            
            if (currentRot > maxRot) currentRot = maxRot;
            if (currentRot < minRot) currentRot = minRot;

            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.5, 
                ease: "back.out(1.2)",
                onUpdate: () => syncIcons(gsap.getProperty(gear, "rotation"))
            });
            
            updateActiveState(Math.abs(currentRot / step));
        });

        function syncIcons(rot) {
            // تدوير الأيقونات والأسماء عكس اتجاه الترس لتظل معدولة
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                gsap.set(it.querySelector('.cat-img-wrapper'), { rotation: -rot });
                gsap.set(it.querySelector('span'), { rotation: -rot });
            });
        }

        function updateActiveState(idx) {
            const index = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => {
                it.classList.toggle('active', i === index);
            });
            document.getElementById('cat-title').innerText = categories[index].name;
        }

        function renderFood() {
            document.getElementById('food-grid').innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-600 font-black">${p.price} ج</span>
                        <button class="bg-black text-white w-8 h-8 rounded-full shadow-lg">+</button>
                    </div>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
