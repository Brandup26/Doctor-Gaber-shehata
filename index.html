<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطابق القوس الكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F2F2F2; }
        body { font-family: 'Alexandria', sans-serif; background: white; overflow-x: hidden; margin: 0; }

        /* منطقة الأقسام الخلفية بيضاء */
        .top-section {
            position: relative; 
            height: 280px; 
            width: 100%;
            background: white; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
        }

        /* المسار المنقط الأساسي */
        .path-circle {
            position: absolute; 
            top: 150px; /* مركز الدوران */
            width: 460px; height: 460px;
            border: 1.5px dashed rgba(0,0,0,0.1);
            border-radius: 50%;
            z-index: 1;
        }

        .rotation-hub {
            position: absolute; top: 150px; width: 460px; height: 460px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .item-node {
            position: absolute; top: 50%; left: 50%; width: 70px;
            margin-left: -35px; margin-top: -35px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .icon-box {
            width: 60px; height: 60px; border-radius: 50%;
            background: white; border: 1.5px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }
        .item-node.active .icon-box { border-color: var(--active-green); transform: scale(1.1); }
        .icon-box img { width: 75%; height: 75%; object-fit: contain; }

        .item-node span { font-size: 10px; margin-top: 5px; color: #999; font-weight: 700; }
        .item-node.active span { color: var(--active-green); }

        /* السر هنا: الكيرف الذي يغطي الأصناف */
        /* جعلناه دائرة تطابق المسار المنقط في القطر والمكان */
        .products-container {
            position: relative;
            background: var(--bg); /* لون خلفية الأصناف */
            min-height: 100vh;
            z-index: 20;
            /* رسم الكيرف في أعلى الحاوية ليكون مطابق للمنقط */
            margin-top: -100px; 
        }

        .products-container::before {
            content: "";
            position: absolute;
            top: -150px; /* سحب الدائرة للأعلى لتلتقي بالمنقط */
            left: 50%;
            transform: translateX(-50%);
            width: 460px; /* نفس عرض المسار المنقط */
            height: 460px; /* نفس ارتفاع المسار المنقط */
            background: var(--bg);
            border-radius: 50%;
            z-index: -1;
            /* الحافة العلوية ستكون هي الكيرف المطابق تماماً */
        }

        .content-wrapper { padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-section" id="drag-area">
        <div class="path-circle"></div>
        <div id="hub" class="rotation-hub"></div>
    </div>

    <main class="products-container">
        <div class="content-wrapper">
            <h2 id="title" class="text-xl font-black mb-6">شاورما</h2>
            <div id="list" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <script>
        const cats = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' }
        ];

        let rot = 0;
        const hub = document.getElementById('hub');
        const step = 45;

        function init() {
            cats.forEach((c, i) => {
                const node = document.createElement('div');
                node.className = `item-node ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = 230 * Math.sin(angle * Math.PI / 180);
                const y = -230 * Math.cos(angle * Math.PI / 180);
                node.style.transform = `translate(${x}px, ${y}px)`;
                node.innerHTML = `<div class="icon-box"><img src="${c.img}"></div><span>${c.name}</span>`;
                hub.appendChild(node);
            });
            render();
        }

        const h = new Hammer(document.getElementById('drag-area'));
        h.on("pan", (e) => {
            let m = rot + (e.deltaX / 5);
            gsap.set(hub, { rotation: m });
            document.querySelectorAll('.item-node').forEach(n => gsap.set(n, { rotation: -m }));
        });

        h.on("panend", () => {
            rot = Math.round(gsap.getProperty(hub, "rotation") / step) * step;
            if (rot > 0) rot = 0;
            const min = -(cats.length - 1) * step;
            if (rot < min) rot = min;

            gsap.to(hub, { 
                rotation: rot, duration: 0.4, 
                onUpdate: () => {
                    const r = gsap.getProperty(hub, "rotation");
                    document.querySelectorAll('.item-node').forEach(n => gsap.set(n, { rotation: -r }));
                }
            });
            const idx = Math.round(Math.abs(rot / step));
            document.querySelectorAll('.item-node').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('title').innerText = cats[idx].name;
        });

        function render() {
            document.getElementById('list').innerHTML = [1,2].map(() => `
                <div class="bg-white p-3 rounded-2xl shadow-sm">
                    <div class="w-full h-24 bg-gray-100 rounded-xl mb-2"></div>
                    <div class="h-3 w-3/4 bg-gray-200 rounded mx-auto mb-2"></div>
                    <div class="flex justify-between items-center mt-3"><span class="text-green-600 font-bold">95ج</span><div class="w-6 h-6 bg-black rounded-full"></div></div>
                </div>`).join('');
        }
        init();
    </script>
</body>
</html>
