<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إبن سوريا - المنيو الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-ios: #F2F2F7;
            --blue-ios: #007AFF;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --gradient: linear-gradient(135deg, #007AFF 0%, #00C6FF 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-ios); color: #1C1C1E; overflow-x: hidden; }

        header {
            background: var(--white); padding: 15px 20px;
            text-align: center; position: relative;
        }

        .main-logo { width: 70px; height: 70px; border-radius: 18px; margin-bottom: 5px; object-fit: cover; }

        /* تثبيت الأقسام في الأعلى */
        .sticky-wrapper {
            position: sticky; top: 0; z-index: 1000; background: var(--bg-ios);
            padding-bottom: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .categories-scroll { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-card { text-align: center; min-width: 85px; cursor: pointer; }
        .cat-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: var(--shadow); transition: 0.3s; background: white; }
        .cat-card.active img { border-color: var(--blue-ios); transform: scale(1.1); }
        .cat-card span { display: block; margin-top: 8px; font-weight: 800; font-size: 12px; color: #3A3A3C; }

        /* سلة الطلبات العائمة */
        .cart-trigger {
            position: fixed; bottom: 25px; left: 25px; width: 65px; height: 65px;
            background: var(--gradient); border-radius: 22px; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,122,255,0.4);
            cursor: pointer; z-index: 1500; transition: 0.3s;
        }
        .cart-trigger:active { transform: scale(0.9); }
        #cart-count {
            position: absolute; top: -5px; right: -5px; background: #FF3B30;
            color: white; font-size: 12px; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid white;
        }

        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 12px 120px; }

        .food-item { background: var(--white); border-radius: 22px; padding: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; justify-content: space-between; }
        .food-item h3 { font-size: 13px; font-weight: 800; margin-bottom: 10px; text-align: center; color: #1C1C1E; min-height: 35px; }
        
        .price-btn {
            background: #F2F2F7; border: none; padding: 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; margin-bottom: 5px;
        }
        .price-btn i { color: var(--blue-ios); }

        /* سلة الطلبات (iOS Sheet) */
        #cart-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000;
            visibility: hidden; opacity: 0; transition: 0.4s; display: flex; align-items: flex-end;
        }
        #cart-sheet-overlay.active { visibility: visible; opacity: 1; }
        
        .ios-bottom-sheet {
            width: 100%; background: var(--white); border-top-left-radius: 35px;
            border-top-right-radius: 35px; padding: 20px; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); max-height: 90vh; overflow-y: auto;
        }
        #cart-sheet-overlay.active .ios-bottom-sheet { transform: translateY(0); }
        
        .handle-bar { width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 20px; }

        .input-group { margin-bottom: 12px; }
        .input-group input { 
            width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #E5E5EA; 
            outline: none; font-size: 14px; font-weight: 600; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--blue-ios); background: #FBFBFF; }

        .confirm-order-btn { 
            width: 100%; padding: 18px; background: var(--gradient); color: white; 
            border: none; border-radius: 20px; font-size: 17px; font-weight: 800; 
            cursor: pointer; margin-top: 15px; box-shadow: 0 8px 25px rgba(0,122,255,0.3);
        }

        .cart-item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F2F2F7; }
    </style>
</head>
<body>

<header>
    <img src="logoo.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/100'">
    <h2 style="font-size: 20px; font-weight: 900;">إبن سوريا</h2>
</header>

<div class="sticky-wrapper">
    <div class="categories-scroll" id="cat-list"></div>
</div>

<div class="cart-trigger" onclick="toggleCart(true)">
    <i class="fas fa-shopping-bag" style="font-size: 25px; color: white;"></i>
    <span id="cart-count">0</span>
</div>

<div class="menu-container" id="food-grid"></div>

<div id="cart-sheet-overlay" onclick="if(event.target.id==='cart-sheet-overlay') toggleCart(false)">
    <div class="ios-bottom-sheet">
        <div class="handle-bar"></div>
        <h2 style="font-size: 22px; font-weight: 900; margin-bottom: 15px; text-align: center;">تفاصيل الطلب</h2>
        
        <div id="cart-items-list" style="margin-bottom: 20px;"></div>
        
        <div style="padding: 15px 0; display: flex; justify-content: space-between; font-size: 20px; font-weight: 900; color: var(--blue-ios); border-top: 2px solid #F2F2F7;">
            <span>الإجمالي</span><span id="total-val">0 ج.م</span>
        </div>

        <div class="input-group">
            <input type="text" id="cust-name" placeholder="الاسم الكريم">
        </div>
        <div class="input-group">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
        </div>
        <div class="input-group">
            <input type="text" id="cust-address" placeholder="العنوان بالتفصيل">
        </div>

        <button class="confirm-order-btn" onclick="submitFinalOrder()">
            تأكيد الطلب (واتساب) <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwVeN6ohlItpy6_3Fr5nIPaPgJoMoffwDfq85i8oG1c92XjW3wFknmB6Ahvj8BpQ/pub?output=csv';

    let products = [];
    let cart = [];
    let categories = [];

    async function loadData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== '');
            products = rows.slice(1).map((row, index) => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                return { id: index, cat: cols[0], name: cols[1], small: cols[2], medium: cols[3], large: cols[4] };
            });
            categories = [...new Set(products.map(p => p.cat))];
            renderCats();
            if(categories.length > 0) filter(categories[0]);
        } catch (e) { console.error(e); }
    }

    function renderCats() {
        document.getElementById('cat-list').innerHTML = categories.map((c, i) => `
            <div class="cat-card ${i===0?'active':''}" onclick="filter('${c}', event)">
                <img src="logo${i+1}.jpg" onerror="this.src='logoo.jpg'">
                <span>${c}</span>
            </div>
        `).join('');
    }

    function render(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-item">
                <h3>${p.name}</h3>
                <div class="price-options">
                    ${p.small && p.small !== '-' ? `<button class="price-btn" onclick="add('${p.name} (صغير)', ${p.small})"><span>${p.small}ج</span> <i class="fas fa-plus"></i></button>` : ''}
                    ${p.medium && p.medium !== '-' ? `<button class="price-btn" onclick="add('${p.name} (وسط)', ${p.medium})"><span>${p.medium}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.large && p.large !== '-' ? `<button class="price-btn" onclick="add('${p.name} (كبير)', ${p.large})"><span>${p.large}ج</span> <i class="fas fa-plus"></i></button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function add(name, price) {
        cart.push({name, price: parseFloat(price)});
        updateUI();
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-item-row"><span>${i.name}</span><span>${i.price}ج</span></div>`;
        }).join('');
        document.getElementById('total-val').innerText = total + " ج.م";
    }

    // وظيفة التحكم في السلة مع حماية زر الرجوع
    function toggleCart(show) {
        const overlay = document.getElementById('cart-sheet-overlay');
        if (show) {
            overlay.classList.add('active');
            window.history.pushState({cartOpen: true}, ""); // إضافة حالة للتاريخ
        } else {
            overlay.classList.remove('active');
        }
    }

    // الاستماع لزر الرجوع في الموبايل
    window.onpopstate = function(event) {
        const overlay = document.getElementById('cart-sheet-overlay');
        if (overlay.classList.contains('active')) {
            overlay.classList.remove('active');
        }
    };

    function submitFinalOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = document.getElementById('cust-address').value;
        
        if(!name || !phone || !address || cart.length === 0) return alert("برجاء إكمال البيانات واختيار الأصناف");
        
        let msg = `*طلب جديد من إبن سوريا*%0A%0A`;
        msg += `*الاسم:* ${name}%0A`;
        msg += `*الهاتف:* ${phone}%0A`;
        msg += `*العنوان:* ${address}%0A`;
        msg += `---%0A*الطلبات:*%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price}ج)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText}`;
        
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    loadData();
</script>
</body>
</html>
