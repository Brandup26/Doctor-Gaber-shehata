<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إبن سوريا - الفخامة الشامية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --main-dark: #121212; /* أسود فاخر */
            --card-dark: #1E1E1E; /* لون الكروت */
            --accent-gold: #D4AF37; /* ذهبي ملكي */
            --accent-orange: #E67E22; /* برتقالي دافئ */
            --text-white: #FFFFFF;
            --text-gray: #B0B0B0;
            --glass: rgba(255, 255, 255, 0.05);
            --transition-ultra: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--main-dark);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* هيدر سينمائي */
        header {
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(to right, var(--accent-gold), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-trigger {
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition-ultra);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-trigger:hover { background: rgba(255,255,255,0.1); }

        /* الأقسام بتصميم انسيابي جداً */
        .categories-nav {
            padding: 30px 5%;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .cat-item {
            background: var(--card-dark);
            padding: 12px 25px;
            border-radius: 12px;
            border: 1px solid var(--glass);
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition-ultra);
            color: var(--text-gray);
            font-weight: 500;
        }

        .cat-item.active {
            background: linear-gradient(45deg, var(--accent-orange), var(--accent-gold));
            color: white;
            border: none;
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        /* شبكة المنتجات */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 8% 50px;
        }

        .food-card {
            background: var(--card-dark);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--glass);
            transition: var(--transition-ultra);
            position: relative;
        }

        .food-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-orange);
        }

        .food-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: brightness(0.8);
            transition: 0.8s;
        }

        .food-card:hover img { filter: brightness(1); }

        .food-details { padding: 25px; text-align: center; }

        .food-details h3 { font-size: 22px; margin-bottom: 10px; }

        .food-price {
            font-size: 24px;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        /* زر الشراء - احترافي جداً */
        .buy-btn {
            background: var(--white);
            background: linear-gradient(45deg, #222, #333);
            color: white;
            border: 1px solid var(--glass);
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-ultra);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .buy-btn:hover {
            background: white;
            color: black;
        }

        /* سلة المشتريات - تصميم مودرن */
        #cart-panel {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            transition: var(--transition-ultra);
        }

        #cart-panel.open { left: 0; }

        .cart-inner {
            width: 450px;
            height: 100%;
            background: var(--main-dark);
            padding: 40px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            border-right: 1px solid var(--glass);
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            background: var(--card-dark);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--glass);
        }

        /* أنيميشن الطيران البطيء */
        .fly-unit {
            position: fixed;
            z-index: 9999;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 1.5s cubic-bezier(0.165, 0.84, 0.44, 1); /* بطيء جداً وانسيابي */
            pointer-events: none;
        }

        /* نموذج البيانات أسفل السلة */
        .customer-form {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .customer-form input {
            background: var(--card-dark);
            border: 1px solid var(--glass);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .customer-form input:focus { border-color: var(--accent-orange); }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .cart-inner { width: 100%; }
            .menu-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">إبن سوريا <i class="fas fa-crown"></i></div>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
        <span id="cart-count">0</span>
    </div>
</header>

<div style="text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 40px; font-weight: 900; margin-bottom: 10px;">أهلاً بك في عالم المذاق الشامي</h1>
    <p style="color: var(--text-gray);">نشا - شارع السوق - مقابل الريماس للسياحة</p>
</div>

<nav class="categories-nav" id="cats-list">
    <div class="cat-item active" onclick="filterData('الكل')">الكل</div>
</nav>

<div class="menu-container" id="menu-grid">
    </div>

<div id="cart-panel">
    <div class="cart-inner">
        <h2 style="margin-bottom: 30px;">طلباتك الفاخرة</h2>
        <div id="cart-list-items"></div>
        
        <div style="margin-top: 20px; font-size: 22px; border-top: 1px solid var(--glass); padding-top: 20px;">
            الإجمالي: <span style="color: var(--accent-gold);" id="total-price">0</span> ج.م
        </div>

        <div class="customer-form">
            <input type="text" id="c-name" placeholder="الاسم الكريم">
            <input type="tel" id="c-phone" placeholder="رقم التواصل">
            <input type="text" id="c-address" placeholder="عنوان التوصيل بدقة">
            <button class="whatsapp-btn" onclick="sendOrder()">
                إرسال الطلب للمطعم <i class="fab fa-whatsapp"></i>
            </button>
            <button onclick="toggleCart()" style="color: var(--text-gray); background:none; border:none; margin-top:10px; cursor:pointer;">العودة للمنيو</button>
        </div>
    </div>
</div>

<script>
    let cart = [];
    let products = [
        {id: 1, name: 'شاورما دجاج سوبر', price: 95, cat: 'شاورما', img: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=600'},
        {id: 2, name: 'مشويات إبن سوريا', price: 250, cat: 'مشويات', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=600'},
        {id: 3, name: 'فتة موزة شامية', price: 180, cat: 'أطباق', img: 'https://images.unsplash.com/photo-1541518763669-27fef04b14ea?q=80&w=600'},
        {id: 4, name: 'صحن مقبلات مشكل', price: 85, cat: 'مقبلات', img: 'https://images.unsplash.com/photo-1606491956689-2ea866880c84?q=80&w=600'}
    ];

    function renderProducts(data) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = data.map(p => `
            <div class="food-card">
                <img src="${p.img}" alt="${p.name}">
                <div class="food-details">
                    <h3>${p.name}</h3>
                    <span class="food-price">${p.price} ج.م</span>
                    <button class="buy-btn" onclick="addToCart(${p.id}, event)">
                        إضافة للطلب <i class="fas fa-plus-circle"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, e) {
        const p = products.find(i => i.id === id);
        cart.push(p);
        updateUI();
        
        // أنيميشن سينمائي بطيء
        const flyer = document.createElement('img');
        flyer.src = p.img;
        flyer.classList.add('fly-unit');
        flyer.style.left = e.clientX + 'px';
        flyer.style.top = e.clientY + 'px';
        document.body.appendChild(flyer);

        const target = document.querySelector('.cart-trigger').getBoundingClientRect();

        setTimeout(() => {
            flyer.style.left = target.left + 'px';
            flyer.style.top = target.top + 'px';
            flyer.style.transform = 'scale(0.1) rotate(45deg)';
            flyer.style.opacity = '0';
        }, 100);

        setTimeout(() => flyer.remove(), 1600);
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-list-items').innerHTML = cart.map((item, idx) => {
            total += item.price;
            return `
                <div class="cart-item-row">
                    <span>${item.name}</span>
                    <span style="color:var(--accent-gold)">${item.price} ج.م</span>
                </div>
            `;
        }).join('');
        document.getElementById('total-price').innerText = total;
    }

    function toggleCart() {
        document.getElementById('cart-panel').classList.toggle('open');
    }

    function sendOrder() {
        const name = document.getElementById('c-name').value;
        const address = document.getElementById('c-address').value;
        if(!name || cart.length === 0) return alert("فضلاً أكمل بياناتك");

        let msg = `*طلب جديد - مطعم إبن سوريا*%0A`;
        msg += `الاسم: ${name}%0Aالعنوان: ${address}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0A`);
        msg += `---%0Aالإجمالي: ${document.getElementById('total-price').innerText} ج.م`;

        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    renderProducts(products);
    // إضافة الأقسام
    const cats = ['الكل', ...new Set(products.map(p => p.cat))];
    document.getElementById('cats-list').innerHTML = cats.map(c => `
        <div class="cat-item ${c==='الكل'?'active':''}" onclick="filterData('${c}')">${c}</div>
    `).join('');

    function filterData(c) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        if(c === 'الكل') renderProducts(products);
        else renderProducts(products.filter(p => p.cat === c));
    }
</script>

</body>
</html>
