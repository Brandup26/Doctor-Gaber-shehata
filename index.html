<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | الترس التفاعلي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --accent: #B8860B; --bg: #FDFDFB; --text: #1A1A1A; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            overscroll-behavior-y: contain; /* يمنع تحديث الصفحة عند السحب لأسفل */
        }

        /* Nav & Cart */
        .top-nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(253, 253, 251, 0.9); backdrop-filter: blur(8px);
        }

        .cart-btn {
            background: var(--text); color: white; padding: 8px 20px;
            border-radius: 50px; font-weight: 700; display: flex; gap: 8px; align-items: center;
        }

        /* Gear Section */
        .gear-viewport {
            position: relative; height: 320px; width: 100%;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 80px; touch-action: none; /* ضروري لعمل السحب البرمجي */
        }

        .gear-main-container {
            position: absolute; top: 120px; width: 800px; height: 800px;
            border-radius: 50%; border: 1px dashed rgba(0,0,0,0.05);
            will-change: transform;
        }

        .cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 110px; height: 110px; margin-left: -55px; margin-top: -55px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto;
        }

        .cat-box {
            width: 75px; height: 75px; background: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s;
            border: 2px solid transparent; margin-bottom: 8px;
        }

        .cat-item.active .cat-box {
            background: var(--accent); color: white; transform: scale(1.15);
            box-shadow: 0 15px 30px rgba(184, 134, 11, 0.25);
        }

        .cat-item span { font-size: 13px; font-weight: 700; color: #aaa; transition: 0.3s; }
        .cat-item.active span { color: var(--text); transform: scale(1.1); }

        /* Indicator Line */
        .active-line {
            position: absolute; top: 225px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 4px; background: #4CAF50; border-radius: 10px; z-index: 50;
        }

        /* Products Grid */
        .products-area { padding: 0 20px 100px; transition: opacity 0.3s; }
        .p-card { background: white; border-radius: 25px; padding: 15px; border: 1px solid #f0f0f0; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <h1 class="text-xl font-bold">إبن سوريا</h1>
        <button class="cart-btn">
            <span id="c-count">0</span>
            <i class="fa-solid fa-bag-shopping"></i>
        </button>
    </nav>

    <div class="gear-viewport" id="interaction-area">
        <div class="active-line"></div>
        <div id="gear-wheel" class="gear-main-container">
            </div>
    </div>

    <main class="products-area" id="p-area">
        <h2 id="cat-display-name" class="text-2xl font-bold mb-6 px-2">البرجر</h2>
        <div id="p-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const categories = [
            { id: 'b', name: 'البرجر', icon: '🍔' },
            { id: 'p', name: 'البيتزا', icon: '🍕' },
            { id: 's', name: 'ساندوتشات', icon: '🌯' },
            { id: 'm', name: 'مكرونات', icon: '🍝' },
            { id: 'k', name: 'مقبلات', icon: '🍟' },
            { id: 'd', name: 'مشروبات', icon: '🥤' }
        ];

        let currentRotation = 0;
        let activeIndex = 0;
        const angleStep = 360 / categories.length;
        const gearWheel = document.getElementById('gear-wheel');

        // 1. بناء الترس
        function buildGear() {
            const radius = 380; 
            categories.forEach((cat, i) => {
                const angle = i * angleStep;
                const item = document.createElement('div');
                item.className = `cat-item ${i === 0 ? 'active' : ''}`;
                
                // حساب الموقع الابتدائي لكل صنف
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <div class="cat-box"><span class="text-3xl">${cat.icon}</span></div>
                    <span>${cat.name}</span>
                `;
                gearWheel.appendChild(item);
            });
            updateProducts();
        }

        // 2. تفعيل السحب (Drag Logic)
        const mc = new Hammer(document.getElementById('interaction-area'));
        mc.get('pan', { direction: Hammer.DIRECTION_HORIZONTAL });

        let startRot = 0;

        mc.on("panstart", () => {
            startRot = currentRotation;
            gearWheel.style.transition = 'none'; // إلغاء التنعيم أثناء السحب الفعلي
        });

        mc.on("panmove", (e) => {
            // تحويل مسافة السحب الأفقية إلى درجات دوران
            const dragRotation = e.deltaX * 0.2; 
            currentRotation = startRot + dragRotation;
            applyRotation(currentRotation);
        });

        mc.on("panend", (e) => {
            // حساب أقرب قسم عند ترك السحب (Snapping)
            activeIndex = Math.round(-currentRotation / angleStep);
            // لضمان استمرار الدوران بشكل صحيح
            snapToClosest();
        });

        function applyRotation(rot) {
            gearWheel.style.transform = `rotate(${rot}deg)`;
            // الحفاظ على الأيقونات معتدلة
            document.querySelectorAll('.cat-item').forEach((item, i) => {
                const box = item.querySelector('.cat-box');
                const span = item.querySelector('span');
                gsap.set([box, span], { rotation: -rot });
            });
        }

        function snapToClosest() {
            // تصحيح الـ Index ليكون ضمن مصفوفة الأقسام
            const wrappedIndex = ((activeIndex % categories.length) + categories.length) % categories.length;
            const targetRot = -activeIndex * angleStep;
            
            gsap.to(this, {
                duration: 0.6,
                onUpdate: () => {
                    currentRotation += (targetRot - currentRotation) * 0.2;
                    applyRotation(currentRotation);
                },
                onComplete: () => {
                    currentRotation = targetRot;
                    updateActiveState(wrappedIndex);
                },
                ease: "back.out(1.7)"
            });
        }

        function updateActiveState(index) {
            document.querySelectorAll('.cat-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            document.getElementById('cat-display-name').innerText = categories[index].name;
            updateProducts();
        }

        // 3. تحديث المنتجات (وهمي للعرض)
        function updateProducts() {
            const grid = document.getElementById('p-grid');
            const area = document.getElementById('p-area');
            area.style.opacity = '0';
            
            setTimeout(() => {
                grid.innerHTML = '';
                for(let i=0; i<4; i++) {
                    grid.innerHTML += `
                        <div class="p-card">
                            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="w-24 mx-auto mb-4">
                            <h3 class="font-bold text-sm">منتج من ${categories[activeIndex % categories.length].name}</h3>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-accent font-bold">120 ج.م</span>
                                <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center">+</div>
                            </div>
                        </div>`;
                }
                area.style.opacity = '1';
            }, 300);
        }

        buildGear();
    </script>
</body>
</html>
