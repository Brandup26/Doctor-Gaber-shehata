<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | التصميم المصلح</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; touch-action: none; }

        /* منطقة الأنبوبة */
        .viewport {
            position: relative; height: 320px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
        }

        /* الكيرفات المتطابقة */
        .curve {
            position: absolute; width: 620px; height: 620px;
            border-radius: 50%; z-index: 10; pointer-events: none;
        }
        .top { top: -380px; border-bottom: 2px dashed rgba(0,0,0,0.08); }
        .bottom { 
            bottom: -380px; background: var(--bg); 
            border-top: 2px dashed rgba(0,0,0,0.1);
            box-shadow: 0 -15px 30px rgba(0,0,0,0.02);
        }

        /* المحرك */
        .wheel {
            position: absolute; top: 160px; width: 620px; height: 620px;
            border-radius: 50%; z-index: 5; will-change: transform;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .node {
            position: absolute; top: 50%; left: 50%; width: 80px;
            margin-left: -40px; margin-top: -40px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .img-box {
            width: 65px; height: 65px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; transition: 0.3s;
        }
        .node.active .img-box { border-color: var(--gold); transform: scale(1.15); }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .node span { font-size: 11px; margin-top: 6px; color: #999; font-weight: 700; }
        .node.active span { color: #000; font-weight: 900; }

        /* قائمة الطعام */
        .menu { padding: 20px; position: relative; z-index: 20; margin-top: -50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: white; padding: 12px; border-radius: 20px; text-align: center; }
        .item div { height: 100px; background: #eee; border-radius: 15px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="viewport" id="slider">
        <div class="curve top"></div>
        <div class="wheel" id="wheel"></div>
        <div class="curve bottom"></div>
    </div>

    <div class="menu">
        <h2 id="title" style="text-align:center; font-weight:900; margin-bottom:20px;">مشويات</h2>
        <div class="grid">
            <div class="item"><div></div><p>منتج 1</p></div>
            <div class="item"><div></div><p>منتج 2</p></div>
        </div>
    </div>

    <script>
        const cats = [
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' }
        ];

        const wheel = document.getElementById('wheel');
        const step = 40; 
        let currentRot = 0;
        let startX = 0;
        let dragging = false;

        cats.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = `node ${i === 0 ? 'active' : ''}`;
            const angle = i * step;
            const x = 310 * Math.sin(angle * Math.PI / 180);
            const y = -310 * Math.cos(angle * Math.PI / 180);
            div.style.transform = `translate(${x}px, ${y}px)`;
            div.innerHTML = `<div class="img-box"><img src="${c.img}"></div><span>${c.name}</span>`;
            wheel.appendChild(div);
        });

        // تحكم لمس بسيط ومضمون
        const area = document.getElementById('slider');
        area.onmousedown = area.ontouchstart = (e) => {
            dragging = true;
            startX = e.pageX || e.touches[0].pageX;
            wheel.style.transition = 'none';
        };

        window.onmousemove = window.ontouchmove = (e) => {
            if(!dragging) return;
            const x = e.pageX || e.touches[0].pageX;
            const move = (x - startX) * 0.3;
            apply(currentRot + move);
        };

        window.onmouseup = window.ontouchend = (e) => {
            if(!dragging) return;
            dragging = false;
            // حساب أقرب زاوية
            const final = gsap?.getProperty ? 0 : 0; // لضمان عدم الاعتماد على أي مكتبة
            // منطق Snap
            const x = e.pageX || (e.changedTouches ? e.changedTouches[0].pageX : 0);
            const diff = (x - startX) * 0.3;
            currentRot = Math.round((currentRot + diff) / step) * step;

            if(currentRot > 0) currentRot = 0;
            if(currentRot < -(cats.length-1)*step) currentRot = -(cats.length-1)*step;

            wheel.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            apply(currentRot);
            update();
        };

        function apply(r) {
            wheel.style.transform = `rotate(${r}deg)`;
            document.querySelectorAll('.node').forEach(n => {
                const base = n.style.transform.split('rotate')[0];
                n.style.transform = `${base} rotate(${-r}deg)`;
            });
        }

        function update() {
            const idx = Math.abs(currentRot / step);
            document.querySelectorAll('.node').forEach((n, i) => n.classList.toggle('active', i === idx));
            document.getElementById('title').innerText = cats[idx].name;
        }
    </script>
</body>
</html>
