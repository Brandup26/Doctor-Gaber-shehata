<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | التصميم البطل المتكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #F5F5F5; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        /* الهيدر العلوي - مستوحى من فخامة الصور */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
        }
        .user-points { display: flex; gap: 8px; font-weight: 700; font-size: 14px; }
        .logo { font-size: 20px; font-weight: 900; color: #1A1A1A; }
        .logo span { color: #D4AF37; }

        /* منطقة الأقسام (الدائري البطل) */
        .hero-viewport {
            position: relative; height: 350px; width: 100%;
            background: #fff; overflow: hidden; touch-action: none;
            display: flex; justify-content: center; padding-top: 60px;
        }

        /* المسار الدائري (الخط الوهمي) كما في الصور */
        .category-path {
            position: absolute; top: 160px; width: 500px; height: 500px;
            border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        /* الكيرف الداخلي السفلي المتقاطع مع المنتجات - مطابق للصور */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -60px; left: -10%;
            width: 120%; height: 120px; background: var(--bg);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px; z-index: 10;
        }

        /* المحرك الدائري للأقسام */
        .hero-gear {
            position: absolute; top: 160px; width: 600px; height: 600px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 90px; height: 110px;
            margin-left: -45px; margin-top: -45px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .hero-cat-item span { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; transition: 0.3s; }
        .hero-cat-item.active span { color: #1A1A1A; font-weight: 900; }

        /* صور الأقسام الحقيقية مستديرة - كما في الصور المرفقة */
        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%; background: #fff;
            overflow: hidden; border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
        }
        .hero-cat-item.active .cat-img-wrapper { transform: scale(1.15); border-color: var(--gold); }
        
        /* صور حقيقية للطعام كما طلبت */
        .cat-img-wrapper img { width: 90%; height: 90%; object-fit: contain; }

        /* قائمة الطعام بالأسفل */
        .food-grid { padding: 20px; margin-top: -50px; position: relative; z-index: 20; }
        .food-item {
            background: #fff; border-radius: 20px; padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .add-btn { background: #000; color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <div class="user-points"><i class="fa-solid fa-gem text-amber-500 mt-1"></i> 1256</div>
        <div class="logo">ليالي <span>الشام</span></div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="category-path"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="food-grid">
        <h2 id="cat-title" class="text-3xl font-black mb-8 text-center text-gray-800">مشويات</h2>
        <div id="food-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const categories = [
            // استبدال الأيقونات بصور حقيقية (عالية الجودة وبخلفية شفافة)
            { name: 'مشويات', img: 'https://i.ibb.co/MSX9p9p/grill.png' }, // صورة واقعية لكباب ومشاوي
            { name: 'شاورما', img: 'https://i.ibb.co/7Xp9p9p/shawarma.png' }, // صورة واقعية لشاورما عربي
            { name: 'بيتزا', img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' }, // صورة واقعية لقطعة بيتزا
            { name: 'برجر', img: 'https://i.ibb.co/vX8p5vX/burger.png' }     // صورة واقعية لبرجر ضخم
        ];

        const products = [
            { id: 1, name: 'كباب حلبي', price: 180, img: 'https://images.unsplash.com/photo-1598511757337-fe2cafc31ba0?w=400' },
            { id: 2, name: 'شاورما دجاج عائلي', price: 140, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' }
        ];

        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');
        const stepAngle = 40; // تقريب الأقسام من بعضها لمظهر أكثر كثافة

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * stepAngle;
                
                // حساب التمركز على الدائرة (نصف القطر 250)
                const x = 250 * Math.sin(angle * Math.PI / 180);
                const y = -250 * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <span>${cat.name}</span>
                    <div class="cat-img-wrapper">
                        <img src="${cat.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                    </div>
                `;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("pan", (e) => {
            let dragRotation = gearRotation + (e.deltaX / 5);
            applyRotation(dragRotation);
        });

        hammer.on("panend", (e) => {
            // حساب أقرب قسم للثبات عليه (Snap)
            gearRotation = Math.round(gearRotation / stepAngle) * stepAngle;
            
            // حدود الدوران
            const maxRot = 0;
            const minRot = -(categories.length - 1) * stepAngle;
            
            if (gearRotation > maxRot) gearRotation = maxRot;
            if (gearRotation < minRot) gearRotation = minRot;

            gsap.to(gear, { rotation: gearRotation, duration: 0.5 });
            updateActive(Math.abs(gearRotation/stepAngle));
        });

        function applyRotation(rot) {
            gear.style.transform = `rotate(${rot}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                // تدوير الأيقونات والأسماء عكس اتجاه الترس لتظل معدولة
                it.querySelector('.cat-img-wrapper').style.transform = `rotate(${-rot}deg)`;
                it.querySelector('span').style.transform = `rotate(${-rot}deg)`;
            });
        }

        function updateActive(idx) {
            const index = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === index));
            document.getElementById('cat-title').innerText = categories[index].name;
        }

        function renderFood() {
            document.getElementById('food-list').innerHTML = products.map(p => `
                <div class="food-item">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-sm text-gray-800">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-amber-600 font-black">${p.price}ج</span>
                        <button class="add-btn"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
