<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو إبن سوريا - النسخة الاحترافية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-ios: #F2F2F7;
            --blue-ios: #007AFF;
            --white: #FFFFFF;
            --shadow: 0 4px 25px rgba(0,0,0,0.1);
            --transition-ios: all 0.5s cubic-bezier(0.32, 1, 0.23, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-ios); color: #1C1C1E; overflow-x: hidden; }

        header {
            background: var(--white); padding: 25px 20px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: var(--shadow); text-align: center; position: relative;
        }

        .main-logo { width: 90px; height: 90px; border-radius: 25px; margin-bottom: 10px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .cart-trigger {
            position: absolute; top: 30px; left: 20px; width: 50px; height: 50px;
            background: var(--white); border-radius: 18px; display: flex;
            align-items: center; justify-content: center; box-shadow: var(--shadow);
            cursor: pointer;
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: #FF3B30;
            color: white; font-size: 12px; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid white;
        }

        .categories-scroll { display: flex; gap: 15px; padding: 25px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-card { text-align: center; min-width: 100px; cursor: pointer; }
        .cat-card img { 
            width: 85px; height: 85px; border-radius: 50%; 
            object-fit: cover; border: 4px solid white; 
            box-shadow: var(--shadow); transition: var(--transition-ios);
            background: #fff;
        }
        .cat-card.active img { border-color: var(--blue-ios); transform: scale(1.15); }
        .cat-card span { display: block; margin-top: 10px; font-weight: 800; font-size: 13px; color: #3A3A3C; }

        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 15px 120px; }

        .food-item { 
            background: var(--white); border-radius: 28px; padding: 18px; 
            box-shadow: var(--shadow); position: relative; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .food-item h3 { font-size: 15px; font-weight: 800; margin-bottom: 15px; text-align: center; color: #1C1C1E; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .price-options { display: flex; flex-direction: column; gap: 10px; }
        .price-btn {
            background: #F2F2F7; border: none; padding: 12px; border-radius: 16px;
            font-size: 12px; font-weight: 700; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .price-btn i { color: var(--blue-ios); font-size: 16px; }
        .price-btn:active { background: var(--blue-ios); color: white; transform: scale(0.95); }
        .price-btn:active i { color: white; }

        /* سلة الطلبات iOS Style */
        #cart-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000;
            visibility: hidden; opacity: 0; transition: var(--transition-ios);
            display: flex; align-items: flex-end;
        }
        #cart-sheet-overlay.active { visibility: visible; opacity: 1; }
        .ios-bottom-sheet {
            width: 100%; background: rgba(255,255,255,0.95); border-top-left-radius: 40px;
            border-top-right-radius: 40px; padding: 25px; transform: translateY(100%);
            transition: var(--transition-ios); max-height: 85vh; overflow-y: auto;
        }
        #cart-sheet-overlay.active .ios-bottom-sheet { transform: translateY(0); }
        .handle-bar { width: 45px; height: 6px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 25px; }

        .cart-item-row { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #E5E5EA; font-weight: 700; }
        .confirm-order-btn { width: 100%; padding: 20px; background: var(--blue-ios); color: white; border: none; border-radius: 22px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }

        .flyer { position: fixed; z-index: 3000; width: 25px; height: 25px; background: var(--blue-ios); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; pointer-events: none; transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
    </style>
</head>
<body>

<header>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-cart" style="font-size: 22px; color: var(--blue-ios);"></i>
        <span id="cart-count">0</span>
    </div>
    <img src="logoo.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/100'">
    <h2 style="font-size: 24px; font-weight: 900; color: #1c1c1e;">إبن سوريا</h2>
</header>

<div class="categories-scroll" id="cat-list"></div>
<div class="menu-container" id="food-grid"></div>

<div id="cart-sheet-overlay" onclick="if(event.target.id==='cart-sheet-overlay') toggleCart()">
    <div class="ios-bottom-sheet">
        <div class="handle-bar"></div>
        <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 20px; text-align: center;">سلة طلباتك</h2>
        <div id="cart-items-list"></div>
        <div style="padding: 25px 0; display: flex; justify-content: space-between; font-size: 24px; font-weight: 900; color: var(--blue-ios);">
            <span>الإجمالي</span><span id="total-val">0 ج.م</span>
        </div>
        <input type="text" id="c-name" placeholder="اكتب اسمك هنا..." style="width:100%; padding: 18px; border-radius: 18px; border: 2px solid #F2F2F7; margin-bottom:15px; outline: none; font-size: 16px; font-weight: 600;">
        <button class="confirm-order-btn" onclick="submitFinalOrder()">تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i></button>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwVeN6ohlItpy6_3Fr5nIPaPgJoMoffwDfq85i8oG1c92XjW3wFknmB6Ahvj8BpQ/pub?output=csv';

    // صور حقيقية للأقسام (مختارة بعناية لتناسب المنيو)
    const realImages = {
        'البيتزا': 'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=200&q=80',
        'الكريب': 'https://images.unsplash.com/photo-1519676867240-f03562e64548?auto=format&fit=crop&w=200&q=80',
        'الوجبات الغربي': 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=200&q=80',
        'المقبلات': 'https://images.unsplash.com/photo-1573016608964-b44b827f374c?auto=format&fit=crop&w=200&q=80',
        'الساندوتشات': 'https://images.unsplash.com/photo-1550507992-eb63ffee0847?auto=format&fit=crop&w=200&q=80',
        'المشروبات': 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=200&q=80'
    };

    let products = [];
    let cart = [];
    let categories = [];

    async function loadData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== '');
            
            products = rows.slice(1).map((row, index) => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                return { id: index, cat: cols[0], name: cols[1], small: cols[2], medium: cols[3], large: cols[4] };
            });

            categories = [...new Set(products.map(p => p.cat))];
            renderCats();
            if(categories.length > 0) filter(categories[0]);
        } catch (e) { console.error(e); }
    }

    function renderCats() {
        document.getElementById('cat-list').innerHTML = categories.map((c, i) => `
            <div class="cat-card ${i===0?'active':''}" onclick="filter('${c}', event)">
                <img src="${realImages[c] || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=200&q=80'}">
                <span>${c}</span>
            </div>
        `).join('');
    }

    function render(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-item">
                <h3>${p.name}</h3>
                <div class="price-options">
                    ${p.small && p.small !== '-' ? `<button class="price-btn" onclick="add('${p.name} (صغير)', ${p.small}, event)"><span>صغير: ${p.small}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.medium && p.medium !== '-' ? `<button class="price-btn" onclick="add('${p.name} (وسط)', ${p.medium}, event)"><span>وسط: ${p.medium}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.large && p.large !== '-' ? `<button class="price-btn" onclick="add('${p.name} (كبير)', ${p.large}, event)"><span>كبير: ${p.large}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function add(name, price, e) {
        cart.push({name, price: parseFloat(price)});
        updateUI();
        flyAnimation(e);
    }

    function flyAnimation(e) {
        const f = document.createElement('div');
        f.className = 'flyer';
        f.innerHTML = '<i class="fas fa-shopping-basket"></i>';
        f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
        document.body.appendChild(f);
        const target = document.querySelector('.cart-trigger').getBoundingClientRect();
        setTimeout(() => { 
            f.style.left = (target.left + 25) + 'px'; 
            f.style.top = (target.top + 25) + 'px'; 
            f.style.opacity = '0'; 
            f.style.transform = 'scale(0.5)';
        }, 50);
        setTimeout(() => f.remove(), 700);
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-item-row"><span>${i.name}</span><span>${i.price} ج.م</span></div>`;
        }).join('');
        document.getElementById('total-val').innerText = total + " ج.م";
    }

    function toggleCart() { document.getElementById('cart-sheet-overlay').classList.toggle('active'); }

    function filter(cat, e) {
        if(e) {
            document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
            e.currentTarget.classList.add('active');
        }
        render(products.filter(p => p.cat === cat));
    }

    function submitFinalOrder() {
        const name = document.getElementById('c-name').value;
        if(!name || cart.length === 0) return alert("من فضلك اكتب اسمك واختر طلباتك أولاً");
        let msg = `*طلب جديد من إبن سوريا*%0A*العميل:* ${name}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price}ج)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText}`;
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    loadData();
</script>
</body>
</html>
