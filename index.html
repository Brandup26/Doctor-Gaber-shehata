<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tosta Menu - منيو توستا الكامل</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    .loader { border-top-color: #f59e0b; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 pb-24">

<header class="bg-amber-500 text-white py-12 px-6 text-center rounded-b-[3rem] shadow-xl">
  <h1 class="text-4xl font-black mb-2">Tosta - توستا</h1>
  <p class="opacity-90">المنيو الكامل (١٨٠ صنف) - من الشيت مباشرة</p>
</header>

<div id="loading" class="flex flex-col items-center justify-center py-20">
  <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
  <p class="text-gray-500 font-bold">جاري تحميل الـ ١٨٠ صنف من الشيت...</p>
</div>

<main class="max-w-md mx-auto px-4 -mt-8 space-y-8" id="menu-root"></main>

<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
  <button onclick="toggleDrawer(true)" class="bg-black text-white px-8 py-4 rounded-full font-black text-lg shadow-2xl flex items-center gap-3">
    🛒 <span id="cta-label">السلة (٠)</span>
  </button>
</div>

<div id="backdrop" onclick="toggleDrawer(false)" class="fixed inset-0 bg-black/60 z-[100] opacity-0 pointer-events-none transition-opacity duration-300"></div>
<div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white z-[101] rounded-t-[2.5rem] flex flex-col max-h-[90vh] translate-y-full shadow-2xl transition-transform duration-400">
   <div class="p-6 border-b flex justify-between items-center">
    <h2 class="text-xl font-black">طلباتك 🛒</h2>
    <button onclick="toggleDrawer(false)" class="text-2xl font-bold">✕</button>
  </div>
  <div class="p-6 overflow-y-auto flex-1">
    <div id="cart-list" class="space-y-4 mb-6"></div>
    <div id="form-area" class="hidden space-y-3 border-t pt-6">
       <input id="f-name" type="text" placeholder="الاسم" class="w-full bg-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-amber-500">
       <input id="f-phone" type="tel" placeholder="رقم الموبايل" class="w-full bg-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-amber-500">
       <textarea id="f-address" placeholder="العنوان بالتفصيل" class="w-full bg-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-amber-500"></textarea>
    </div>
  </div>
  <div id="footer-area" class="p-6 border-t hidden">
    <div class="flex justify-between items-center mb-4 text-xl font-black">
      <span>الإجمالي:</span><span id="total-price" class="text-amber-600">0 ريال</span>
    </div>
    <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg">إرسال الطلب ✅</button>
  </div>
</div>

<script>
const WHATSAPP = '201003800314';
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz_K_7-turn6-Q/exec';

let ALL_ITEMS = [];
let cart = {};

// 1. وظيفة جلب البيانات من الشيت
async function loadMenu() {
  try {
    const response = await fetch(SHEET_URL);
    const data = await response.json();
    // بنفترض إن السكريبت بتاعك بيرجع Array اسمه data أو هو نفسه Array
    ALL_ITEMS = Array.isArray(data) ? data : data.items; 
    
    document.getElementById('loading').classList.add('hidden');
    renderMenu(ALL_ITEMS);
  } catch (error) {
    console.error("خطأ في جلب البيانات:", error);
    document.getElementById('loading').innerHTML = "فشل تحميل الأصناف، تأكد من إعدادات الـ Apps Script";
  }
}

function renderMenu(items) {
  const root = document.getElementById('menu-root');
  // تقسيم الأصناف حسب التصنيف (Category)
  const categories = [...new Set(items.map(i => i.category || 'أصناف متنوعة'))];
  
  root.innerHTML = categories.map(cat => `
    <div>
      <h2 class="text-xl font-black mb-4 border-r-4 border-amber-500 pr-3">${cat}</h2>
      <div class="grid gap-3">
        ${items.filter(i => (i.category || 'أصناف متنوعة') === cat).map(i => `
          <div class="bg-white p-3 rounded-3xl flex gap-4 items-center shadow-sm border border-gray-100">
            <div class="flex-1">
              <h3 class="font-bold text-base text-gray-800">${i.name}</h3>
              <p class="text-amber-600 font-black">${i.price} ريال</p>
            </div>
            <button onclick="add('${i.name}', ${i.price})" class="bg-amber-500 text-white w-10 h-10 rounded-xl font-black shadow-md active:scale-90 transition-transform">+</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function add(name, price) {
  cart[name] = (cart[name] || 0) + 1;
  const count = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById('cta-label').innerText = `السلة (${count})`;
}

function toggleDrawer(open) {
  document.getElementById('drawer').style.transform = open ? 'translateY(0)' : 'translateY(100%)';
  document.getElementById('backdrop').style.opacity = open ? '1' : '0';
  document.getElementById('backdrop').style.pointerEvents = open ? 'auto' : 'none';
  if(open) renderCart();
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const names = Object.keys(cart);
  if(!names.length) {
    list.innerHTML = '<p class="text-center text-gray-400 py-10">السلة فارغة</p>';
    return;
  }
  document.getElementById('form-area').classList.remove('hidden');
  document.getElementById('footer-area').classList.remove('hidden');
  let total = 0;
  list.innerHTML = names.map(name => {
    // البحث عن السعر من القائمة الأصلية
    const item = ALL_ITEMS.find(i => i.name === name);
    total += item.price * cart[name];
    return `<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
      <div><span class="font-bold">${name}</span> <span class="text-xs text-gray-500 text-amber-600">x${cart[name]}</span></div>
      <span class="font-black text-amber-600">${item.price * cart[name]} ريال</span>
    </div>`;
  }).join('');
  document.getElementById('total-price').innerText = total + " ريال";
}

async function sendOrder() {
  const n = document.getElementById('f-name').value;
  const p = document.getElementById('f-phone').value;
  const a = document.getElementById('f-address').value;
  if(!n || !p || !a) return alert("اكتب بياناتك يا وحش!");

  const itemsTxt = Object.entries(cart).map(([name, q]) => `${name} (${q})`).join(' - ');
  const total = document.getElementById('total-price').innerText;

  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: n, phone: p, address: a, items: itemsTxt, total: total }) });

  const msg = `🍕 طلب جديد من توستا\n👤 العميل: ${n}\n📞 تليفون: ${p}\n📍 العنوان: ${a}\n📦 الطلبات: ${itemsTxt}\n💰 الإجمالي: ${total}`;
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
}

// تشغيل جلب البيانات عند فتح الموقع
loadMenu();
</script>
</body>
</html>
