<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | النموذج المتطابق</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F8F9FA; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        .cart-icon { width: 45px; height: 45px; background: #1A1A1A; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }

        /* منطقة الأقسام - التصميم الدائري */
        .slider-container {
            position: relative; height: 380px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
        }

        /* الخط الوهمي المنقط خلف الأيقونات */
        .dotted-path {
            position: absolute; top: 150px; width: 550px; height: 550px;
            border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%; z-index: 1;
        }

        .rotation-engine {
            position: absolute; top: 150px; width: 600px; height: 600px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .category-node {
            position: absolute; top: 50%; left: 50%; width: 100px;
            margin-left: -50px; margin-top: -50px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* تصميم الأيقونة الدائري المرتفع */
        .img-circle {
            width: 85px; height: 85px; border-radius: 50%;
            background: white; border: 2px solid transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            display: flex; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .category-node.active .img-circle { border-color: var(--active-green); transform: scale(1.18) translateY(-5px); }
        .img-circle img { width: 85%; height: 85%; object-fit: contain; }

        .cat-label { margin-top: 12px; text-align: center; }
        .cat-label span { font-size: 14px; font-weight: 700; color: #999; transition: 0.3s; }
        .category-node.active span { color: var(--active-green); font-weight: 900; font-size: 15px; }

        .active-bar { width: 20px; height: 4px; background: transparent; border-radius: 10px; margin-top: 4px; transition: 0.3s; }
        .category-node.active .active-bar { background: var(--active-green); width: 30px; }

        /* الكيرف السفلي الأبيض العميق (الموجود في الصورة) */
        .white-mask-curve {
            position: absolute; bottom: -60px; width: 150%; height: 180px;
            background: var(--bg); border-radius: 50% 50% 0 0; z-index: 20;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

    <nav class="header">
        <div class="cart-icon"><i class="fa-solid fa-bag-shopping"></i><span class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">3</span></div>
        <h1 class="text-2xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
    </nav>

    <div class="slider-container" id="touch-zone">
        <div class="dotted-path"></div>
        <div id="engine" class="rotation-engine"></div>
        <div class="white-mask-curve"></div>
    </div>

    <main class="p-5 relative z-30" style="margin-top: -60px;">
        <h2 id="current-title" class="text-3xl font-black mb-8 text-center text-gray-800">شاورما</h2>
        <div id="product-list" class="grid grid-cols-2 gap-5"></div>
    </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'سندوتشات', img: 'https://cdn-icons-png.flaticon.com/512/2362/2362313.png' }
        ];

        let rotationValue = 0;
        const engine = document.getElementById('engine');
        const angleStep = 40; // زاوية التباعد بين الأيقونات

        function createSlider() {
            categories.forEach((cat, i) => {
                const node = document.createElement('div');
                node.className = `category-node ${i === 0 ? 'active' : ''}`;
                const angle = i * angleStep;
                
                // حساب التموضع الدائري - نصف القطر 280
                const x = 280 * Math.sin(angle * Math.PI / 180);
                const y = -280 * Math.cos(angle * Math.PI / 180);
                
                node.style.transform = `translate(${x}px, ${y}px)`;
                node.innerHTML = `
                    <div class="img-circle"><img src="${cat.img}"></div>
                    <div class="cat-label">
                        <span>${cat.name}</span>
                        <div class="active-bar mx-auto"></div>
                    </div>
                `;
                engine.appendChild(node);
            });
            renderProducts();
        }

        const hammer = new Hammer(document.getElementById('touch-zone'));
        hammer.on("pan", (e) => {
            let movement = rotationValue + (e.deltaX / 6);
            gsap.set(engine, { rotation: movement });
            keepIconsUpright(movement);
        });

        hammer.on("panend", (e) => {
            rotationValue = Math.round(gsap.getProperty(engine, "rotation") / angleStep) * angleStep;
            
            // حدود الدوران
            const maxRot = 0;
            const minRot = -(categories.length - 1) * angleStep;
            if (rotationValue > maxRot) rotationValue = maxRot;
            if (rotationValue < minRot) rotationValue = minRot;

            gsap.to(engine, { 
                rotation: rotationValue, duration: 0.5, ease: "back.out(1.2)",
                onUpdate: () => keepIconsUpright(gsap.getProperty(engine, "rotation"))
            });
            updateActiveState(Math.abs(rotationValue / angleStep));
        });

        function keepIconsUpright(rot) {
            document.querySelectorAll('.category-node').forEach(node => {
                gsap.set(node, { rotation: -rot });
            });
        }

        function updateActiveState(idx) {
            const activeIndex = Math.round(idx);
            document.querySelectorAll('.category-node').forEach((node, i) => node.classList.toggle('active', i === activeIndex));
            document.getElementById('current-title').innerText = categories[activeIndex].name;
        }

        function renderProducts() {
            const data = [
                { name: 'شاورما دجاج', price: 95, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
                { name: 'بيتزا مارجريتا', price: 110, img: 'https://images.unsplash.com/photo-1574071318508-1cdbad80ad38?w=400' }
            ];
            document.getElementById('product-list').innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-[35px] shadow-sm">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-[25px] mb-4">
                    <h3 class="font-extrabold text-gray-800 text-sm mb-2 text-right px-2">${p.name}</h3>
                    <div class="flex justify-between items-center px-2">
                        <span class="text-green-600 font-black text-lg">${p.price}ج</span>
                        <button class="bg-black text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">+</button>
                    </div>
                </div>`).join('');
        }

        createSlider();
    </script>
</body>
</html>
