<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ليالي الشام | تجربة احترافية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --main-green: #82b440; --bg: #F9FAFB; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; color: #444; }

        /* الهيدر */
        .header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 1000; }
        
        /* منطقة الأنبوبة الدائرية */
        .tube-viewport {
            position: relative; height: 320px; width: 100%;
            background: #fff; overflow: hidden; display: flex; justify-content: center;
            touch-action: none;
        }

        .dashed-line {
            position: absolute; top: 160px; width: 500px; height: 500px;
            border: 1px dashed rgba(0,0,0,0.07); border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        .tube-viewport::after {
            content: ''; position: absolute; bottom: -60px; width: 120%; height: 130px; 
            background: var(--bg); border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px; z-index: 10;
        }

        .wheel-container { position: absolute; top: 160px; width: 550px; height: 550px; z-index: 5; }
        .category-node { position: absolute; top: 50%; left: 50%; width: 90px; margin-left: -45px; margin-top: -45px; display: flex; flex-direction: column; align-items: center; }
        
        .image-circle {
            width: 75px; height: 75px; border-radius: 50%; background: #fff;
            border: 2px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            transition: 0.4s;
        }
        .category-node.active .image-circle { border-color: var(--main-green); transform: scale(1.1) translateY(-8px); }
        .image-circle img { width: 90%; height: 90%; object-fit: contain; }
        .category-node span { font-size: 11px; margin-top: 8px; color: #bbb; transition: 0.3s; }
        .category-node.active span { color: var(--main-green); font-weight: 700; }

        /* كروت المنتجات */
        .item-card { background: #fff; border-radius: 24px; padding: 12px; border: 1px solid rgba(0,0,0,0.02); }
        .add-btn { background: #000; color: #fff; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }

        /* السلة العائمة */
        #floating-cart {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 85%; background: #111; color: #fff; padding: 18px 25px;
            border-radius: 25px; display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #floating-cart.visible { transform: translateX(-50%) translateY(0); }

        /* عنصر الطيران */
        .fly-item {
            position: fixed; width: 40px; height: 40px; background: var(--main-green);
            border-radius: 50%; z-index: 3000; pointer-events: none;
            display: flex; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="font-black text-lg">ليالي <span style="color:var(--main-green)">الشام</span></div>
        <div class="text-xs font-bold text-gray-400">1256 🔥</div>
    </header>

    <div class="tube-viewport" id="touch-zone">
        <div class="dashed-line"></div>
        <div id="wheel" class="wheel-container"></div>
    </div>

    <main class="px-6 relative z-20" style="margin-top: -50px;">
        <h2 id="cat-title" class="text-center font-bold text-gray-400 mb-6">بيتزا</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4 pb-40"></div>
    </main>

    <div id="floating-cart">
        <div class="flex items-center gap-3">
            <span id="items-count" class="bg-white text-black w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black">0</span>
            <span class="text-sm">عرض السلة</span>
        </div>
        <div class="font-black text-sm" id="total-price">0 ج.م</div>
    </div>

    <script>
        const menu = {
            'بيتزا': [
                { name: 'بيتزا مارجريتا', price: 110, img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' },
                { name: 'بيتزا بيبروني', price: 145, img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' }
            ],
            'برجر': [
                { name: 'تشيز برجر', price: 125, img: 'https://i.ibb.co/vX8p5vX/burger.png' },
                { name: 'برجر عائلي', price: 180, img: 'https://i.ibb.co/vX8p5vX/burger.png' }
            ],
            'شاورما': [
                { name: 'شاورما عربي', price: 85, img: 'https://i.ibb.co/7Xp9p9p/shawarma.png' }
            ],
            'مشويات': [
                { name: 'كفتة مشوية', price: 190, img: 'https://i.ibb.co/MSX9p9p/grill.png' }
            ]
        };

        const wheel = document.getElementById('wheel');
        const cats = Object.keys(menu);
        const step = 38;
        let currentRot = 0;
        let cart = { items: 0, total: 0 };

        // إنشاء الأقسام
        cats.forEach((name, i) => {
            const node = document.createElement('div');
            node.className = `category-node ${i === 0 ? 'active' : ''}`;
            const angle = i * step;
            const x = 275 * Math.sin(angle * Math.PI / 180);
            const y = -275 * Math.cos(angle * Math.PI / 180);
            node.style.transform = `translate(${x}px, ${y}px)`;
            node.innerHTML = `<div class="image-circle"><img src="${menu[name][0].img}"></div><span>${name}</span>`;
            wheel.appendChild(node);
        });

        // نظام السحب
        const mc = new Hammer(document.getElementById('touch-zone'));
        mc.on("pan", (e) => applyRot(currentRot + (e.deltaX / 6)));
        mc.on("panend", (e) => {
            currentRot = Math.round((gsap.getProperty(wheel, "rotation") + (e.velocityX * 10)) / step) * step;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < -(cats.length-1)*step) currentRot = -(cats.length-1)*step;
            
            gsap.to(wheel, { 
                rotation: currentRot, duration: 0.6, ease: "power2.out",
                onUpdate: () => applyRot(gsap.getProperty(wheel, "rotation"))
            });
            render(cats[Math.abs(currentRot / step)]);
        });

        function applyRot(r) {
            gsap.set(wheel, { rotation: r });
            document.querySelectorAll('.category-node').forEach(el => {
                gsap.set(el.querySelector('.image-circle'), { rotation: -r });
                gsap.set(el.querySelector('span'), { rotation: -r });
            });
        }

        function render(name) {
            document.querySelectorAll('.category-node').forEach((el, i) => el.classList.toggle('active', cats[i] === name));
            document.getElementById('cat-title').innerText = name;
            document.getElementById('product-list').innerHTML = menu[name].map(p => `
                <div class="item-card shadow-sm">
                    <img src="${p.img}" class="w-full h-24 object-contain mb-3">
                    <h3 class="text-[10px] font-bold text-gray-400 mb-2">${p.name}</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-amber-600">${p.price} ج</span>
                        <button onclick="addToCart(event, ${p.price})" class="add-btn"><i class="fa-solid fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // أنميشن الطيران والسلة
        window.addToCart = (e, price) => {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const cartRect = document.getElementById('floating-cart').getBoundingClientRect();

            // إنشاء عنصر الطيران
            const flyer = document.createElement('div');
            flyer.className = 'fly-item';
            flyer.innerHTML = '<i class="fa-solid fa-plus text-[10px]"></i>';
            flyer.style.left = rect.left + 'px';
            flyer.style.top = rect.top + 'px';
            document.body.appendChild(flyer);

            // أنميشن الطيران
            gsap.to(flyer, {
                left: cartRect.left + 30,
                top: cartRect.top + 20,
                scale: 0.5,
                opacity: 0,
                duration: 0.8,
                ease: "power2.inOut",
                onComplete: () => {
                    flyer.remove();
                    cart.items++;
                    cart.total += price;
                    document.getElementById('items-count').innerText = cart.items;
                    document.getElementById('total-price').innerText = cart.total + ' ج.م';
                    document.getElementById('floating-cart').classList.add('visible');
                    gsap.fromTo("#floating-cart", { scale: 1.05 }, { scale: 1, duration: 0.3 });
                }
            });
        };

        render('بيتزا');
    </script>
</body>
</html>
