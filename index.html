<!DOCTYPE html>
<html>

<head>
  <base href="/public/web/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Juicy Web App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="juicy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo_app.png" />

  <title> QR Icon Tech</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts - Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- Lottie Player for animated logo -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <!-- Add Google Maps API with required libraries -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC-t_n1_Lev7aBGEsNBmzNrqwEGJVpn__4&libraries=places,geometry"></script>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background-color: #ffffff;
    }

    /* Loading screen layout */
    #loading-screen {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #ffffff;
      transition: opacity 500ms ease;
      z-index: 9999;
    }

    /* Background decoration circles */
    .bg-circle-1 {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(190, 28, 33, 0.03);
    }

    .bg-circle-2 {
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(190, 28, 33, 0.03);
    }

    /* Hide when Flutter is ready */
    .flutter-ready #loading-screen {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 250px;
      height: 250px;
      margin-bottom: 40px;
      object-fit: contain;
    }

    .loading-text {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #be1c21;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    /* .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(190, 28, 33, 0.1);
      border-top-color: #be1c21;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    } */

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    // Apply branch metadata from localStorage immediately if available
    (function () {
      const branchLogo = localStorage.getItem('branch_logo');
      const branchName = localStorage.getItem('branch_name');

      if (branchName) {
        document.title = branchName;
      }

      if (branchLogo) {
        // Update favicon
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          favicon.href = branchLogo;
        }

        // Apply to apple-touch-icon as well
        const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (appleIcon) {
          appleIcon.href = branchLogo;
        }
      }

      // We'll handle the loading screen logo in the body to avoid flash
    })();
  </script>
</head>

<body>
  <div id="loading-screen">
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>
    <lottie-player src="logo_app.json" background="transparent" speed="1" class="loading-logo" loop autoplay>
    </lottie-player>
    <!--    <div class="loading-text">JUICY</div>-->
    <!--    <div class="spinner"></div>-->
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyChCeU9gJp1bOywXXKQV_X5eoHu8kweYBs",
      authDomain: "juicydesigns-ff418.firebaseapp.com",
      projectId: "juicydesigns-ff418",
      storageBucket: "juicydesigns-ff418.firebasestorage.app",
      messagingSenderId: "500926485018",
      appId: "1:500926485018:web:2cd98e8fe043b8bb82b7a3",
      measurementId: "G-X3Y2MNZ8WB"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    document.getElementById('btn')?.addEventListener('click', () => {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          messaging.getToken({
            vapidKey: 'BLFbliUNwTKZ20FpHyIoxHIW75SA4EVCQR69acYlre4zxY_Ftvlshjvc1dR1N7tb8_DjYrGyXnIZVwJoK79QRvY'
          }).then(token => {
            document.getElementById('output').textContent = token || 'No token';
            console.log(token);
          }).catch(console.error);
        } else {
          document.getElementById('output').textContent = 'Permission denied';
        }
      });
    });
  </script>

  <script>
    // Hide loading screen when app is fully ready (data loaded)
    window.addEventListener('app-ready', function () {
      // Refresh metadata from localStorage which might have been updated by Flutter
      const branchLogo = localStorage.getItem('branch_logo');
      const branchName = localStorage.getItem('branch_name');
      if (branchName) document.title = branchName;
      if (branchLogo) {
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) favicon.href = branchLogo;
        const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (appleIcon) appleIcon.href = branchLogo;
      }

      document.body.classList.add('flutter-ready');
      // Remove loading screen after transition completes
      setTimeout(function () {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.remove();
        }
      }, 500);
    });

    // Fallback: Hide loading screen after maximum wait time (20 seconds)
    // Increased fallback to allow for slow data loading
    setTimeout(function () {
      if (!document.body.classList.contains('flutter-ready')) {
        document.body.classList.add('flutter-ready');
        setTimeout(function () {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.remove();
          }
        }, 500);
      }
    }, 20000);
  </script>

</body>

</html>
