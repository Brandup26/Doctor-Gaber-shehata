<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم إبن سوريا - التميز العصري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF9A8B 0%, #FF6A88 55%, #FF99AC 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --soft-shadow: 0 20px 40px rgba(0,0,0,0.05);
            --text-main: #2D3436;
            --accent-color: #FF7675;
            --transition-smooth: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #fdfbfb;
            background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* هيدر شفاف (Glassmorphism) */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 20px;
            margin: 0 5%;
            border-radius: 25px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: var(--soft-shadow);
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .cart-btn {
            background: var(--primary-gradient);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(255, 118, 117, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        /* تصميم الأقسام كفقاعات عائمة */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 40px 5%;
            overflow-x: auto;
        }

        .cat-bubble {
            background: white;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: var(--soft-shadow);
            transition: var(--transition-smooth);
            border: 1px solid transparent;
            font-weight: 600;
            color: #636e72;
        }

        .cat-bubble.active {
            background: var(--text-main);
            color: white;
            transform: scale(1.1);
        }

        /* كروت الطعام - تصميم نظيف جداً */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 20px 8%;
        }

        .food-card {
            background: var(--glass-bg);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--soft-shadow);
            transition: var(--transition-smooth);
            text-align: center;
        }

        .food-card:hover {
            transform: translateY(-15px);
            background: white;
        }

        .food-card img {
            width: 100%;
            height: 250px;
            border-radius: 30px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .food-price {
            font-size: 26px;
            font-weight: 900;
            color: var(--accent-color);
            margin: 10px 0;
            display: block;
        }

        /* زر الإضافة - ناعم وجذاب */
        .add-btn {
            background: #f1f2f6;
            color: var(--text-main);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            font-size: 16px;
        }

        .add-btn:hover {
            background: var(--primary-gradient);
            color: white;
        }

        /* أنيميشن طيران "الريشة" البطيء */
        .flying-img {
            position: fixed;
            z-index: 9999;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: all 2s cubic-bezier(0.19, 1, 0.22, 1); /* بطيء جداً وانسيابي */
        }

        /* واجهة السلة المودرن */
        #cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .cart-modal {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
            position: relative;
        }

        .close-cart {
            position: absolute;
            top: 25px;
            left: 25px;
            font-size: 24px;
            cursor: pointer;
            color: #b2bec3;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f2f6;
        }

        /* فورم البيانات */
        .data-input {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            border-radius: 20px;
            border: 1px solid #dfe6e9;
            background: #f9f9f9;
            outline: none;
            font-size: 16px;
        }

        .order-now {
            width: 100%;
            padding: 20px;
            background: var(--text-main);
            color: white;
            border: none;
            border-radius: 25px;
            margin-top: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            header { margin: 0 2%; top: 10px; padding: 10px 5%; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">إبن سوريا <i class="fas fa-certificate"></i></div>
    <div class="cart-btn" onclick="openCart()">
        <span id="cart-count">0</span>
        <i class="fas fa-shopping-basket"></i>
    </div>
</header>

<div style="text-align: center; padding: 80px 20px 20px;">
    <h1 style="font-size: 45px; font-weight: 900; color: #2d3436; margin-bottom: 15px;">إبن سوريا</h1>
    <p style="color: #636e72; font-size: 18px;">العنوان: نشا - شارع السوق - مقابل الريماس للسياحة</p>
    <p style="color: #636e72;">اتصل بنا: 01016991319</p>
</div>

<div class="categories" id="cat-nav">
    <div class="cat-bubble active" onclick="filter('الكل')">الكل</div>
</div>

<div class="menu-grid" id="food-grid">
    </div>

<div id="cart-overlay">
    <div class="cart-modal">
        <i class="fas fa-times close-cart" onclick="openCart()"></i>
        <h2 style="font-size: 30px; margin-bottom: 20px;">طلبك الجديد</h2>
        <div id="cart-items"></div>
        <div style="margin-top: 20px; font-size: 24px; font-weight: 900;">
            الإجمالي: <span id="total-price" style="color: var(--accent-color);">0</span> ج.م
        </div>
        
        <input type="text" id="name" class="data-input" placeholder="اسمك الجميل">
        <input type="tel" id="phone" class="data-input" placeholder="رقم الموبايل">
        <input type="text" id="address" class="data-input" placeholder="عنوانك بالتفصيل">
        
        <button class="order-now" onclick="checkout()">
            تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i>
        </button>
    </div>
</div>

<script>
    let cart = [];
    let menu = [
        {id: 1, name: 'شاورما دجاج عائلي', price: 110, cat: 'شاورما', img: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=800'},
        {id: 2, name: 'فتة شامي ملكي', price: 150, cat: 'أطباق', img: 'https://images.unsplash.com/photo-1541518763669-27fef04b14ea?q=80&w=800'},
        {id: 3, name: 'كبة سورية فاخرة', price: 90, cat: 'مقبلات', img: 'https://images.unsplash.com/photo-1606491956689-2ea866880c84?q=80&w=800'},
        {id: 4, name: 'بيتزا إبن سوريا', price: 130, cat: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=800'}
    ];

    function render(data) {
        document.getElementById('food-grid').innerHTML = data.map(f => `
            <div class="food-card">
                <img src="${f.img}" alt="${f.name}">
                <h3 style="font-size: 22px;">${f.name}</h3>
                <span class="food-price">${f.price} ج.م</span>
                <button class="add-btn" onclick="addToCart(${f.id}, event)">إضافة للسلة <i class="fas fa-plus"></i></button>
            </div>
        `).join('');
    }

    function addToCart(id, e) {
        const item = menu.find(i => i.id === id);
        cart.push(item);
        updateCart();
        
        // أنيميشن الريشة البطيء
        const flyer = document.createElement('img');
        flyer.src = item.img;
        flyer.classList.add('flying-img');
        flyer.style.left = e.clientX - 50 + 'px';
        flyer.style.top = e.clientY - 50 + 'px';
        document.body.appendChild(flyer);

        const cartPos = document.querySelector('.cart-btn').getBoundingClientRect();

        setTimeout(() => {
            flyer.style.left = cartPos.left + 'px';
            flyer.style.top = cartPos.top + 'px';
            flyer.style.transform = 'scale(0.0) rotate(360deg)';
            flyer.style.opacity = '0';
        }, 100);

        setTimeout(() => flyer.remove(), 2100);
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-item"><span>${i.name}</span><b>${i.price} ج.م</b></div>`;
        }).join('');
        document.getElementById('total-price').innerText = total;
    }

    function openCart() {
        const overlay = document.getElementById('cart-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function checkout() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const a = document.getElementById('address').value;
        if(!n || cart.length === 0) return alert("من فضلك أكمل البيانات");

        let msg = `*طلب جديد - مطعم إبن سوريا*%0A*الاسم:* ${n}%0A*العنوان:* ${a}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-price').innerText} ج.م`;

        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    render(menu);
    // الأقسام
    const cats = ['الكل', ...new Set(menu.map(m => m.cat))];
    document.getElementById('cat-nav').innerHTML = cats.map(c => `<div class="cat-bubble" onclick="filter('${c}')">${c}</div>`).join('');

    function filter(c) {
        if(c === 'الكل') render(menu);
        else render(menu.filter(m => m.cat === c));
    }
</script>

</body>
</html>
