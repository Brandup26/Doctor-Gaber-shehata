<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Juicy — قائمة طعام فاخرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="phone-wrapper">
  <header class="hero-header" id="heroHeader">
    <div class="top-nav">
      <button class="nav-pill" id="openCartBtn">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="nav-badge" id="navBadge">0</span>
      </button>
      <div class="brand-center">
        <div class="brand-emblem"><span>🍔</span></div>
        <span class="brand-wordmark">Juicy</span>
      </div>
      <button class="nav-pill"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>

    <div class="hero-content">
      <h1 class="hero-title"><span class="ht1">برغر</span><span class="ht2">جوسي</span></h1>
      <p class="hero-desc">طازج يومياً &nbsp;·&nbsp; مكونات فاخرة</p>
    </div>

    <div class="hero-burger-wrap">
      <div class="b-glow"></div>
      <div class="hero-burger"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=700&q=90&auto=format&fit=crop" alt="Burger"/></div>
    </div>
    <div class="hero-wave"><svg viewBox="0 0 390 72"><path d="M0,0 C60,70 330,70 390,0 L390,72 L0,72 Z" fill="#0d0d0d"/></svg></div>
  </header>

  <main class="main-body">
    <section class="sec">
      <div class="sec-head"><h2 class="sec-title">الأكثر طلباً 🔥</h2></div>
      <div class="feat-row">
        <div class="feat-card">
          <div class="fc-img"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Burger"/></div>
          <div class="fc-body">
            <h3>كلاسيك جوسي برغر</h3>
            <div class="fc-foot">
              <span class="fc-price">١٥٠ ج.م</span>
            </div>
            <button class="atc-btn" data-id="f1" data-name="كلاسيك جوسي" data-price="150" data-img="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500">
              <span>أضف للسلة</span>
            </button>
          </div>
        </div>
        </div>
    </section>

    <section class="sec">
      <div class="sec-head"><h2 class="sec-title">القائمة الكاملة</h2></div>
      <div class="menu-grid">
        <div class="mc">
          <div class="mc-img"><img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400" alt="Smashed"/></div>
          <div class="mc-body">
            <h4>دبل سماش برغر</h4>
            <div class="mc-foot">
              <span class="mc-price">١٩٠ ج.م</span>
              <button class="mc-add" data-id="m1" data-name="دبل سماش" data-price="190" data-img="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400">+</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="bnav">
    <button class="bn-btn active"><span>الرئيسية</span></button>
    <button class="bn-btn bn-cart" id="bnCartBtn">
      <div class="bn-cart-orb">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="bn-badge" id="bnBadge">0</span>
      </div>
      <span>السلة</span>
    </button>
    <button class="bn-btn"><span>حسابي</span></button>
  </nav>
</div>

<div class="cart-backdrop" id="cartBackdrop"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cd-handle"></div>
  <div class="cd-head"><h2>سلة التسوق 🛒</h2><button class="cd-close" id="closeCartBtn">✕</button></div>
  <div class="cd-body" id="cartBody"></div>
  <div id="cartEmpty" class="cd-empty show"><h3>السلة فارغة</h3></div>
  <div class="cd-foot" id="cartFoot">
    <div class="cd-row cd-grand"><span>الإجمالي:</span><span id="grandVal">٠ ج.م</span></div>
    <button class="checkout-btn">تأكيد الطلب</button>
  </div>
</div>

<div class="toast" id="toast"><span class="t-ico">✓</span> تم الإضافة بنجاح</div>

<script src="script.js"></script>
</body>
</html>
