<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | طريقة البطل V3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #FAFAFA; --dark: #1A1A1A; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        /* Navigation */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .cart-box {
            background: var(--dark); color: white; padding: 10px 22px;
            border-radius: 20px; position: relative; cursor: pointer;
        }

        /* Hero Gear - "طريقة البطل" */
        .hero-viewport {
            position: relative; height: 260px; width: 100%;
            display: flex; justify-content: center; overflow: hidden;
            background: #fff; padding-top: 80px; touch-action: none;
        }

        .hero-gear {
            position: absolute; top: 140px; width: 400px; height: 400px;
            border-radius: 50%; will-change: transform;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 80px; height: 100px; margin-left: -40px; margin-top: -40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .cat-img-wrapper {
            width: 65px; height: 65px; border-radius: 50%;
            overflow: hidden; border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .hero-cat-item.active .cat-img-wrapper {
            transform: scale(1.3); border-color: var(--gold);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        }

        .hero-cat-item span { font-size: 11px; font-weight: 700; color: #bbb; margin-top: 12px; transition: 0.3s; white-space: nowrap; }
        .hero-cat-item.active span { color: var(--dark); font-weight: 900; }

        .hero-indicator {
            position: absolute; top: 220px; width: 30px; height: 5px;
            background: #4CAF50; border-radius: 10px; z-index: 10;
        }

        /* Food Cards */
        .food-card { background: white; border-radius: 30px; padding: 15px; border: 1px solid #f0f0f0; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .add-btn {
            background: var(--dark); color: white; width: 35px; height: 35px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .add-btn:active { transform: scale(0.9); }

        /* Animation Fly Item */
        .fly-item { position: fixed; z-index: 9999; pointer-events: none; width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        /* Sidebar Cart Panel */
        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px;
            height: 100%; background: white; z-index: 2000; padding: 25px;
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); box-shadow: 20px 0 50px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        /* Inputs */
        .user-input {
            width: 100%; background: #f9f9f9; border: 1px solid #eee;
            padding: 12px 15px; border-radius: 15px; margin-bottom: 10px;
            outline: none; font-size: 14px; transition: 0.3s;
        }
        .user-input:focus { border-color: var(--gold); background: #fff; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-xl font-black tracking-tighter">إبن سوريا <span class="text-gold">.</span></h1>
        <div class="cart-box" id="main-cart" onclick="toggleCart(true)">
            <i class="fa-solid fa-bag-shopping"></i>
            <span id="badge" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="hero-indicator"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="px-6 py-6">
        <h2 id="cat-title" class="text-2xl font-black mb-6">المعجنات</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black">طلباتك</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>

        <div id="cart-items" class="space-y-3 mb-8"></div>

        <div class="border-t pt-6">
            <div class="flex justify-between mb-6 font-black text-xl">
                <span>الإجمالي</span>
                <span id="total-price" class="text-gold">0 ج.م</span>
            </div>

            <div class="space-y-2 mb-6">
                <h3 class="font-bold text-sm mb-3 text-gray-400">معلومات التوصيل</h3>
                <input type="text" id="user-name" class="user-input" placeholder="الاسم الكامل">
                <input type="tel" id="user-phone" class="user-input" placeholder="رقم الهاتف">
                <input type="text" id="user-addr" class="user-input" placeholder="العنوان بالتفصيل">
            </div>

            <button onclick="checkout()" class="w-full bg-black text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition">تأكيد الطلب الآن</button>
            <p class="text-[10px] text-center mt-4 text-gray-400">سيتم تحويلك للواتساب لتأكيد الطلب مع الإدارة</p>
        </div>
    </div>

    <script>
        // الأقسام بصور حقيقية
        const categories = [
            { name: 'مشويات', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=200' },
            { name: 'شاورما', img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=200' },
            { name: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200' },
            { name: 'برجر', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200' },
            { name: 'مقبلات', img: 'https://images.unsplash.com/photo-1541529086526-db283c563270?w=200' },
            { name: 'مشروبات', img: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=200' }
        ];

        const products = [
            { id: 1, name: 'شاورما دجاج جامبو', price: 95, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
            { id: 2, name: 'بيتزا سوبر بريميوم', price: 180, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' },
            { id: 3, name: 'وجبة مشويات مشكلة', price: 250, img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400' }
        ];

        let cart = [];
        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');

        function initHeroGear() {
            const radius = 150; // تقريب الأقسام
            const step = 360 / categories.length;
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<div class="cat-img-wrapper"><img src="${cat.img}"></div><span>${cat.name}</span>`;
                gear.appendChild(item);
            });
            renderFood();
        }

        // تفاعلات اللمس "طريقة البطل"
        const hammer = new Hammer(document.getElementById('hero-touch'));
        let startRot = 0;
        hammer.on("panstart", () => startRot = gearRotation);
        hammer.on("panmove", (e) => {
            gearRotation = startRot + (e.deltaX * 0.35);
            applyRotation(gearRotation);
        });
        hammer.on("panend", () => {
            const step = 360 / categories.length;
            const index = Math.round(-gearRotation / step);
            const target = -index * step;
            gsap.to(window, { duration: 0.6, onUpdate: () => {
                gearRotation += (target - gearRotation) * 0.2;
                applyRotation(gearRotation);
            }, onComplete: () => {
                gearRotation = target;
                const activeIdx = ((index % categories.length) + categories.length) % categories.length;
                updateActive(activeIdx);
            }, ease: "back.out(1.5)"});
        });

        function applyRotation(rot) {
            gear.style.transform = `rotate(${rot}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(item => {
                gsap.set(item.querySelector('.cat-img-wrapper'), { rotation: -rot });
                gsap.set(item.querySelector('span'), { rotation: -rot });
            });
        }

        function updateActive(idx) {
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === idx));
            document.getElementById('cat-title').innerText = categories[idx].name;
            renderFood();
        }

        function renderFood() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="food-card opacity-0">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3" id="img-${p.id}">
                        <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="font-black text-gold text-sm">${p.price} ج.م</span>
                            <div class="add-btn" onclick="addToCart(event, ${p.id})"><i class="fa-solid fa-plus"></i></div>
                        </div>
                    </div>
                `;
            });
            gsap.to(".food-card", { opacity: 1, y: -10, stagger: 0.1 });
        }

        function addToCart(e, id) {
            const product = products.find(p => p.id === id);
            cart.push(product);

            // أنيميشن الطيران
            const img = document.getElementById(`img-${id}`);
            const cartIcon = document.getElementById('main-cart');
            const flyImg = img.cloneNode(true);
            flyImg.classList.add('fly-item');
            document.body.appendChild(flyImg);

            const rect = img.getBoundingClientRect();
            const cartRect = cartIcon.getBoundingClientRect();

            gsap.fromTo(flyImg, 
                { top: rect.top, left: rect.left, scale: 1, opacity: 1 },
                { 
                    top: cartRect.top, left: cartRect.left, scale: 0.1, opacity: 0, 
                    duration: 0.8, ease: "power3.inOut",
                    onComplete: () => {
                        flyImg.remove();
                        updateCartUI();
                        gsap.to(cartIcon, { scale: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
                    }
                }
            );
        }

        function updateCartUI() {
            document.getElementById('badge').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                            <div>
                                <h4 class="font-bold text-xs">${item.name}</h4>
                                <p class="text-gold font-black text-[12px]">${item.price} ج.م</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-trash-can text-red-300 text-sm" onclick="removeItem(${index})"></i>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total + ' ج.م';
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            updateCartUI();
        }

        function toggleCart(show) {
            document.getElementById('cart-panel').style.left = show ? '0' : '-100%';
        }

        function checkout() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const addr = document.getElementById('user-addr').value;

            if(!name || !phone || !addr) return alert('يرجى إكمال بياناتك يا بطل!');
            if(cart.length === 0) return alert('السلة فارغة!');

            let msg = `*طلب جديد من إبن سوريا* 🌯\n\n`;
            msg += `*الاسم:* ${name}\n`;
            msg += `*الهاتف:* ${phone}\n`;
            msg += `*العنوان:* ${addr}\n\n`;
            msg += `*الطلبات:*\n`;
            cart.forEach((i, idx) => msg += `${idx+1}. ${i.name} (${i.price} ج.م)\n`);
            msg += `\n*الإجمالي:* ${document.getElementById('total-price').innerText}`;

            window.open(`https://wa.me/201016991319?text=${encodeURIComponent(msg)}`);
        }

        window.onload = initHeroGear;
    </script>
</body>
</html>
