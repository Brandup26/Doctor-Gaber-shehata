<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إبن سوريا | القائمة الدائرية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #B8860B;
            --bg: #F8F9FA;
            --text: #1A1A1A;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* --- Header & Top Cart --- */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-trigger {
            background: var(--text);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* --- Gear Menu System (Matches Video) --- */
        .menu-viewport {
            position: relative;
            height: 280px; /* مساحة لعرض القوس */
            width: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #fff, var(--bg));
        }

        .gear-circle {
            position: absolute;
            top: 50px; /* نزول الدائرة لتشكيل القوس */
            left: 50%;
            width: 600px;
            height: 600px;
            margin-left: -300px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .category-item {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            margin-left: -50px;
            margin-top: -50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* الحفاظ على العناصر معتدلة دائماً */
            transform-origin: center center;
        }

        .icon-container {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 8px;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        .category-item.active .icon-container {
            border-color: var(--accent);
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 10px 25px rgba(184, 134, 11, 0.2);
        }

        .category-item span {
            font-size: 14px;
            font-weight: 600;
            color: #999;
            transition: 0.3s;
        }

        .category-item.active span {
            color: var(--accent);
            transform: scale(1.1);
        }

        /* --- Active Indicator (Green Bar like video) --- */
        .indicator {
            position: absolute;
            top: 155px; /* تحت القسم النشط تماماً */
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 4px;
            background: #4CAF50;
            border-radius: 10px;
            z-index: 10;
        }

        /* --- Product Grid --- */
        .products-section {
            padding: 0 20px 40px;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        /* Sidebar Cart (Fly-out) */
        #sidebar-cart {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 400px;
            height: 100%; background: white;
            z-index: 1000; padding: 30px;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <h1 class="text-xl font-bold">إبن سوريا</h1>
        <div class="cart-trigger" onclick="toggleCart(true)">
            <span id="cart-count">0</span>
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </nav>

    <div class="menu-viewport">
        <div class="indicator"></div>
        <div id="gear-circle" class="gear-circle">
            </div>
    </div>

    <main class="products-section">
        <div class="flex justify-between items-center mb-6 px-2">
            <h2 id="cat-title" class="text-xl font-bold">الكل</h2>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-sliders text-xs"></i>
            </div>
        </div>

        <div id="products-grid" class="grid grid-cols-2 gap-5">
            </div>
    </main>

    <div id="sidebar-cart">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">طلباتك</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-xmark text-xl cursor-pointer"></i>
        </div>
        <div id="cart-list" class="space-y-4 h-[60%] overflow-y-auto">
            </div>
        <div class="absolute bottom-10 left-0 w-full px-8">
            <div class="flex justify-between mb-4 font-bold text-xl">
                <span>الإجمالي:</span>
                <span id="cart-total">0 ج.م</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-black text-white py-5 rounded-2xl font-bold text-lg">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'burger', name: 'برجر', icon: '🍔' },
            { id: 'pizza', name: 'بيتزا', icon: '🍕' },
            { id: 'shawarma', name: 'ساندوتشات', icon: '🌯' },
            { id: 'pasta', name: 'مكرونات', icon: '🍝' },
            { id: 'appetizer', name: 'مقبلات', icon: '🍟' },
            { id: 'drinks', name: 'مشروبات', icon: '🥤' }
        ];

        const products = [
            { id: 1, cat: 'burger', name: 'برجر كلاسيك', price: 120, img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { id: 2, cat: 'burger', name: 'برجر دجاج', price: 110, img: 'https://cdn-icons-png.flaticon.com/512/1046/1046784.png' },
            { id: 3, cat: 'pizza', name: 'مارجريتا', price: 180, img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { id: 4, cat: 'shawarma', name: 'شاورما لحم', price: 85, img: 'https://cdn-icons-png.flaticon.com/512/2362/2362253.png' }
        ];

        let cart = [];

        function initGearMenu() {
            const circle = document.getElementById('gear-circle');
            const total = categories.length;
            const radius = 280; // المسافة من مركز الدائرة للأصناف

            categories.forEach((cat, i) => {
                const angle = (i * (360 / total)) - 90; // البدء من الأعلى
                const item = document.createElement('div');
                item.className = `category-item ${i === 0 ? 'active' : ''}`;
                
                // توزيع العناصر بالرياضيات حول الدائرة
                const x = radius * Math.cos(angle * Math.PI / 180);
                const y = radius * Math.sin(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                
                item.innerHTML = `
                    <div class="icon-container">
                        <span class="text-3xl">${cat.icon}</span>
                    </div>
                    <span>${cat.name}</span>
                `;

                item.onclick = () => rotateTo(i);
                circle.appendChild(item);
            });
            renderProducts(categories[0].id);
        }

        function rotateTo(index) {
            const circle = document.getElementById('gear-circle');
            const items = document.querySelectorAll('.category-item');
            const angleStep = 360 / categories.length;
            
            // تدوير الدائرة بالكامل
            const rotation = - (index * angleStep);
            circle.style.transform = `rotate(${rotation}deg)`;

            // الحفاظ على الأيقونات معتدلة (عكس تدوير الدائرة)
            items.forEach((item, i) => {
                const icons = item.querySelectorAll('.icon-container, span');
                item.classList.toggle('active', i === index);
                icons.forEach(el => {
                    el.style.transform = `rotate(${-rotation}deg)`;
                });
            });

            document.getElementById('cat-title').innerText = categories[index].name;
            renderProducts(categories[index].id);
        }

        function renderProducts(catId) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            const filtered = products.filter(p => p.cat === catId);

            filtered.forEach((p, i) => {
                const el = document.createElement('div');
                el.className = 'product-card opacity-0 translate-y-5';
                el.innerHTML = `
                    <img src="${p.img}" class="w-full h-32 object-contain mb-4">
                    <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-accent font-bold">${p.price} ج.م</span>
                        <div onclick="addToCart(${p.id})" class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer">
                            <i class="fa-solid fa-plus text-[10px]"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(el);
                gsap.to(el, { opacity: 1, y: 0, delay: i * 0.1 });
            });
        }

        function toggleCart(show) {
            document.getElementById('sidebar-cart').style.right = show ? '0' : '-100%';
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<div class="flex justify-between border-b pb-2 text-sm"><span>${item.name}</span><b>${item.price} ج.م</b></div>`;
            });
            document.getElementById('cart-total').innerText = total + ' ج.م';
        }

        function sendOrder() {
            let msg = `طلب جديد من إبن سوريا 🌯\n\n`;
            cart.forEach(i => msg += `- ${i.name}\n`);
            msg += `\nالإجمالي: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/201016991319?text=${encodeURIComponent(msg)}`);
        }

        window.onload = initGearMenu;
    </script>
</body>
</html>
