<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | المحاكاة الأصلية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F9F9F9; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        /* الهيدر */
        .header-nav {
            padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white;
        }

        /* السلة على اليسار كما طلبت */
        .cart-box {
            width: 45px; height: 45px; background: #1A1A1A; color: white; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer; order: -1; /* تجعلها على اليسار في الترتيب */
        }

        /* منطقة الأقسام - محاكاة الصورة 100% */
        .hero-viewport {
            position: relative; height: 260px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
        }

        /* المسار المنحني الوهمي - يقطع الصور من الأسفل */
        .category-path-line {
            position: absolute; top: 130px; width: 480px; height: 480px;
            border: 1px solid rgba(0,0,0,0.05); border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        /* الترس الحامل للأقسام */
        .hero-gear {
            position: absolute; top: 130px; width: 500px; height: 500px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 85px;
            margin-left: -42.5px; margin-top: -50px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* تنسيق الصور لتكون مقطوعة بالمنحنى */
        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%;
            background: white; padding: 5px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            z-index: 6;
        }
        .cat-img-wrapper img { width: 100%; height: 100%; object-fit: contain; }

        /* الحالة النشطة - الاسم تحت الصورة مع الخط الأخضر */
        .cat-info {
            margin-top: 8px; display: flex; flex-direction: column; align-items: center;
            opacity: 0.5; transition: 0.3s;
        }
        .hero-cat-item.active .cat-info { opacity: 1; }
        
        .cat-info span { font-size: 13px; font-weight: 700; color: #555; }
        .hero-cat-item.active span { color: var(--active-green); }

        .active-line {
            width: 18px; height: 4px; background: transparent; 
            border-radius: 10px; margin-top: 4px;
        }
        .hero-cat-item.active .active-line { background: var(--active-green); }

        /* تداخل المنحنى مع المحتوى السفلي */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -20px; width: 120%; height: 60px;
            background: var(--bg); border-radius: 50% 50% 0 0; z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <div class="cart-box" onclick="alert('السلة')">
            <i class="fa-solid fa-bag-shopping text-lg"></i>
            <span class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">3</span>
        </div>
        <h1 class="text-xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="category-path-line"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="p-5 relative z-20">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-center text-gray-800">بيتزا</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const categories = [
            { name: 'بيتزا', img: 'https://i.ibb.co/VWhpYp4/pizza-slice.png' },
            { name: 'برجر', img: 'https://i.ibb.co/vX8p5vX/burger.png' },
            { name: 'السندوتشات', img: 'https://i.ibb.co/rcf8p8p/sandwich.png' },
            { name: 'مشويات', img: 'https://i.ibb.co/MSX9p9p/grill.png' },
            { name: 'شاورما', img: 'https://i.ibb.co/7Xp9p9p/shawarma.png' }
        ];

        const products = {
            'بيتزا': [
                { name: 'بيتزا البيبروني', price: 120, img: 'https://images.unsplash.com/photo-1628840042765-356cda07504e?w=400' },
                { name: 'بيتزا المارجريتا', price: 95, img: 'https://images.unsplash.com/photo-1574071318508-1cdbad80ad38?w=400' }
            ],
            'برجر': [
                { name: 'تشيز برجر', price: 85, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400' }
            ]
        };

        let currentRot = 0;
        const gear = document.getElementById('hero-gear');
        const step = 40; // تقريب الأقسام من بعضها جداً كما في الصورة

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                
                // حساب التمركز على الخط (نصف قطر 245)
                const x = 245 * Math.sin(angle * Math.PI / 180);
                const y = -245 * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <div class="cat-img-wrapper">
                        <img src="${cat.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/706/706164.png'">
                    </div>
                    <div class="cat-info">
                        <span>${cat.name}</span>
                        <div class="active-line"></div>
                    </div>
                `;
                gear.appendChild(item);
            });
            renderFood('بيتزا');
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("pan", (e) => {
            let dragRot = currentRot + (e.deltaX / 5);
            gsap.set(gear, { rotation: dragRot });
            syncIcons(dragRot);
        });

        hammer.on("panend", (e) => {
            currentRot = Math.round(gsap.getProperty(gear, "rotation") / step) * step;
            const minRot = -(categories.length - 1) * step;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < minRot) currentRot = minRot;

            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.6, 
                ease: "power2.out", // الأنيميشن القديم السلس
                onUpdate: () => syncIcons(gsap.getProperty(gear, "rotation"))
            });
            updateActive(Math.abs(currentRot / step));
        });

        function syncIcons(rot) {
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                gsap.set(it, { rotation: -rot });
            });
        }

        function updateActive(idx) {
            const index = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === index));
            const catName = categories[index].name;
            document.getElementById('cat-title').innerText = catName;
            renderFood(catName);
        }

        function renderFood(cat) {
            const list = products[cat] || products['بيتزا'];
            document.getElementById('food-grid').innerHTML = list.map(p => `
                <div class="bg-white p-4 rounded-[25px] shadow-sm">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-sm text-right">${p.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-600 font-black">${p.price} ج</span>
                        <button class="bg-black text-white w-8 h-8 rounded-full">+</button>
                    </div>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
