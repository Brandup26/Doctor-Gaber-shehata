<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الأصالة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { tajawal: ['Tajawal', 'sans-serif'] },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
          colors: {
            brand: { DEFAULT: '#78350f', light: '#b45309', dark: '#431d06' },
            wa: '#16a34a',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
    body { background-color: #f1f2f4; color: #000; direction: rtl; }

    /* card hover */
    .menu-card { transition: transform .2s, box-shadow .2s; }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.13); }

    /* drawer */
    #drawer { transition: transform .35s cubic-bezier(.4,0,.2,1); }
    #backdrop { transition: opacity .3s; }

    /* toast */
    #toast { transition: opacity .3s, transform .3s; }

    /* input focus */
    .field:focus { outline: none; border-color: #78350f; background: #fff; }

    /* scrollbar */
    #drawer-body::-webkit-scrollbar { width: 4px; }
    #drawer-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9999px; }

    @keyframes fadeUp {
      0%   { opacity:0; transform:translateX(-50%) translateY(12px); }
      20%  { opacity:1; transform:translateX(-50%) translateY(0); }
      80%  { opacity:1; }
      100% { opacity:0; transform:translateX(-50%) translateY(-6px); }
    }
    .toast-anim { animation: fadeUp 1.8s ease forwards; }
  </style>
</head>
<body class="min-h-screen">

<!-- ═══════════════════════════════════════════════
     HERO
═══════════════════════════════════════════════ -->
<section style="background: linear-gradient(135deg,#78350f 0%,#92400e 60%,#b45309 100%)"
         class="relative overflow-hidden px-5 py-14 text-center">
  <!-- decorative circles -->
  <div class="absolute -top-10 -left-10 w-44 h-44 rounded-full" style="background:rgba(255,255,255,.06)"></div>
  <div class="absolute -bottom-8 -right-8 w-32 h-32 rounded-full" style="background:rgba(255,255,255,.06)"></div>

  <!-- Cart icon button -->
  <button onclick="toggleDrawer(true)" id="hero-cart-btn"
          class="absolute top-5 left-5 flex items-center gap-2 rounded-2xl px-3 py-2 text-white cursor-pointer"
          style="background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);backdrop-filter:blur(4px)">
    🛒
    <span id="hero-badge" class="hidden text-xs font-black bg-wa text-white rounded-full px-2 py-0.5"></span>
  </button>

  <div class="relative z-10">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-5 text-4xl"
         style="background:rgba(255,255,255,.15)">🍽️</div>
    <h1 class="text-5xl font-black text-white mb-3">مطعم الأصالة</h1>
    <p class="text-xl font-medium" style="color:#fde68a">أشهى المأكولات العربية الأصيلة</p>
  </div>
</section>

<!-- ═══════════════════════════════════════════════
     MENU SECTIONS
═══════════════════════════════════════════════ -->
<main class="max-w-6xl mx-auto px-4 py-10 pb-36" id="menu-root"></main>

<!-- ═══════════════════════════════════════════════
     STICKY BOTTOM BAR
═══════════════════════════════════════════════ -->
<div class="fixed bottom-0 left-0 right-0 z-50 flex justify-center pb-5 pt-3"
     style="background:linear-gradient(to top,#f1f2f4 65%,transparent)">
  <button onclick="toggleDrawer(true)" id="cta-btn"
          class="flex items-center justify-center gap-3 rounded-full text-white font-black text-lg px-10 py-4 cursor-pointer"
          style="background:#78350f;box-shadow:0 4px 20px rgba(120,53,15,.35);min-width:230px;border:none;transition:background .3s">
    <span>🛒</span>
    <span id="cta-label">ابدأ طلبك</span>
  </button>
</div>

<!-- ═══════════════════════════════════════════════
     TOAST
═══════════════════════════════════════════════ -->
<div id="toast"
     class="fixed top-5 left-1/2 -translate-x-1/2 z-[400] hidden rounded-full px-6 py-3 text-white font-bold text-sm"
     style="background:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,.4);white-space:nowrap">
  ✓ تمت الإضافة للسلة
</div>

<!-- ═══════════════════════════════════════════════
     BACKDROP
═══════════════════════════════════════════════ -->
<div id="backdrop" onclick="toggleDrawer(false)"
     class="fixed inset-0 z-[200] pointer-events-none opacity-0"
     style="background:rgba(0,0,0,.45)"></div>

<!-- ═══════════════════════════════════════════════
     CART DRAWER
═══════════════════════════════════════════════ -->
<div id="drawer"
     class="fixed top-0 right-0 bottom-0 z-[201] flex flex-col bg-white"
     style="width:min(400px,100vw);transform:translateX(100%);box-shadow:-4px 0 24px rgba(0,0,0,.15)">

  <!-- Drawer Header -->
  <div class="flex items-center justify-between px-5 py-4 shrink-0" style="border-bottom:1px solid #f0f0f0">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🛒</span>
      <span class="font-black text-xl text-black">سلة الطلب</span>
      <span id="drawer-badge"
            class="hidden text-xs font-bold text-white rounded-full px-2 py-0.5"
            style="background:#78350f"></span>
    </div>
    <button onclick="toggleDrawer(false)"
            class="w-9 h-9 flex items-center justify-center rounded-full cursor-pointer text-lg font-bold"
            style="background:#f3f4f6;border:none">✕</button>
  </div>

  <!-- Drawer Body (scrollable) -->
  <div id="drawer-body" class="flex-1 overflow-y-auto px-5 py-4">

    <!-- Empty state -->
    <div id="empty-state" class="text-center pt-16">
      <div class="text-6xl mb-4">🛒</div>
      <p class="text-gray-400 text-base">السلة فارغة، أضف أصنافاً من القائمة</p>
    </div>

    <!-- Cart items list -->
    <div id="cart-list" class="hidden flex-col gap-3 mb-5"></div>

    <!-- Customer info form -->
    <div id="customer-form" class="hidden rounded-3xl p-5" style="background:#f9fafb;border:1.5px solid #e5e7eb">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-xl">📋</span>
        <span class="font-black text-base text-black">بيانات العميل</span>
      </div>
      <div class="flex flex-col gap-3">

        <!-- Name -->
        <div>
          <label class="block font-bold text-sm mb-1.5" style="color:#374151">
            👤 الاسم الكامل
            <span id="err-name" class="hidden text-red-500 text-xs font-normal"> — مطلوب</span>
          </label>
          <input id="f-name" type="text" placeholder="اكتب اسمك هنا..."
                 class="field w-full rounded-xl px-4 py-2.5 text-sm font-medium text-black"
                 style="border:1.5px solid #e5e7eb;background:#f9fafb;direction:rtl" />
        </div>

        <!-- Phone -->
        <div>
          <label class="block font-bold text-sm mb-1.5" style="color:#374151">
            📞 رقم الهاتف
            <span id="err-phone" class="hidden text-red-500 text-xs font-normal"> — مطلوب</span>
          </label>
          <input id="f-phone" type="tel" placeholder="05xxxxxxxx"
                 class="field w-full rounded-xl px-4 py-2.5 text-sm font-medium text-black"
                 style="border:1.5px solid #e5e7eb;background:#f9fafb;direction:ltr;text-align:right" />
        </div>

        <!-- Address -->
        <div>
          <label class="block font-bold text-sm mb-1.5" style="color:#374151">
            📍 العنوان
            <span id="err-address" class="hidden text-red-500 text-xs font-normal"> — مطلوب</span>
          </label>
          <textarea id="f-address" rows="3" placeholder="الحي، الشارع، رقم المبنى..."
                    class="field w-full rounded-xl px-4 py-2.5 text-sm font-medium text-black resize-none"
                    style="border:1.5px solid #e5e7eb;background:#f9fafb;direction:rtl;line-height:1.6"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Drawer Footer -->
  <div id="drawer-footer" class="hidden shrink-0 px-5 pb-6 pt-3" style="border-top:1px solid #f0f0f0">
    <div class="flex justify-between items-center mb-3">
      <span class="font-bold text-base" style="color:#374151">الإجمالي:</span>
      <span id="total-label" class="font-black text-2xl" style="color:#78350f"></span>
    </div>
    <button onclick="sendOrder()"
            class="w-full flex items-center justify-center gap-3 rounded-2xl text-white font-black text-lg py-4 cursor-pointer"
            style="background:#16a34a;border:none;box-shadow:0 4px 14px rgba(22,163,74,.35)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      أرسل الطلب عبر واتساب
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════ -->
<script>
// ── Config ─────────────────────────────────────
const WHATSAPP = '966500000000'; // ← غير هذا الرقم برقمك

// ── Menu Data ──────────────────────────────────
const CATEGORIES = [
  { id: 'main',       label: 'الأطباق الرئيسية', emoji: '🍖' },
  { id: 'appetizers', label: 'المقبلات',          emoji: '🥗' },
  { id: 'desserts',   label: 'الحلويات',          emoji: '🍮' },
  { id: 'drinks',     label: 'المشروبات',         emoji: '🥤' },
];

const ITEMS = [
  { id:1,  cat:'main',       name:'كبسة لحم',         price:45, img:'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=400&h=300&fit=crop' },
  { id:2,  cat:'main',       name:'مندي دجاج',        price:38, img:'https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400&h=300&fit=crop' },
  { id:3,  cat:'main',       name:'مضغوط خروف',       price:60, img:'https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=300&fit=crop' },
  { id:4,  cat:'main',       name:'جريش بالدجاج',     price:35, img:'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&h=300&fit=crop' },
  { id:5,  cat:'main',       name:'هريس لحم',         price:32, img:'https://images.unsplash.com/photo-1547592180-85f173990554?w=400&h=300&fit=crop' },
  { id:6,  cat:'main',       name:'مرقة خضار',        price:28, img:'https://images.unsplash.com/photo-1604152135912-04a022e23696?w=400&h=300&fit=crop' },
  { id:7,  cat:'appetizers', name:'سلطة فتوش',        price:12, img:'https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400&h=300&fit=crop' },
  { id:8,  cat:'appetizers', name:'حمص بلدي',         price:10, img:'https://images.unsplash.com/photo-1541014741259-de529411b96a?w=400&h=300&fit=crop' },
  { id:9,  cat:'appetizers', name:'فلافل مقرمش',      price:15, img:'https://images.unsplash.com/photo-1593001872095-7d5b3868fb1d?w=400&h=300&fit=crop' },
  { id:10, cat:'appetizers', name:'متبل باذنجان',     price:12, img:'https://images.unsplash.com/photo-1572453800999-e8d2d1589b7c?w=400&h=300&fit=crop' },
  { id:11, cat:'appetizers', name:'سمبوسة لحم',       price:8,  img:'https://images.unsplash.com/photo-1625220194771-7ebdea0b70b9?w=400&h=300&fit=crop' },
  { id:12, cat:'appetizers', name:'شوربة عدس',        price:10, img:'https://images.unsplash.com/photo-1547592180-85f173990554?w=400&h=300&fit=crop' },
  { id:13, cat:'desserts',   name:'كنافة نابلسية',    price:22, img:'https://images.unsplash.com/photo-1579954115545-a95591f28bfc?w=400&h=300&fit=crop' },
  { id:14, cat:'desserts',   name:'أم علي',           price:18, img:'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400&h=300&fit=crop' },
  { id:15, cat:'desserts',   name:'بقلاوة',           price:15, img:'https://images.unsplash.com/photo-1519676867240-f03562e64548?w=400&h=300&fit=crop' },
  { id:16, cat:'desserts',   name:'هريسة بالزعفران',  price:12, img:'https://images.unsplash.com/photo-1587314168485-3236d6710814?w=400&h=300&fit=crop' },
  { id:17, cat:'drinks',     name:'عصير برتقال',      price:8,  img:'https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=400&h=300&fit=crop' },
  { id:18, cat:'drinks',     name:'ليمون نعناع',      price:10, img:'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&h=300&fit=crop' },
  { id:19, cat:'drinks',     name:'شاي كرك',          price:6,  img:'https://images.unsplash.com/photo-1571934811356-5cc061b6821f?w=400&h=300&fit=crop' },
  { id:20, cat:'drinks',     name:'قهوة عربية',       price:7,  img:'https://images.unsplash.com/photo-1578374173705-969cbe6f2d6b?w=400&h=300&fit=crop' },
];

// ── State ──────────────────────────────────────
const cart = {}; // { id: qty }

function toAr(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function totalQty() { return Object.values(cart).reduce((s,q) => s+q, 0); }
function totalPrice() {
  return Object.entries(cart).reduce((s,[id,q]) => {
    const item = ITEMS.find(i => i.id === +id);
    return s + (item ? item.price * q : 0);
  }, 0);
}

// ── Render Menu ────────────────────────────────
function renderMenu() {
  const root = document.getElementById('menu-root');
  root.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const items = ITEMS.filter(i => i.cat === cat.id);
    const section = document.createElement('section');
    section.className = 'mb-12';
    section.innerHTML = `
      <div class="flex items-center gap-3 mb-5">
        <span class="text-2xl">${cat.emoji}</span>
        <h2 class="font-black text-2xl text-black">${cat.label}</h2>
        <div class="flex-1 h-0.5 rounded-full" style="background:#e5e7eb"></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="grid-${cat.id}"></div>
    `;
    root.appendChild(section);

    const grid = document.getElementById(`grid-${cat.id}`);
    items.forEach(item => {
      grid.appendChild(makeCard(item));
    });
  });
}

function makeCard(item) {
  const div = document.createElement('div');
  div.id = `card-${item.id}`;
  div.className = 'menu-card bg-white rounded-3xl overflow-hidden flex flex-col';
  div.style.boxShadow = '0 2px 10px rgba(0,0,0,.07)';
  div.innerHTML = `
    <div class="relative overflow-hidden" style="aspect-ratio:4/3;flex-shrink:0">
      <img src="${item.img}" alt="${item.name}" loading="lazy"
           class="w-full h-full object-cover block" />
      <div id="badge-${item.id}" class="absolute top-2 left-2 hidden text-xs font-black text-white rounded-full px-3 py-1"
           style="background:#78350f"></div>
    </div>
    <div class="flex flex-col gap-2 p-3 flex-1">
      <div>
        <div class="font-black text-base text-black leading-tight">${item.name}</div>
        <div class="font-bold text-sm mt-1" style="color:#b45309">${toAr(item.price)} ريال</div>
      </div>
      <div id="ctrl-${item.id}">${makeAddBtn(item.id)}</div>
    </div>
  `;
  return div;
}

function makeAddBtn(id) {
  return `
    <button onclick="addItem(${id})"
            class="w-full flex items-center justify-center gap-1 rounded-xl py-2 text-sm font-black text-white cursor-pointer"
            style="background:#78350f;border:none">
      <span class="text-base">+</span> أضف للسلة
    </button>
  `;
}

function makeQtyCtrl(id, qty) {
  return `
    <div class="flex items-center justify-between rounded-xl px-3 py-1.5" style="background:#fef3c7">
      <button onclick="changeQty(${id},-1)"
              class="w-8 h-8 flex items-center justify-center rounded-full text-xl font-black cursor-pointer"
              style="background:#fff;border:none;color:#78350f;box-shadow:0 1px 4px rgba(0,0,0,.1)">−</button>
      <span class="font-black text-lg" style="color:#78350f">${toAr(qty)}</span>
      <button onclick="changeQty(${id},1)"
              class="w-8 h-8 flex items-center justify-center rounded-full text-xl font-black text-white cursor-pointer"
              style="background:#78350f;border:none">+</button>
    </div>
  `;
}

// ── Cart Logic ─────────────────────────────────
function addItem(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCardUI(id);
  updateGlobalUI();
  showToast();
}

function changeQty(id, delta) {
  const newQty = (cart[id] || 0) + delta;
  if (newQty <= 0) {
    delete cart[id];
  } else {
    cart[id] = newQty;
  }
  updateCardUI(id);
  updateGlobalUI();
  renderDrawerItems();
}

function removeFromCart(id) {
  delete cart[id];
  updateCardUI(id);
  updateGlobalUI();
  renderDrawerItems();
}

function updateCardUI(id) {
  const qty = cart[id] || 0;
  const ctrl = document.getElementById(`ctrl-${id}`);
  const badge = document.getElementById(`badge-${id}`);
  if (!ctrl) return;
  ctrl.innerHTML = qty > 0 ? makeQtyCtrl(id, qty) : makeAddBtn(id);
  if (badge) {
    if (qty > 0) {
      badge.textContent = `${toAr(qty)} في السلة`;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }
}

function updateGlobalUI() {
  const qty = totalQty();
  const heroBadge   = document.getElementById('hero-badge');
  const drawerBadge = document.getElementById('drawer-badge');
  const ctaBtn      = document.getElementById('cta-btn');
  const ctaLabel    = document.getElementById('cta-label');

  if (qty > 0) {
    heroBadge.textContent = toAr(qty);
    heroBadge.classList.remove('hidden');
    drawerBadge.textContent = `${toAr(qty)} صنف`;
    drawerBadge.classList.remove('hidden');
    ctaBtn.style.background = '#16a34a';
    ctaBtn.style.boxShadow  = '0 4px 20px rgba(22,163,74,.4)';
    ctaLabel.textContent = `عرض السلة (${toAr(qty)})`;
  } else {
    heroBadge.classList.add('hidden');
    drawerBadge.classList.add('hidden');
    ctaBtn.style.background = '#78350f';
    ctaBtn.style.boxShadow  = '0 4px 20px rgba(120,53,15,.35)';
    ctaLabel.textContent = 'ابدأ طلبك';
  }
}

// ── Drawer ─────────────────────────────────────
let drawerOpen = false;

function toggleDrawer(open) {
  drawerOpen = open;
  const drawer   = document.getElementById('drawer');
  const backdrop = document.getElementById('backdrop');
  drawer.style.transform   = open ? 'translateX(0)' : 'translateX(100%)';
  backdrop.style.opacity   = open ? '1' : '0';
  backdrop.style.pointerEvents = open ? 'auto' : 'none';
  if (open) renderDrawerItems();
}

function renderDrawerItems() {
  const ids = Object.keys(cart);
  const empty    = document.getElementById('empty-state');
  const list     = document.getElementById('cart-list');
  const form     = document.getElementById('customer-form');
  const footer   = document.getElementById('drawer-footer');
  const totalLbl = document.getElementById('total-label');

  if (ids.length === 0) {
    empty.classList.remove('hidden');
    list.classList.add('hidden');    list.classList.remove('flex');
    form.classList.add('hidden');
    footer.classList.add('hidden');
    return;
  }

  empty.classList.add('hidden');
  list.classList.remove('hidden');  list.classList.add('flex');
  form.classList.remove('hidden');
  footer.classList.remove('hidden');

  // render items
  list.innerHTML = '';
  ids.forEach(id => {
    const item = ITEMS.find(i => i.id === +id);
    if (!item) return;
    const qty = cart[id];
    const row = document.createElement('div');
    row.className = 'flex items-center gap-3 rounded-2xl p-3';
    row.style.background = '#f9fafb';
    row.innerHTML = `
      <img src="${item.img}" alt="${item.name}"
           class="rounded-xl object-cover shrink-0" style="width:56px;height:56px" />
      <div class="flex-1 min-w-0">
        <div class="font-bold text-sm text-black mb-0.5">${item.name}</div>
        <div class="font-bold text-xs" style="color:#b45309">${item.price * qty} ريال</div>
      </div>
      <div class="flex items-center gap-1.5 shrink-0">
        <button onclick="changeQty(${item.id},-1)"
                class="w-8 h-8 flex items-center justify-center rounded-full text-lg font-black cursor-pointer"
                style="border:1.5px solid #e5e7eb;background:#fff;color:#374151">−</button>
        <span class="font-black text-sm text-black" style="min-width:18px;text-align:center">${toAr(qty)}</span>
        <button onclick="changeQty(${item.id},1)"
                class="w-8 h-8 flex items-center justify-center rounded-full text-lg font-black text-white cursor-pointer"
                style="background:#78350f;border:none">+</button>
      </div>
      <button onclick="removeFromCart(${item.id})"
              class="text-red-500 text-lg cursor-pointer shrink-0" style="background:none;border:none">🗑️</button>
    `;
    list.appendChild(row);
  });

  totalLbl.textContent = `${toAr(totalPrice())} ريال`;
}

// ── Toast ──────────────────────────────────────
let toastTimer = null;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.remove('hidden');
  t.classList.add('toast-anim');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.add('hidden');
    t.classList.remove('toast-anim');
  }, 1800);
}

// ── Send Order ─────────────────────────────────
function setFieldError(fieldId, errId, hasError) {
  const field = document.getElementById(fieldId);
  const err   = document.getElementById(errId);
  if (hasError) {
    field.style.borderColor = '#ef4444';
    field.style.background  = '#fff5f5';
    err.classList.remove('hidden');
  } else {
    field.style.borderColor = '#e5e7eb';
    field.style.background  = '#f9fafb';
    err.classList.add('hidden');
  }
}

function sendOrder() {
  const name    = document.getElementById('f-name').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const address = document.getElementById('f-address').value.trim();

  const errName    = !name;
  const errPhone   = !phone;
  const errAddress = !address;

  setFieldError('f-name',    'err-name',    errName);
  setFieldError('f-phone',   'err-phone',   errPhone);
  setFieldError('f-address', 'err-address', errAddress);

  if (errName || errPhone || errAddress) return;
  if (totalQty() === 0) return;

  const lines = Object.entries(cart).map(([id, qty]) => {
    const item = ITEMS.find(i => i.id === +id);
    return `• ${item.name} x${qty} = ${item.price * qty} ريال`;
  });

  const msg =
    `🍽️ طلب جديد من مطعم الأصالة\n` +
    `──────────────────\n` +
    `👤 الاسم: ${name}\n` +
    `📞 الهاتف: ${phone}\n` +
    `📍 العنوان: ${address}\n` +
    `──────────────────\n` +
    lines.join('\n') + '\n' +
    `──────────────────\n` +
    `💰 الإجمالي: ${totalPrice()} ريال`;

  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
}

// clear error on input
['f-name','f-phone','f-address'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const errMap = { 'f-name':'err-name', 'f-phone':'err-phone', 'f-address':'err-address' };
    setFieldError(id, errMap[id], false);
  });
});

// ── Init ───────────────────────────────────────
renderMenu();
</script>
