<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ابن سوريا - المحاكاة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --main: #E31E24; --bg: #f8f9fa; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: url('https://www.transparenttextures.com/patterns/food.png'); /* خلفية خفيفة زي الفيديو */
            overflow-x: hidden;
            touch-action: pan-y;
        }

        header {
            padding: 15px 25px; background: rgba(255,255,255,0.9);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 2000;
        }

        /* --- محاكاة منطقة القوس من الفيديو --- */
        .header-arc-section {
            position: relative; width: 100%; height: 240px;
            background: #fff; overflow: hidden;
            border-bottom-left-radius: 60px; border-bottom-right-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .arc-title {
            text-align: center; margin-top: 15px; font-weight: 900;
            font-size: 22px; color: #333;
        }

        /* القرص الدوار العملاق */
        .gear-wheel {
            position: absolute;
            bottom: -480px; /* المركز بعيد جداً تحت عشان القوس يبقى واسع */
            left: 50%;
            width: 700px; height: 700px;
            margin-left: -350px;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            transform-origin: center center;
            will-change: transform;
        }

        .category-node {
            position: absolute;
            top: 0; left: 50%;
            width: 100px; height: 350px; /* المسافة من المركز للمحيط */
            margin-left: -50px;
            transform-origin: bottom center;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer;
        }

        .icon-circle {
            width: 85px; height: 85px; background: #fff; border-radius: 50%;
            border: 4px solid #f0f0f0; display: flex; align-items: center; 
            justify-content: center; font-size: 35px; transition: 0.4s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            background-size: cover; background-position: center;
        }

        .category-node.active .icon-circle {
            border-color: var(--main); transform: scale(1.2);
            box-shadow: 0 12px 30px rgba(227, 30, 36, 0.25);
        }

        .category-node p {
            margin-top: 12px; font-weight: 800; font-size: 15px;
            color: #777; transition: 0.3s;
        }

        .category-node.active p { color: var(--main); font-size: 17px; }

        /* مؤشر الاختيار (الخط الأخضر تحت القسم) */
        .active-indicator {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); width: 40px; height: 5px;
            background: var(--main); border-radius: 10px;
        }

        /* --- شبكة المنتجات --- */
        .items-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 0 20px 100px 20px;
        }

        .food-card {
            background: #fff; border-radius: 25px; padding: 15px;
            text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .food-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
        .food-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: #333; height: 45px; display: flex; align-items: center; justify-content: center;}
        .food-price { color: #2ecc71; font-weight: 900; font-size: 18px; }

        .add-btn {
            background: #f8f9fa; border: none; width: 45px; height: 45px;
            border-radius: 15px; font-size: 20px; cursor: pointer;
            margin-top: 15px; color: #333; transition: 0.2s;
        }
        .add-btn:active { background: var(--main); color: #fff; }

        /* السلة */
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 100%; max-width: 450px; height: 100%; background: #fff; z-index: 3000; padding: 30px; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .cart-sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2500; display: none; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight:900; color:var(--main); font-size:24px;">ابن سوريا</div>
        <div onclick="toggleCart()" style="position:relative; cursor:pointer;">
            <i class="fas fa-shopping-bag" style="font-size:26px; color:#333;"></i>
            <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--main); color:#fff; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold;">0</span>
        </div>
    </header>

    <div class="header-arc-section" id="swipe-zone">
        <div class="arc-title">اطلب الآن</div>
        <div class="gear-wheel" id="gear">
            </div>
        <div class="active-indicator"></div>
    </div>

    <div class="items-grid" id="menu-container"></div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="sidebar">
        <h2 style="margin-bottom:20px;">طلباتك المختارة 🍖</h2>
        <div id="cart-list" style="margin-bottom: 25px; border-top: 1px solid #eee;"></div>
        <h3 style="margin-bottom:30px;">الإجمالي: <span id="total-val" style="color:var(--main)">0</span> ج.م</h3>
        
        <input type="text" id="cust-name" style="width:100%; padding:15px; margin-bottom:10px; border:1.5px solid #eee; border-radius:15px;" placeholder="اسم حضرتك">
        <button onclick="sendOrder()" style="background:#25D366; color:#fff; border:none; width:100%; padding:18px; border-radius:18px; font-weight:900; font-size:18px; cursor:pointer;">إرسال للواتساب</button>
        <button onclick="toggleCart()" style="width:100%; background:none; border:none; margin-top:20px; color:#aaa; font-weight:bold;">إغلاق السلة</button>
    </div>

    <script>
        const cats = [
            {n:"الكل", e:"🍽️"}, {n:"كشري", e:"🍲"}, {n:"شاورما", e:"🌯"}, 
            {n:"طواجن", e:"🥘"}, {n:"مشويات", e:"🍢"}, {n:"حواوشي", e:"🥙"}
        ];

        const products = [
            {id:1, n:"كشري مصري ملكي", p:45, c:"كشري", e:"🍲"},
            {id:2, n:"شاورما فراخ سوبر", p:95, c:"شاورما", e:"🌯"},
            {id:3, n:"حواوشي بلدي مشوي", p:70, c:"حواوشي", e:"🥙"},
            {id:4, n:"طاجن لحمة بالبصل", p:180, c:"طواجن", e:"🥘"},
            {id:5, n:"نص فرخة مشوية", p:140, c:"مشويات", e:"🍗"},
            {id:6, n:"كريب شاورما", p:85, c:"شاورما", e:"🌯"}
        ];

        let cart = [];
        let currentIdx = 0;
        const gear = document.getElementById('gear');
        const angleUnit = 32; // زاوية التباعد بين الأقسام

        function buildGear() {
            gear.innerHTML = cats.map((c, i) => {
                const rotation = i * angleUnit;
                return `
                    <div class="category-node" style="transform: rotate(${rotation}deg)" onclick="goIdx(${i})">
                        <div class="icon-circle">${c.e}</div>
                        <p>${c.n}</p>
                    </div>
                `;
            }).join('');
            goIdx(0);
        }

        function goIdx(idx) {
            currentIdx = idx;
            const targetRotation = -idx * angleUnit;
            gear.style.transform = `rotate(${targetRotation}deg)`;

            document.querySelectorAll('.category-node').forEach((node, i) => {
                node.classList.toggle('active', i === idx);
                // موازنة الأيقونات لتظل معتدلة
                const circle = node.querySelector('.icon-circle');
                const p = node.querySelector('p');
                circle.style.transform = `rotate(${-targetRotation - (i * angleUnit)}deg)`;
                p.style.transform = `rotate(${-targetRotation - (i * angleUnit)}deg)`;
            });

            render(cats[idx].n);
        }

        // دعم السحب (Swipe) مثل الفيديو تماماً
        let startX = 0;
        document.getElementById('swipe-zone').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('swipe-zone').addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 40) {
                if (diff > 0 && currentIdx < cats.length - 1) goIdx(currentIdx + 1);
                else if (diff < 0 && currentIdx > 0) goIdx(currentIdx - 1);
            }
        });

        function render(category) {
            const container = document.getElementById('menu-container');
            const list = category === "الكل" ? products : products.filter(p => p.c === category);
            container.innerHTML = list.map(p => `
                <div class="food-card">
                    <span class="food-emoji">${p.e}</span>
                    <div class="food-name">${p.n}</div>
                    <div class="food-price">${p.p} ج.م</div>
                    <button class="add-btn" onclick="addToCart(${p.id})"><i class="fas fa-plus"></i></button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            document.getElementById('cart-count').innerText = cart.length;
            updateCart();
            // تأثير خفيف عند الإضافة
            const bag = document.querySelector('.fa-shopping-bag');
            bag.style.transform = "scale(1.3)";
            setTimeout(()=> bag.style.transform = "scale(1)", 200);
        }

        function updateCart() {
            const listDiv = document.getElementById('cart-list');
            listDiv.innerHTML = cart.map((item, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #f9f9f9;">
                    <span>${item.n}</span>
                    <strong style="color:var(--main)">${item.p} ج.م <i class="fas fa-times" onclick="cart.splice(${i},1);updateCart();" style="color:#ccc; margin-right:10px; cursor:pointer;"></i></strong>
                </div>
            `).join('');
            document.getElementById('total-val').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        function toggleCart() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            if(!name || cart.length === 0) return alert("من فضلك دخل اسمك وطلبك!");
            const orderList = cart.map(i => `- ${i.n} (${i.p} ج.م)`).join('%0A');
            const total = document.getElementById('total-val').innerText;
            const text = `*طلب جديد - مطعم ابن سوريا*%0A%0A*العميل:* ${name}%0A%0A*الطلبات:*%0A${orderList}%0A%0A*الإجمالي:* ${total} ج.م`;
            window.open(`https://wa.me/201016991319?text=${text}`);
        }

        buildGear();
    </script>
</body>
</html>
