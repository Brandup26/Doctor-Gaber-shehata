<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم ليالي الشام - المنيو الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="overlay">
            <div class="logo-area">
                <h1>ليالي الشام ✨</h1>
                <p>أصل المذاق السامي في قلبك</p>
            </div>
        </div>
    </header>

    <div class="categories-nav">
        <div class="category-item active" onclick="filterMenu('all')">الكل</div>
        <div class="category-item" onclick="filterMenu('grills')">المشويات</div>
        <div class="category-item" onclick="filterMenu('shawarma')">الشاورما</div>
        <div class="category-item" onclick="filterMenu('appetizers')">المقبلات</div>
        <div class="category-item" onclick="filterMenu('dessert')">الحلويات</div>
    </div>

    <div class="menu-container" id="menuGrid">
        </div>

    <div id="cartBar" class="cart-bar" onclick="sendOrder()">
        <div class="cart-info">
            <span class="count-badge" id="cartCount">0</span>
            <span>مشاهدة الطلب</span>
        </div>
        <div class="cart-total">
            <span id="cartTotal">0</span> ج.م
            <i class="fab fa-whatsapp"></i>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
