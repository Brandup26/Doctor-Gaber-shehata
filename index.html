<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الذواقة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .icon-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
    </style>
</head>
<body class="pb-10">

    <div class="flex flex-col items-center pt-10 pb-6 px-4">
        <div class="w-28 h-28 bg-white p-2 rounded-3xl shadow-xl mb-4">
            <img src="https://ui-avatars.com/api/?name=Z&background=fbbf24&color=fff&size=128" class="w-full h-full rounded-2xl object-cover" alt="Logo">
        </div>
        <h1 class="text-2xl font-black text-gray-900 mb-2">مطعم الذواقة</h1>
        <p class="text-center text-gray-500 text-sm max-w-xs leading-relaxed">أشهى المأكولات العربية والعالمية بجودة فائقة ونكهات لا تُنسى</p>
    </div>

    <div class="max-w-md mx-auto px-4 space-y-4">
        
        <div class="bg-white p-4 rounded-[2rem] card-shadow flex items-center justify-between border border-gray-50">
            <div class="flex items-center gap-4">
                <div class="icon-box bg-green-100 text-green-600 text-2xl">🥗</div>
                <div>
                    <h3 class="font-bold text-gray-800">المقبلات</h3>
                    <p class="text-xs text-gray-400">تشكيلة مميزة من المقبلات الطازجة</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-orange-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
        </div>

        <div class="bg-white p-4 rounded-[2rem] card-shadow flex items-center justify-between border border-gray-50">
            <div class="flex items-center gap-4">
                <div class="icon-box bg-red-100 text-red-600 text-2xl">🔥</div>
                <div>
                    <h3 class="font-bold text-gray-800">المشويات</h3>
                    <p class="text-xs text-gray-400">لحوم طازجة مشوية على الفحم</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
        </div>

    </div>

</body>
</html>
