<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | المسار الوهمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --active-green: #89B42D; --bg: #F9F9F9; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        .header-nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; }
        
        /* السلة على اليسار */
        .cart-trigger {
            width: 45px; height: 45px; background: #111; color: white;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer; order: -1;
        }

        /* منطقة الأقسام والكيرف الوهمي */
        .hero-viewport {
            position: relative; height: 280px; width: 100%;
            background: white; overflow: hidden; display: flex; justify-content: center;
        }

        /* الكيرف الأبيض الذي يغطي الجزء السفلي من الدائرة */
        .hero-viewport::after {
            content: ''; position: absolute; bottom: -40px; width: 120%; height: 100px;
            background: var(--bg); border-radius: 50% 50% 0 0; z-index: 10;
        }

        /* المسار المنقط (الخرطوم الوهمي) */
        .path-line {
            position: absolute; top: 160px; width: 480px; height: 480px;
            border: 1.5px dashed rgba(0,0,0,0.1); border-radius: 50%;
            pointer-events: none; z-index: 1;
        }

        .hero-gear {
            position: absolute; top: 160px; width: 500px; height: 500px;
            border-radius: 50%; will-change: transform; z-index: 5;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%; width: 85px;
            margin-left: -42.5px; margin-top: -50px; display: flex; flex-direction: column; align-items: center;
        }

        /* الأيقونات */
        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%; background: white;
            padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
            border: 2px solid transparent;
        }
        .hero-cat-item.active .cat-img-wrapper { border-color: var(--active-green); transform: scale(1.1); }
        .cat-img-wrapper img { width: 85%; height: 85%; object-fit: contain; }

        .cat-info { margin-top: 8px; text-align: center; opacity: 0.5; transition: 0.3s; }
        .hero-cat-item.active .cat-info { opacity: 1; }
        .cat-info span { font-size: 13px; font-weight: 700; color: #555; }
        .hero-cat-item.active span { color: var(--active-green); }

        .active-line { width: 18px; height: 4px; background: transparent; border-radius: 10px; margin-top: 4px; }
        .hero-cat-item.active .active-line { background: var(--active-green); }
    </style>
</head>
<body>

    <nav class="header-nav">
        <div class="cart-trigger" id="cart-btn">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">3</span>
        </div>
        <h1 class="text-xl font-black">إبن سوريا<span class="text-green-600">.</span></h1>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="path-line"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="p-5 relative z-20">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-center text-gray-800">شاورما</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <script>
        const categories = [
            { name: 'شاورما', img: 'https://cdn-icons-png.flaticon.com/512/5741/5741085.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مشويات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' }
        ];

        let currentRot = 0;
        const gear = document.getElementById('hero-gear');
        const step = 42; // زاوية التقارب

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                
                // التموضع على المسار الدائري (نصف قطر 240)
                const x = 240 * Math.sin(angle * Math.PI / 180);
                const y = -240 * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <div class="cat-img-wrapper"><img src="${cat.img}"></div>
                    <div class="cat-info">
                        <span>${cat.name}</span>
                        <div class="active-line"></div>
                    </div>
                `;
                gear.appendChild(item);
            });
            renderFood();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        hammer.on("pan", (e) => {
            let dragRot = currentRot + (e.deltaX / 5);
            gsap.set(gear, { rotation: dragRot });
            syncIcons(dragRot);
        });

        hammer.on("panend", (e) => {
            currentRot = Math.round(gsap.getProperty(gear, "rotation") / step) * step;
            const minRot = -(categories.length - 1) * step;
            if (currentRot > 0) currentRot = 0;
            if (currentRot < minRot) currentRot = minRot;

            gsap.to(gear, { 
                rotation: currentRot, 
                duration: 0.6, 
                ease: "power2.out",
                onUpdate: () => syncIcons(gsap.getProperty(gear, "rotation"))
            });
            updateState(Math.abs(currentRot / step));
        });

        function syncIcons(rot) {
            document.querySelectorAll('.hero-cat-item').forEach(it => {
                gsap.set(it, { rotation: -rot });
            });
        }

        function updateState(idx) {
            const i = Math.round(idx);
            document.querySelectorAll('.hero-cat-item').forEach((it, j) => it.classList.toggle('active', j === i));
            document.getElementById('cat-title').innerText = categories[i].name;
        }

        function renderFood() {
            const foods = [
                { name: 'شاورما عائلي', price: 150, img: 'https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400' },
                { name: 'بيتزا إيطالي', price: 120, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400' }
            ];
            document.getElementById('food-grid').innerHTML = foods.map(f => `
                <div class="bg-white p-4 rounded-[25px] shadow-sm">
                    <img src="${f.img}" class="w-full h-32 object-cover rounded-2xl mb-3">
                    <h3 class="font-bold text-sm text-right">${f.name}</h3>
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-green-600 font-black">${f.price}ج</span>
                        <button class="bg-black text-white w-8 h-8 rounded-full">+</button>
                    </div>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
