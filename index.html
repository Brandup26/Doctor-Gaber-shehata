<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | طريقة البطل الدائرية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #F5F5F5; --active-green: #89B42D; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; }

        /* منطقة العرض الرئيسية */
        .hero-viewport {
            position: relative; height: 320px; width: 100%;
            background: #fff; overflow: hidden; touch-action: none;
            display: flex; justify-content: center;
        }

        /* خط المسار الدائري الوهمي (مثل الصورة) */
        .category-path-line {
            position: absolute;
            top: 220px; /* نفس مركز الدوران */
            width: 600px; height: 600px;
            border: 1.5px dashed rgba(0,0,0,0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        /* الترس الحامل للأقسام */
        .hero-gear {
            position: absolute; top: 220px; /* المركز */
            width: 600px; height: 600px;
            border-radius: 50%; will-change: transform;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 90px; height: 110px; margin-left: -45px; margin-top: -45px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }

        /* النص فوق الصورة */
        .hero-cat-item span {
            font-size: 13px; font-weight: 700; color: #777;
            margin-bottom: 8px; transition: 0.3s; white-space: nowrap;
        }

        .cat-img-wrapper {
            width: 75px; height: 75px; border-radius: 50%;
            background: #fff; overflow: hidden;
            border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }

        .cat-img-wrapper img { width: 85%; height: 85%; object-fit: contain; }

        /* حالة النشاط (مطابقة للفيديو) */
        .hero-cat-item.active span { color: var(--active-green); font-weight: 900; }
        .hero-cat-item.active .cat-img-wrapper { 
            transform: scale(1.15); 
            border-color: var(--active-green);
            box-shadow: 0 10px 25px rgba(137, 180, 45, 0.2);
        }

        /* المؤشر السفلي الأخضر */
        .active-indicator {
            position: absolute; bottom: 10px;
            width: 35px; height: 5px; background: var(--active-green);
            border-radius: 10px; transition: 0.3s;
        }

        .food-grid { padding: 20px; display: grid; grid-cols: 2; gap: 15px; }
    </style>
</head>
<body>

    <div class="hero-viewport" id="hero-touch">
        <div class="category-path-line"></div>
        
        <div id="hero-gear" class="hero-gear"></div>

        <div class="active-indicator"></div>
    </div>

    <main class="p-5">
        <h2 id="cat-title" class="text-2xl font-black mb-6 text-gray-800">بيتزا</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        const categories = [
            { name: 'السندوتشات', img: 'https://cdn-icons-png.flaticon.com/512/3238/3238713.png' },
            { name: 'بيتزا', img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { name: 'برجر', img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { name: 'مكرونات', img: 'https://cdn-icons-png.flaticon.com/512/3480/3480618.png' },
            { name: 'مقبلات', img: 'https://cdn-icons-png.flaticon.com/512/2515/2515183.png' }
        ];

        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');
        const step = 35; // المسافة الزاوية بين كل قسم (تحكم في تباعدهم)
        const radius = 250; // نصف قطر الدوران (المسار)

        function init() {
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                
                // حساب الموقع على الدائرة
                const angle = i * step;
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `
                    <span>${cat.name}</span>
                    <div class="cat-img-wrapper">
                        <img src="${cat.img}">
                    </div>
                `;
                gear.appendChild(item);
            });
            renderProducts();
        }

        const hammer = new Hammer(document.getElementById('hero-touch'));
        let startRot = 0;

        hammer.on("panstart", () => {
            startRot = gearRotation;
            gear.style.transition = "none";
        });

        hammer.on("panmove", (e) => {
            // تحريك الترس بناءً على حركة الإصبع
            let targetRot = startRot + (e.deltaX * 0.2); 
            
            // حدود الدوران لعدم الخروج عن الأقسام
            const minRot = - (categories.length - 1) * step;
            if (targetRot > 5) targetRot = 5; 
            if (targetRot < minRot - 5) targetRot = minRot - 5;

            gearRotation = targetRot;
            applyRotation(gearRotation);
        });

        hammer.on("panend", () => {
            // الانجذاب لأقرب قسم (Snapping)
            const minRot = - (categories.length - 1) * step;
            let finalRot = Math.round(gearRotation / step) * step;
            
            if (finalRot > 0) finalRot = 0;
            if (finalRot < minRot) finalRot = minRot;

            gear.style.transition = "transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)";
            gearRotation = finalRot;
            applyRotation(gearRotation);
            
            // تحديث العنوان والحالة النشطة
            const activeIndex = Math.abs(finalRot / step);
            updateActive(activeIndex);
        });

        function applyRotation(rot) {
            gear.style.transform = `rotate(${rot}deg)`;
            // تعديل دوران الصور والنصوص لتبقى معتدلة دائماً
            document.querySelectorAll('.hero-cat-item').forEach(item => {
                const innerImg = item.querySelector('.cat-img-wrapper');
                const innerSpan = item.querySelector('span');
                innerImg.style.transform = `rotate(${-rot}deg)`;
                innerSpan.style.transform = `rotate(${-rot}deg)`;
            });
        }

        function updateActive(idx) {
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => {
                it.classList.toggle('active', i === idx);
            });
            document.getElementById('cat-title').innerText = categories[idx].name;
        }

        function renderProducts() {
            const grid = document.getElementById('food-grid');
            // مثال لمنتجات ثابتة
            for(let i=0; i<4; i++) {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-[25px] shadow-sm border border-gray-100">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400" class="w-full h-32 object-cover rounded-2xl mb-3">
                        <h3 class="font-bold text-sm">منتج تجريبي ${i+1}</h3>
                        <p class="text-xs text-gray-400 mt-1">وصف قصير جداً...</p>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-green-600 font-black">120 ج.م</span>
                            <button class="bg-black text-white w-8 h-8 rounded-full text-lg">+</button>
                        </div>
                    </div>`;
            }
        }

        init();
    </script>
</body>
</html>
