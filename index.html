<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو إبن سوريا - الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-ios: #F2F2F7;
            --blue-ios: #007AFF;
            --white: #FFFFFF;
            --shadow: 0 4px 25px rgba(0,0,0,0.06);
            --transition-ios: all 0.5s cubic-bezier(0.32, 1, 0.23, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-ios); color: #1C1C1E; overflow-x: hidden; }

        header {
            background: var(--white); padding: 20px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: var(--shadow); text-align: center; position: relative;
        }

        .main-logo { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 8px; object-fit: cover; }

        .cart-trigger {
            position: absolute; top: 25px; left: 20px; width: 50px; height: 50px;
            background: var(--white); border-radius: 15px; display: flex;
            align-items: center; justify-content: center; box-shadow: var(--shadow);
            cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
        }

        #cart-count {
            position: absolute; top: -5px; right: -5px; background: #FF3B30;
            color: white; font-size: 11px; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 2px solid white;
        }

        .categories-scroll { display: flex; gap: 15px; padding: 25px 20px; overflow-x: auto; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-card { text-align: center; min-width: 90px; cursor: pointer; }
        .cat-card img { width: 75px; height: 75px; border-radius: 22px; object-fit: cover; border: 3px solid white; box-shadow: var(--shadow); transition: var(--transition-ios); }
        .cat-card.active img { border-color: var(--blue-ios); transform: scale(1.1) rotate(3deg); }
        .cat-card span { display: block; margin-top: 8px; font-weight: 800; font-size: 12px; }

        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 12px 120px; }

        .food-item { background: var(--white); border-radius: 24px; padding: 15px; box-shadow: var(--shadow); position: relative; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .food-item h3 { font-size: 14px; font-weight: 800; margin-bottom: 12px; text-align: center; color: #1C1C1E; height: 40px; display: flex; align-items: center; justify-content: center; }
        
        .price-options { display: flex; flex-direction: column; gap: 8px; }
        .price-btn {
            background: #F9F9FB; border: 1.5px solid #F2F2F7; padding: 10px 12px; border-radius: 14px;
            font-size: 12px; font-weight: 700; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center; transition: 0.2s;
        }
        .price-btn i { color: var(--blue-ios); font-size: 14px; margin-right: 5px; }
        .price-btn:active { background: var(--blue-ios); border-color: var(--blue-ios); color: white; transform: scale(0.95); }
        .price-btn:active i { color: white; }

        /* سلة الطلبات */
        #cart-sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 2000;
            visibility: hidden; opacity: 0; transition: var(--transition-ios);
            display: flex; align-items: flex-end;
        }
        #cart-sheet-overlay.active { visibility: visible; opacity: 1; }
        .ios-bottom-sheet {
            width: 100%; background: var(--white); border-top-left-radius: 35px;
            border-top-right-radius: 35px; padding: 20px; transform: translateY(100%);
            transition: var(--transition-ios); max-height: 80vh; overflow-y: auto;
        }
        #cart-sheet-overlay.active .ios-bottom-sheet { transform: translateY(0); }
        .handle-bar { width: 40px; height: 5px; background: #D1D1D6; border-radius: 10px; margin: 0 auto 20px; }

        .cart-item-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #F2F2F7; font-weight: 700; }
        .confirm-order-btn { width: 100%; padding: 20px; background: var(--blue-ios); color: white; border: none; border-radius: 20px; font-size: 17px; font-weight: 800; cursor: pointer; margin-top: 15px; }

        .flyer { position: fixed; z-index: 3000; width: 22px; height: 22px; background: var(--blue-ios); border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; pointer-events: none; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

<header>
    <div class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-bag" style="font-size: 22px; color: var(--blue-ios);"></i>
        <span id="cart-count">0</span>
    </div>
    <img src="logoo.jpg" class="main-logo" onerror="this.src='https://via.placeholder.com/100'">
    <h2 style="font-size: 22px; font-weight: 900;">إبن سوريا</h2>
</header>

<div class="categories-scroll" id="cat-list"></div>
<div class="menu-container" id="food-grid"></div>

<div id="cart-sheet-overlay" onclick="if(event.target.id==='cart-sheet-overlay') toggleCart()">
    <div class="ios-bottom-sheet">
        <div class="handle-bar"></div>
        <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 15px; text-align: center;">طلباتك</h2>
        <div id="cart-items-list"></div>
        <div style="padding: 20px 0; display: flex; justify-content: space-between; font-size: 22px; font-weight: 900; color: var(--blue-ios);">
            <span>الإجمالي</span><span id="total-val">0 ج.م</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="c-name" placeholder="اسمك الكريم" style="padding: 16px; border-radius: 15px; border: 1.5px solid #EEE; outline: none; font-size: 15px;">
            <button class="confirm-order-btn" onclick="submitFinalOrder()">إرسال الطلب واتساب <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>
</div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwVeN6ohlItpy6_3Fr5nIPaPgJoMoffwDfq85i8oG1c92XjW3wFknmB6Ahvj8BpQ/pub?output=csv';

    let products = [];
    let cart = [];
    let categories = [];

    async function loadData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== '');
            
            products = rows.slice(1).map((row, index) => {
                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                return { id: index, cat: cols[0], name: cols[1], small: cols[2], medium: cols[3], large: cols[4] };
            });

            categories = [...new Set(products.map(p => p.cat))];
            renderCats();
            // تفعيل أول قسم تلقائياً وحذف "الكل"
            if(categories.length > 0) filter(categories[0]);
        } catch (e) { console.error(e); }
    }

    function renderCats() {
        document.getElementById('cat-list').innerHTML = categories.map((c, i) => `
            <div class="cat-card ${i===0?'active':''}" onclick="filter('${c}', event)">
                <img src="logo${i+1}.jpg" onerror="this.src='logoo.jpg'">
                <span>${c}</span>
            </div>
        `).join('');
    }

    function render(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-item">
                <h3>${p.name}</h3>
                <div class="price-options">
                    ${p.small && p.small !== '-' ? `<button class="price-btn" onclick="add('${p.name} (صغير)', ${p.small}, event)"><span>صغير: ${p.small}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.medium && p.medium !== '-' ? `<button class="price-btn" onclick="add('${p.name} (وسط)', ${p.medium}, event)"><span>وسط: ${p.medium}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                    ${p.large && p.large !== '-' ? `<button class="price-btn" onclick="add('${p.name} (كبير)', ${p.large}, event)"><span>كبير: ${p.large}ج</span> <i class="fas fa-plus-circle"></i></button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function add(name, price, e) {
        cart.push({name, price: parseFloat(price)});
        updateUI();
        flyAnimation(e);
    }

    function flyAnimation(e) {
        const f = document.createElement('div');
        f.className = 'flyer';
        f.innerHTML = '<i class="fas fa-cart-arrow-down"></i>';
        f.style.left = e.clientX + 'px';
        f.style.top = e.clientY + 'px';
        document.body.appendChild(f);
        const target = document.querySelector('.cart-trigger').getBoundingClientRect();
        setTimeout(() => { 
            f.style.left = (target.left + 20) + 'px'; 
            f.style.top = (target.top + 20) + 'px'; 
            f.style.opacity = '0';
        }, 50);
        setTimeout(() => f.remove(), 600);
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items-list').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-item-row"><span>${i.name}</span><span>${i.price} ج.م</span></div>`;
        }).join('');
        document.getElementById('total-val').innerText = total + " ج.م";
    }

    function toggleCart() { document.getElementById('cart-sheet-overlay').classList.toggle('active'); }

    function filter(cat, e) {
        if(e) {
            document.querySelectorAll('.cat-card').forEach(x => x.classList.remove('active'));
            e.currentTarget.classList.add('active');
        }
        render(products.filter(p => p.cat === cat));
    }

    function submitFinalOrder() {
        const name = document.getElementById('c-name').value;
        if(!name || cart.length === 0) return alert("اكتب اسمك واختر طلباتك أولاً");
        let msg = `*طلب جديد من إبن سوريا*%0A*العميل:* ${name}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price}ج)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText}`;
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    loadData();
</script>
</body>
</html>
