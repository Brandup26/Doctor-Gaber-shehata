<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juicy | تجربة طعام تفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-left">
            <div class="cart-trigger" id="cartOpen">
                <span class="cart-count">0</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            </div>
        </div>
        <div class="nav-center">
            <span class="brand-emoji">🍔</span>
            <h1 class="brand-name">Juicy</h1>
        </div>
        <div class="nav-right">
            <button class="search-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h2 class="main-title">برغر<br><span>جوسي</span></h2>
            <p class="tagline">طازج يومياً <span>•</span> مكونات فاخرة</p>
        </div>
        
        <div class="floating-container">
            <div class="bob-animation">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" alt="Burger" class="hero-img">
            </div>
            <div class="glow-effect"></div>
        </div>
    </header>

    <main class="content">
        <section class="staggered-list">
            <div class="section-header">
                <h3>الأكثر طلباً 🔥</h3>
            </div>
            <div class="grid">
                <div class="card" data-id="1" data-name="كلاسيك برغر" data-price="150">
                    <div class="card-img-wrap">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" alt="Food">
                    </div>
                    <div class="card-info">
                        <h4>كلاسيك جوسي</h4>
                        <div class="card-footer">
                            <span class="price">١٥٠ ج.م</span>
                            <button class="add-to-cart">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="cart-overlay" id="overlay"></div>
    <div class="cart-panel" id="cartPanel">
        <div class="panel-header">
            <h3>سلة المشتريات</h3>
            <button id="cartClose">✕</button>
        </div>
        <div class="panel-body" id="cartItems">
            </div>
        <div class="panel-footer">
            <div class="total-row"><span>الإجمالي:</span><span id="totalPrice">٠ ج.م</span></div>
            <button class="checkout-btn">تأكيد الطلب</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
