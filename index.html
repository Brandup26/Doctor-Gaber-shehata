<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم جابر شحاتة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7fa; }
        .main-card { transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.03); }
        .main-card:active { transform: scale(0.97); background-color: #f9fafb; }
        .orange-gradient { background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%); }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#f4f7fa] min-h-screen pb-10">
        
        <div class="flex flex-col items-center pt-12 pb-8 px-6">
            <div class="w-24 h-24 bg-white rounded-[2.5rem] shadow-2xl flex items-center justify-center p-1 mb-4 border-4 border-white">
                <img src="https://ui-avatars.com/api/?name=Restaurant&background=0ea5e9&color=fff&size=128" class="w-full h-full rounded-[2rem] object-cover">
            </div>
            <h1 class="text-2xl font-black text-[#1e293b]">مطعم الدكتور جابر</h1>
            <p class="text-gray-400 text-sm mt-1 text-center font-medium">أفضل المأكولات الشرقية والغربية</p>
        </div>

        <div class="px-5 space-y-4">
            
            <div class="main-card bg-white p-4 rounded-[1.8rem] shadow-sm flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl shadow-inner">🥩</div>
                    <div>
                        <h3 class="font-bold text-[#1e293b] text-lg">قسم المشويات</h3>
                        <p class="text-xs text-gray-400 font-medium">كباب، كفتة، وطواجن</p>
                    </div>
                </div>
                <div class="w-9 h-9 orange-gradient rounded-full flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <div class="main-card bg-white p-4 rounded-[1.8rem] shadow-sm flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center text-2xl">🥗</div>
                    <div>
                        <h3 class="font-bold text-[#1e293b] text-lg">المقبلات والسلطات</h3>
                        <p class="text-xs text-gray-400 font-medium">أصناف تفتح الشهية</p>
                    </div>
                </div>
                <div class="w-9 h-9 orange-gradient rounded-full flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <div class="main-card bg-white p-4 rounded-[1.8rem] shadow-sm flex items-center justify-between cursor-pointer border-r-4 border-blue-500">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-100 rounded-2xl flex items-center justify-center text-xl text-blue-600">📱</div>
                    <div>
                        <h3 class="font-bold text-[#1e293b] text-lg">تواصل معنا</h3>
                        <p class="text-xs text-gray-400 font-medium">واتساب، فيسبوك، انستجرام</p>
                    </div>
                </div>
                <div class="w-9 h-9 orange-gradient rounded-full flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-180" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

        </div>

        <footer class="mt-12 text-center text-gray-300 text-xs font-bold tracking-widest uppercase">
            Powered by TechnoLab Systems
        </footer>

    </div>

</body>
</html>
