<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الأصالة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { tajawal: ['Tajawal', 'sans-serif'] },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
          colors: {
            brand: { DEFAULT: '#78350f', light: '#b45309', dark: '#431d06' },
            wa: '#16a34a',
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
    body { background-color: #f1f2f4; color: #000; direction: rtl; }
    .menu-card { transition: transform .2s, box-shadow .2s; }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.13); }
    #drawer { transition: transform .35s cubic-bezier(.4,0,.2,1); }
    #backdrop { transition: opacity .3s; }
    #toast { transition: opacity .3s, transform .3s; }
    .field:focus { outline: none; border-color: #78350f; background: #fff; }
    @keyframes fadeUp {
      0%   { opacity:0; transform:translateX(-50%) translateY(12px); }
      20%  { opacity:1; transform:translateX(-50%) translateY(0); }
      80%  { opacity:1; }
      100% { opacity:0; transform:translateX(-50%) translateY(-6px); }
    }
    .toast-anim { animation: fadeUp 1.8s ease forwards; }
  </style>
</head>
<body class="min-h-screen">

<section style="background: linear-gradient(135deg,#78350f 0%,#92400e 60%,#b45309 100%)"
         class="relative overflow-hidden px-5 py-14 text-center">
  <button onclick="toggleDrawer(true)" id="hero-cart-btn"
          class="absolute top-5 left-5 flex items-center gap-2 rounded-2xl px-3 py-2 text-white cursor-pointer"
          style="background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);backdrop-filter:blur(4px)">
    🛒 <span id="hero-badge" class="hidden text-xs font-black bg-wa text-white rounded-full px-2 py-0.5"></span>
  </button>
  <div class="relative z-10">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-5 text-4xl"
         style="background:rgba(255,255,255,.15)">🍽️</div>
    <h1 class="text-5xl font-black text-white mb-3">مطعم الأصالة</h1>
    <p class="text-xl font-medium" style="color:#fde68a">أشهى المأكولات العربية الأصيلة</p>
  </div>
</section>

<main class="max-w-6xl mx-auto px-4 py-10 pb-36" id="menu-root"></main>

<div class="fixed bottom-0 left-0 right-0 z-50 flex justify-center pb-5 pt-3"
     style="background:linear-gradient(to top,#f1f2f4 65%,transparent)">
  <button onclick="toggleDrawer(true)" id="cta-btn"
          class="flex items-center justify-center gap-3 rounded-full text-white font-black text-lg px-10 py-4 cursor-pointer"
          style="background:#78350f;box-shadow:0 4px 20px rgba(120,53,15,.35);min-width:230px;border:none">
    <span>🛒</span> <span id="cta-label">ابدأ طلبك</span>
  </button>
</div>

<div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[400] hidden rounded-full px-6 py-3 text-white font-bold text-sm"
     style="background:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,.4);white-space:nowrap">✓ تمت الإضافة للسلة</div>

<div id="backdrop" onclick="toggleDrawer(false)" class="fixed inset-0 z-[200] pointer-events-none opacity-0" style="background:rgba(0,0,0,.45)"></div>

<div id="drawer" class="fixed top-0 right-0 bottom-0 z-[201] flex flex-col bg-white" style="width:min(400px,100vw);transform:translateX(100%);box-shadow:-4px 0 24px rgba(0,0,0,.15)">
  <div class="flex items-center justify-between px-5 py-4 shrink-0" style="border-bottom:1px solid #f0f0f0">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🛒</span> <span class="font-black text-xl text-black">سلة الطلب</span>
      <span id="drawer-badge" class="hidden text-xs font-bold text-white rounded-full px-2 py-0.5" style="background:#78350f"></span>
    </div>
    <button onclick="toggleDrawer(false)" class="w-9 h-9 flex items-center justify-center rounded-full cursor-pointer text-lg font-bold" style="background:#f3f4f6;border:none">✕</button>
  </div>
  <div id="drawer-body" class="flex-1 overflow-y-auto px-5 py-4">
    <div id="empty-state" class="text-center pt-16">
      <div class="text-6xl mb-4">🛒</div>
      <p class="text-gray-400 text-base">السلة فارغة</p>
    </div>
    <div id="cart-list" class="hidden flex-col gap-3 mb-5"></div>
    <div id="customer-form" class="hidden rounded-3xl p-5" style="background:#f9fafb;border:1.5px solid #e5e7eb">
      <div class="flex flex-col gap-3">
        <div><label class="block font-bold text-sm mb-1.5">👤 الاسم الكامل</label>
        <input id="f-name" type="text" class="field w-full rounded-xl px-4 py-2.5 text-sm" style="border:1.5px solid #e5e7eb"></div>
        <div><label class="block font-bold text-sm mb-1.5">📞 رقم الهاتف</label>
        <input id="f-phone" type="tel" class="field w-full rounded-xl px-4 py-2.5 text-sm" style="border:1.5px solid #e5e7eb"></div>
        <div><label class="block font-bold text-sm mb-1.5">📍 العنوان</label>
        <textarea id="f-address" rows="2" class="field w-full rounded-xl px-4 py-2.5 text-sm" style="border:1.5px solid #e5e7eb"></textarea></div>
      </div>
    </div>
  </div>
  <div id="drawer-footer" class="hidden shrink-0 px-5 pb-6 pt-3" style="border-top:1px solid #f0f0f0">
    <div class="flex justify-between items-center mb-3">
      <span class="font-bold">الإجمالي:</span> <span id="total-label" class="font-black text-2xl" style="color:#78350f"></span>
    </div>
    <button onclick="sendOrder()" class="w-full flex items-center justify-center gap-3 rounded-2xl text-white font-black text-lg py-4 cursor-pointer" style="background:#16a34a;border:none">إرسال الطلب</button>
  </div>
</div>

<script>
// --- الإعدادات ---
const WHATSAPP = '201003800314'; 
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz_K_7-turn6-Q/exec'; // هذا هو عنوان السكريبت الخاص بشيت توستا

const CATEGORIES = [{ id:'main', label:'الأطباق', emoji:'🍖' }];
const ITEMS = [
  { id:1, cat:'main', name:'كبسة لحم', price:45, img:'https://images.unsplash.com/photo-1563379091339-03246963d96c?w=400' },
  { id:2, cat:'main', name:'مندي دجاج', price:38, img:'https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400' }
];

let cart = {};

function renderMenu() {
  const root = document.getElementById('menu-root');
  CATEGORIES.forEach(cat => {
    const section = document.createElement('section');
    section.innerHTML = `<h2 class="font-black text-2xl mb-5">${cat.emoji} ${cat.label}</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="grid-${cat.id}"></div>`;
    root.appendChild(section);
    ITEMS.filter(i => i.cat === cat.id).forEach(item => {
      document.getElementById(`grid-${cat.id}`).innerHTML += `
        <div class="menu-card bg-white p-4 rounded-3xl flex justify-between items-center">
          <div><div class="font-black">${item.name}</div><div class="text-brand">${item.price} ريال</div></div>
          <button onclick="addItem(${item.id})" class="bg-brand text-white px-4 py-2 rounded-xl text-sm">+ إضافة</button>
        </div>`;
    });
  });
}

function addItem(id) { cart[id] = (cart[id] || 0) + 1; updateGlobalUI(); showToast(); }
function updateGlobalUI() {
  const qty = Object.values(cart).reduce((s,q)=>s+q,0);
  document.getElementById('cta-label').textContent = qty > 0 ? `عرض السلة (${qty})` : 'ابدأ طلبك';
}
function toggleDrawer(open) { 
  document.getElementById('drawer').style.transform = open ? 'translateX(0)' : 'translateX(100%)'; 
  if(open) renderDrawerItems();
}
function renderDrawerItems() {
  const list = document.getElementById('cart-list');
  const ids = Object.keys(cart);
  if(ids.length === 0) return;
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('cart-list').classList.remove('hidden');
  document.getElementById('customer-form').classList.remove('hidden');
  document.getElementById('drawer-footer').classList.remove('hidden');
  list.innerHTML = '';
  let total = 0;
  ids.forEach(id => {
    const item = ITEMS.find(i=>i.id==id);
    total += item.price * cart[id];
    list.innerHTML += `<div class="flex justify-between p-2 bg-gray-50 rounded-xl"><span>${item.name} x${cart[id]}</span><span>${item.price*cart[id]}</span></div>`;
  });
  document.getElementById('total-label').textContent = total + " ريال";
}
function showToast() { document.getElementById('toast').classList.remove('hidden'); setTimeout(()=>document.getElementById('toast').classList.add('hidden'), 2000); }

async function sendOrder() {
  const name = document.getElementById('f-name').value;
  const phone = document.getElementById('f-phone').value;
  const address = document.getElementById('f-address').value;
  if(!name || !phone) return alert("اكمل البيانات");

  const itemsTxt = Object.entries(cart).map(([id,q])=> `${ITEMS.find(i=>i.id==id).name} (${q})`).join(' - ');
  const total = document.getElementById('total-label').textContent;

  const data = { name, phone, address, items: itemsTxt, total };

  // إرسال للشيت
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

  // فتح الواتساب
  const msg = `🍽️ طلب جديد\n👤 الاسم: ${name}\n📍 العنوان: ${address}\n📦 الطلبات: ${itemsTxt}\n💰 الإجمالي: ${total}`;
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
}

renderMenu();
</script>
</body>
</html>
