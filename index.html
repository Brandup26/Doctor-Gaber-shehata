<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إبن سوريا | الترس الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --accent: #B8860B; /* ذهبي مطفي مريح */
            --bg: #F9F9F7;    /* أبيض كريمي هادئ جداً */
            --text: #2D2D2D;  /* رمادي غامق بدل الأسود الصريح */
            --card: #FFFFFF;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
        }

        /* Gear Menu System */
        .gear-wrapper {
            position: relative;
            height: 220px;
            width: 100%;
            margin-top: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .gear-container {
            position: absolute;
            bottom: -320px; /* مركز الترس بعيد ليعطي قوس انسيابي */
            width: 700px;
            height: 700px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .gear-item {
            position: absolute;
            top: 50%; left: 50%;
            width: 90px;
            height: 120px;
            margin-left: -45px;
            margin-top: -350px; /* المسافة من المركز */
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-align: center;
            transform-origin: center 350px;
        }

        .category-circle {
            width: 65px;
            height: 65px;
            background: var(--card);
            border-radius: 20px; /* Rounded corners modern */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            margin-bottom: 12px;
            border: 2px solid transparent;
        }

        .gear-item.active .category-circle {
            background: var(--accent);
            color: white;
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 15px 30px rgba(184, 134, 11, 0.3);
        }

        .gear-item span {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            transition: 0.3s;
        }

        .gear-item.active span {
            color: var(--text);
            font-weight: 700;
            transform: scale(1.1);
        }

        /* Product Cards - Minimalist */
        .product-card {
            background: var(--card);
            border-radius: 25px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Floating Order Button */
        .floating-order {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 18px 45px;
            border-radius: 100px;
            font-weight: 700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .floating-order:active { transform: translateX(-50%) scale(0.95); }

        /* Smooth Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <header class="px-6 pt-10 flex justify-between items-center">
        <div>
            <p class="text-gray-400 text-sm">أهلاً بك في</p>
            <h1 class="text-2xl font-bold tracking-tight">إبن سوريا ✨</h1>
        </div>
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-gray-100">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        </div>
    </header>

    <div class="gear-wrapper">
        <div id="gear-container" class="gear-container">
            </div>
    </div>

    <main class="px-6 pb-32">
        <div class="flex justify-between items-center mb-6">
            <h2 id="current-cat-title" class="text-xl font-bold">البرجر</h2>
            <span class="text-accent font-medium text-sm">عرض الكل</span>
        </div>

        <div id="products-grid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div class="floating-order" onclick="openCart()">
        <span id="cart-count">0</span>
        <span>طلب الآن</span>
        <i class="fa-solid fa-chevron-left text-xs opacity-50"></i>
    </div>

    <script>
        const categories = [
            { id: 1, name: 'برجر', icon: '🍔', angle: 0 },
            { id: 2, name: 'بيتزا', icon: '🍕', angle: 45 },
            { id: 3, name: 'ساندوتشات', icon: '🌯', angle: 90 },
            { id: 4, name: 'مكرونات', icon: '🍝', angle: 135 },
            { id: 5, name: 'مقبلات', icon: '🍟', angle: 180 },
            { id: 6, name: 'مشروبات', icon: '🥤', angle: 225 }
        ];

        const products = [
            { id: 101, catId: 1, name: 'برجر كلاسيك', price: 120, img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { id: 102, catId: 1, name: 'برجر دجاج', price: 110, img: 'https://cdn-icons-png.flaticon.com/512/1046/1046784.png' },
            { id: 201, catId: 2, name: 'بيتزا مارجريتا', price: 180, img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' },
            { id: 301, catId: 3, name: 'شاورما لحم', price: 85, img: 'https://cdn-icons-png.flaticon.com/512/2362/2362253.png' }
        ];

        function initMenu() {
            const container = document.getElementById('gear-container');
            categories.forEach((cat, index) => {
                const item = document.createElement('div');
                item.className = `gear-item ${index === 0 ? 'active' : ''}`;
                item.style.transform = `rotate(${cat.angle}deg)`;
                
                item.innerHTML = `
                    <div class="category-circle" style="transform: rotate(-${cat.angle}deg)">
                        <span class="text-2xl">${cat.icon}</span>
                    </div>
                    <span style="transform: rotate(-${cat.angle}deg)">${cat.name}</span>
                `;

                item.onclick = () => selectCategory(index);
                container.appendChild(item);
            });
            renderProducts(categories[0].id);
        }

        function selectCategory(index) {
            const container = document.getElementById('gear-container');
            const items = document.querySelectorAll('.gear-item');
            
            // حساب الزاوية المطلوبة ليكون العنصر المختار في الأعلى
            const targetAngle = -categories[index].angle;
            
            container.style.transform = `rotate(${targetAngle}deg)`;

            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
                
                // الحفاظ على الأيقونات والنصوص معتدلة أثناء دوران الترس
                const icon = item.querySelector('.category-circle');
                const text = item.querySelector('span');
                // نلغي دوران الوالد (Container) ودوران العنصر نفسه (Item)
                // المجموع لازم يكون صفر بالنسبة للشاشة
                // gsap.to([icon, text], { rotation: - (categories[index].angle + targetAngle), duration: 0.8 });
            });

            document.getElementById('current-cat-title').innerText = categories[index].name;
            renderProducts(categories[index].id);
        }

        function renderProducts(catId) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            const filtered = products.filter(p => p.catId === catId);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-400">قريباً..</div>`;
                return;
            }

            filtered.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'product-card opacity-0 translate-y-4';
                card.innerHTML = `
                    <img src="${p.img}" class="w-full h-32 object-contain mb-4">
                    <h3 class="font-bold text-sm mb-1">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-accent font-bold">${p.price} ج.م</span>
                        <div class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                gsap.to(card, { opacity: 1, y: 0, delay: i * 0.1, duration: 0.5 });
            });
        }

        window.onload = initMenu;
    </script>
</body>
</html>
