<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم ابن سوريا - تجربة طعام فريدة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS: التنسيق البصري الاحترافي --- */
        :root {
            --main-color: #E31E24; /* أحمر ابن سوريا */
            --yellow-accent: #FFD700; /* أصفر اللوجو */
            --dark-blue: #1a1a1a;
            --light-bg: #f8f9fa;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--light-bg);
            color: var(--dark-blue);
            overflow-x: hidden;
        }

        /* الهيدر */
        header {
            background: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--main-color);
            text-shadow: 1px 1px 0px var(--yellow-accent);
        }

        .cart-icon {
            position: relative;
            background: var(--main-color);
            color: #fff;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            cursor: pointer;
        }

        #cart-count {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--yellow-accent);
            color: var(--dark-blue);
            font-weight: 900;
            font-size: 12px;
            padding: 2px 7px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        /* الأقسام الدائرية */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 20px 5%;
            gap: 20px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar { display: none; }

        .cat-item {
            text-align: center;
            min-width: 85px;
            cursor: pointer;
        }

        .cat-img-wrapper {
            width: 75px; height: 75px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #eee;
            margin-bottom: 8px;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .cat-item.active .cat-img-wrapper {
            border-color: var(--main-color);
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(227, 30, 36, 0.2);
        }

        .cat-item p { font-size: 13px; font-weight: 700; }

        /* شبكة المنتجات */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 20px;
            padding: 20px 5%;
        }

        .product-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img {
            width: 100%; height: 130px; object-fit: cover;
        }

        .product-info { padding: 15px; text-align: center; }

        .product-info h4 { font-size: 16px; margin-bottom: 5px; }

        .price {
            color: #27ae60; font-weight: 900; font-size: 18px;
            margin-bottom: 12px;
        }

        .btn-add {
            background: var(--main-color);
            color: #fff; border: none;
            width: 100%; padding: 10px;
            border-radius: 12px;
            font-weight: 700; cursor: pointer;
        }

        /* السلة الجانبية */
        .cart-sidebar {
            position: fixed; top: 0; right: -100%;
            width: 100%; max-width: 380px; height: 100%;
            background: #fff; z-index: 2000;
            padding: 30px 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .cart-sidebar.active { right: 0; }

        .cart-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 25px;
        }

        .cart-row {
            display: flex; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px dashed #eee;
        }

        .user-info input {
            width: 100%; padding: 12px;
            margin-bottom: 12px; border: 1px solid #eee;
            border-radius: 10px; background: #fafafa;
        }

        .btn-whatsapp {
            background: #25D366; color: #fff;
            width: 100%; padding: 15px; border: none;
            border-radius: 12px; font-weight: 900;
            font-size: 16px; cursor: pointer; margin-top: 20px;
        }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; z-index: 1500;
            backdrop-filter: blur(4px);
        }

        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ابن سوريا</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count">0</span>
        </div>
    </header>

    <section class="categories" id="cat-container"></section>

    <section class="menu-grid" id="menu-container">
        <p style="grid-column: 1/-1; text-align: center; padding: 50px;">جاري تجهيز المنيو السوري...</p>
    </section>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>🛒 طلباتك</h3>
            <button onclick="toggleCart()" style="border:none; background:none; font-size:20px;">✕</button>
        </div>
        <div id="cart-items" style="max-height: 40vh; overflow-y: auto;"></div>
        
        <div style="margin-top: 20px; font-weight: 900; font-size: 18px;">
            الإجمالي: <span id="total-amount" style="color:var(--main-color)">0</span> ج.م
        </div>

        <div class="user-info" style="margin-top: 25px;">
            <input type="text" id="user-name" placeholder="الاسم بالكامل">
            <input type="tel" id="user-phone" placeholder="رقم الموبايل">
            <input type="text" id="user-address" placeholder="عنوان التوصيل بالتفصيل">
        </div>

        <button class="btn-whatsapp" onclick="sendToWhatsApp()">
            تأكيد الطلب عبر واتساب <i class="fab fa-whatsapp"></i>
        </button>
    </div>

    <script>
        /* --- JavaScript: الربط والوظائف --- */
        
        // ضع رابط الـ CSV الخاص بالشيت هنا
        const sheetURL = "YOUR_SHEET_CSV_URL_HERE"; 
        
        let menuData = [];
        let cart = [];

        async function init() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); 
                
                menuData = rows.map((row, index) => {
                    const cols = row.split(',');
                    return {
                        id: index,
                        name: cols[0]?.trim(),
                        price: parseFloat(cols[1]?.trim()) || 0,
                        category: cols[2]?.trim() || "عام",
                        img: cols[3]?.trim() || "https://via.placeholder.com/200"
                    };
                });

                renderCats();
                renderMenu(menuData);
            } catch (e) {
                console.error("Error loading sheet:", e);
            }
        }

        function renderCats() {
            const container = document.getElementById('cat-container');
            const cats = ['الكل', ...new Set(menuData.map(i => i.category))];
            container.innerHTML = cats.map((c, i) => `
                <div class="cat-item ${i===0?'active':''}" onclick="filter(this, '${c}')">
                    <div class="cat-img-wrapper">
                        <img src="https://ui-avatars.com/api/?name=${c}&background=E31E24&color=fff" style="width:100%">
                    </div>
                    <p>${c}</p>
                </div>
            `).join('');
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="product-card">
                    <img src="${item.img}">
                    <div class="product-info">
                        <h4>${item.name}</h4>
                        <div class="price">${item.price} ج.م</div>
                        <button class="btn-add" onclick="addToCart(${item.id})">إضافة +</button>
                    </div>
                </div>
            `).join('');
        }

        function filter(el, cat) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === 'الكل' ? menuData : menuData.filter(i => i.category === cat);
            renderMenu(filtered);
        }

        function addToCart(id) {
            const item = menuData.find(p => p.id === id);
            cart.push(item);
            updateUI();
            
            // Animation
            const icon = document.querySelector('.cart-icon');
            icon.style.transform = "scale(1.2)";
            setTimeout(() => icon.style.transform = "scale(1)", 200);
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, idx) => `
                <div class="cart-row">
                    <span>${item.name}</span>
                    <span>${item.price} ج.م <i class="fas fa-trash" onclick="remove(${idx})" style="color:red; margin-right:10px; cursor:pointer;"></i></span>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-amount').innerText = total;
        }

        function remove(idx) {
            cart.splice(idx, 1);
            updateUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function sendToWhatsApp() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const addr = document.getElementById('user-address').value;

            if (!name || !phone || !addr || cart.length === 0) {
                alert("برجاء إكمال البيانات والطلبات يا بطل!");
                return;
            }

            let orderText = cart.map(i => `- ${i.name} (${i.price} ج.م)`).join('%0A');
            let total = cart.reduce((s, i) => s + i.price, 0);

            const msg = `*طلب جديد - مطعم ابن سوريا*%0A%0A` +
                        `*الاسم:* ${name}%0A*الموبايل:* ${phone}%0A*العنوان:* ${addr}%0A%0A` +
                        `*الطلبات:*%0A${orderText}%0A%0A` +
                        `*الإجمالي:* ${total} ج.م`;

            window.open(`https://wa.me/201016991319?text=${msg}`, '_blank');
        }

        init();
    </script>
</body>
</html>
