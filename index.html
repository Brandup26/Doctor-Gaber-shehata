<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إبن سوريا | طريقة البطل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #D4AF37; --bg: #F9F9F9; --dark: #121212; }
        body { font-family: 'Alexandria', sans-serif; background: var(--bg); overflow-x: hidden; touch-action: manipulation; }

        /* Navigation */
        .header-nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
        }

        .cart-box {
            background: var(--dark); color: white; padding: 10px 20px;
            border-radius: 20px; position: relative; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hero Gear - "طريقة البطل" */
        .hero-viewport {
            position: relative; height: 260px; width: 100%;
            display: flex; justify-content: center; overflow: hidden;
            background: white; padding-top: 80px; touch-action: none;
        }

        .hero-gear {
            position: absolute; top: 130px; width: 500px; height: 500px; /* تقريب الأقسام بتصغير القطر */
            border-radius: 50%; border: 1px solid rgba(0,0,0,0.03);
            will-change: transform;
        }

        .hero-cat-item {
            position: absolute; top: 50%; left: 50%;
            width: 80px; height: 100px; margin-left: -40px; margin-top: -40px;
            display: flex; flex-direction: column; align-items: center;
        }

        .cat-img-wrapper {
            width: 60px; height: 60px; background: #fff; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s;
            border: 2px solid transparent;
        }

        .hero-cat-item.active .cat-img-wrapper {
            background: var(--gold); transform: scale(1.2); border-color: #fff;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .hero-cat-item span { font-size: 11px; font-weight: 700; color: #bbb; margin-top: 8px; transition: 0.3s; }
        .hero-cat-item.active span { color: var(--dark); transform: scale(1.1); }

        .hero-indicator {
            position: absolute; top: 215px; width: 25px; height: 5px;
            background: #4CAF50; border-radius: 10px; z-index: 10;
        }

        /* Products Card */
        .food-card { background: white; border-radius: 25px; padding: 15px; border: 1px solid #f1f1f1; position: relative; }
        .add-btn {
            background: var(--dark); color: white; width: 35px; height: 35px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; cursor: pointer;
        }
        .add-btn:active { transform: scale(0.8); }

        /* Animation Layer */
        .fly-item {
            position: fixed; z-index: 9999; pointer-events: none;
            width: 50px; height: 50px; object-fit: contain;
        }

        /* Sidebar Cart */
        #cart-panel {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 350px;
            height: 100%; background: white; z-index: 2000; padding: 30px;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1 class="text-xl font-bold tracking-tighter">إبن سوريا <span class="text-gold">.</span></h1>
        <div class="cart-box" id="main-cart" onclick="toggleCart(true)">
            <i class="fa-solid fa-shopping-bag"></i>
            <span id="badge" class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <div class="hero-viewport" id="hero-touch">
        <div class="hero-indicator"></div>
        <div id="hero-gear" class="hero-gear"></div>
    </div>

    <main class="px-5 py-8">
        <h2 id="cat-title" class="text-2xl font-black mb-6">المعجنات</h2>
        <div id="food-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cart-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">السلة</h2>
            <i onclick="toggleCart(false)" class="fa-solid fa-times text-xl"></i>
        </div>
        <div id="cart-items" class="space-y-4 overflow-y-auto h-[60%]"></div>
        <div class="absolute bottom-10 left-0 w-full px-8 text-center">
            <div class="flex justify-between mb-4 font-bold text-xl">
                <span>الإجمالي</span>
                <span id="total-price" class="text-gold">0 ج.م</span>
            </div>
            <button onclick="checkout()" class="w-full bg-black text-white py-4 rounded-2xl font-bold shadow-lg">إرسال الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        const categories = [
            { name: 'برجر', icon: '🍔' },
            { name: 'بيتزا', icon: '🍕' },
            { name: 'شاورما', icon: '🌯' },
            { name: 'مكرونة', icon: '🍝' },
            { name: 'سلطات', icon: '🥗' },
            { name: 'حلويات', icon: '🍰' }
        ];

        const products = [
            { id: 1, name: 'سوبر برجر', price: 150, img: 'https://cdn-icons-png.flaticon.com/512/3075/3075977.png' },
            { id: 2, name: 'بيتزا إيطالية', price: 200, img: 'https://cdn-icons-png.flaticon.com/512/3595/3595455.png' }
        ];

        let cart = [];
        let gearRotation = 0;
        const gear = document.getElementById('hero-gear');

        // بناء "طريقة البطل"
        function buildHeroGear() {
            const radius = 210; // تقريب الأيقونات من بعضها
            const step = 360 / categories.length;
            categories.forEach((cat, i) => {
                const item = document.createElement('div');
                item.className = `hero-cat-item ${i === 0 ? 'active' : ''}`;
                const angle = i * step;
                const x = radius * Math.sin(angle * Math.PI / 180);
                const y = -radius * Math.cos(angle * Math.PI / 180);
                item.style.transform = `translate(${x}px, ${y}px)`;
                item.innerHTML = `<div class="cat-img-wrapper text-2xl">${cat.icon}</div><span>${cat.name}</span>`;
                gear.appendChild(item);
            });
            renderFood();
        }

        // تفاعلات اللمس
        const hammer = new Hammer(document.getElementById('hero-touch'));
        let startRot = 0;
        hammer.on("panstart", () => startRot = gearRotation);
        hammer.on("panmove", (e) => {
            gearRotation = startRot + (e.deltaX * 0.3);
            rotateGear(gearRotation);
        });
        hammer.on("panend", () => {
            const step = 360 / categories.length;
            const index = Math.round(-gearRotation / step);
            const target = -index * step;
            gsap.to(window, { duration: 0.5, onUpdate: () => {
                gearRotation += (target - gearRotation) * 0.2;
                rotateGear(gearRotation);
            }, onComplete: () => {
                const activeIdx = ((index % categories.length) + categories.length) % categories.length;
                updateActive(activeIdx);
            }});
        });

        function rotateGear(rot) {
            gear.style.transform = `rotate(${rot}deg)`;
            document.querySelectorAll('.hero-cat-item').forEach(item => {
                gsap.set(item.querySelector('.cat-img-wrapper'), { rotation: -rot });
                gsap.set(item.querySelector('span'), { rotation: -rot });
            });
        }

        function updateActive(idx) {
            document.querySelectorAll('.hero-cat-item').forEach((it, i) => it.classList.toggle('active', i === idx));
            document.getElementById('cat-title').innerText = categories[idx].name;
            renderFood();
        }

        function renderFood() {
            const grid = document.getElementById('food-grid');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="food-card opacity-0">
                        <img src="${p.img}" class="w-24 h-24 mx-auto mb-3 product-img" id="img-${p.id}">
                        <h3 class="font-bold text-sm">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="font-bold text-gold">${p.price} ج.م</span>
                            <div class="add-btn" onclick="addToCart(event, ${p.id})"><i class="fa-solid fa-plus"></i></div>
                        </div>
                    </div>
                `;
            });
            gsap.to(".food-card", { opacity: 1, y: -10, stagger: 0.1 });
        }

        // إضافة للسلة بأنيميشن البطل
        function addToCart(e, id) {
            const product = products.find(p => p.id === id);
            cart.push(product);

            // أنيميشن الطيران
            const btn = e.currentTarget;
            const img = document.getElementById(`img-${id}`);
            const cartIcon = document.getElementById('main-cart');
            
            const flyImg = img.cloneNode(true);
            flyImg.classList.add('fly-item');
            document.body.appendChild(flyImg);

            const rect = img.getBoundingClientRect();
            const cartRect = cartIcon.getBoundingClientRect();

            gsap.fromTo(flyImg, 
                { top: rect.top, left: rect.left, scale: 1, opacity: 1 },
                { 
                    top: cartRect.top, left: cartRect.left, scale: 0.1, opacity: 0, 
                    duration: 0.8, ease: "power3.inOut",
                    onComplete: () => {
                        flyImg.remove();
                        updateCartUI();
                        gsap.to(cartIcon, { scale: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
                    }
                }
            );
        }

        function updateCartUI() {
            document.getElementById('badge').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl">
                        <div class="flex items-center gap-3">
                            <img src="${item.img}" class="w-10">
                            <span class="font-bold text-sm">${item.name}</span>
                        </div>
                        <span class="text-gold font-bold">${item.price} ج.م</span>
                    </div>`;
            });
            document.getElementById('total-price').innerText = total + ' ج.م';
        }

        function toggleCart(show) {
            document.getElementById('cart-panel').style.left = show ? '0' : '-100%';
        }

        function checkout() {
            let msg = "طلب جديد من إبن سوريا 🌯\n\n";
            cart.forEach(i => msg += `- ${i.name}\n`);
            msg += `\nالإجمالي: ${document.getElementById('total-price').innerText}`;
            window.open(`https://wa.me/201016991319?text=${encodeURIComponent(msg)}`);
        }

        window.onload = buildHeroGear;
    </script>
</body>
</html>
