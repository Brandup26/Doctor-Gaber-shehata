<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو إبن سوريا - النسخة الاحترافية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #F2F2F7; /* لون خلفية آيفون الشهير */
            --ios-blue: #007AFF; /* أزرق آيفون الرسمي */
            --ios-gray: #8E8E93;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --transition: all 0.5s cubic-bezier(0.32, 1, 0.23, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent; /* منع المربع الأزرق نهائياً */
            outline: none;
        }

        body {
            background-color: var(--bg-body);
            color: #1C1C1E;
        }

        /* الهيدر العلوي */
        header {
            padding: 25px 20px;
            background: var(--white);
            border-bottom-left-radius: 35px;
            border-bottom-right-radius: 35px;
            box-shadow: var(--shadow);
            position: relative;
        }

        /* السلة العلوية (iPhone Style) */
        .cart-top-left {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: var(--white);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF3B30;
            color: white;
            font-size: 11px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
        }

        /* الأقسام بصور حقيقية */
        .cats-wrapper {
            display: flex;
            gap: 15px;
            padding: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .cats-wrapper::-webkit-scrollbar { display: none; }

        .cat-item { text-align: center; min-width: 80px; }
        .cat-item img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--white);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .cat-item.active img { border-color: var(--ios-blue); transform: scale(1.1); }
        .cat-item span { display: block; margin-top: 8px; font-size: 13px; font-weight: 600; color: #3A3A3C; }

        /* شبكة الطعام */
        .food-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 15px 120px;
        }

        .food-card {
            background: var(--white);
            border-radius: 24px;
            padding: 12px;
            box-shadow: var(--shadow);
        }

        .food-card img {
            width: 100%;
            height: 120px;
            border-radius: 18px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .food-card h3 { font-size: 15px; font-weight: 700; }
        .food-card p { font-size: 11px; color: var(--ios-gray); height: 32px; overflow: hidden; margin: 5px 0; }

        .food-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--ios-blue); font-weight: 800; font-size: 15px; }

        .add-btn {
            width: 35px;
            height: 35px;
            background: #1C1C1E;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        /* سلة الآيفون المنزلقة (The Sheet) */
        #ios-cart-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: flex-end;
        }

        #ios-cart-overlay.show { visibility: visible; opacity: 1; }

        .ios-sheet {
            width: 100%;
            background: var(--white);
            border-top-left-radius: 35px;
            border-top-right-radius: 35px;
            padding: 20px 25px 40px;
            transform: translateY(100%);
            transition: var(--transition);
            max-height: 90vh;
            overflow-y: auto;
        }

        #ios-cart-overlay.show .ios-sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 5px;
            background: #D1D1D6;
            border-radius: 10px;
            margin: 0 auto 20px;
        }

        .cart-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; }

        .cart-list-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #F2F2F7;
        }

        .total-section {
            padding: 20px 0;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            color: var(--ios-blue);
        }

        /* فورم المعلومات */
        .info-form { margin-top: 10px; }
        .info-form input {
            width: 100%;
            padding: 16px;
            background: #F2F2F7;
            border: none;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 15px;
        }

        /* زر التأكيد الانسيابي */
        .confirm-btn {
            width: 100%;
            padding: 18px;
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .confirm-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* أنيميشن بسيط */
        .fly-circle {
            position: fixed;
            z-index: 3000;
            width: 20px; height: 20px;
            background: var(--ios-blue);
            border-radius: 50%;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<header>
    <div class="cart-top-left" onclick="toggleCart()">
        <i class="fas fa-shopping-cart" style="font-size: 20px; color: #1C1C1E;"></i>
        <span id="cart-count">0</span>
    </div>
    
    <div style="text-align: right; margin-right: 10px;">
        <p style="font-size: 12px; color: var(--ios-gray);">مطعم</p>
        <h2 style="font-size: 24px; font-weight: 900;">إبن سوريا 🍕</h2>
    </div>
</header>

<div class="cats-wrapper" id="cat-list">
    </div>

<div class="food-grid" id="food-grid">
    </div>

<div id="ios-cart-overlay" onclick="if(event.target.id==='ios-cart-overlay') toggleCart()">
    <div class="ios-sheet">
        <div class="sheet-handle"></div>
        <h2 class="cart-title">طلباتك</h2>
        
        <div id="cart-items-container"></div>
        
        <div class="total-section">
            <span>الإجمالي</span>
            <span id="total-val">0 ج.م</span>
        </div>

        <div class="info-form">
            <input type="text" id="cust-name" placeholder="الاسم">
            <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
            <input type="text" id="cust-address" placeholder="العنوان بالتفصيل">
            <button class="confirm-btn" onclick="sendToRestaurant()">تأكيد وإرسال الطلب</button>
            <p onclick="toggleCart()" style="text-align: center; color: var(--ios-gray); margin-top: 15px; font-size: 14px; cursor: pointer;">إغلاق السلة</p>
        </div>
    </div>
</div>

<script>
    let cart = [];
    const products = [
        {id: 1, name: 'شاورما سوري دبل', price: 95, cat: 'شاورما', img: 'https://images.unsplash.com/photo-1529006557810-274b9b2fc783?q=80&w=400', d: 'قطع شاورما، تومية، بطاطس مقلية'},
        {id: 2, name: 'تشيز برجر كلاسيك', price: 125, cat: 'برجر', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=400', d: 'لحم بقر، جبنة شيدر، صوص خاص'},
        {id: 3, name: 'بيتزا مارجريتا', price: 110, cat: 'بيتزا', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=400', d: 'ريحان فريش، موزاريلا، صلصة'},
        {id: 4, name: 'مكرونة نجرسكو', price: 135, cat: 'مكرونة', img: 'https://images.unsplash.com/photo-1612449267665-d92d624704f1?q=80&w=400', d: 'دجاج، صوص أبيض، جبنة سايحة'}
    ];

    const categories = [
        {name: 'شاورما', img: 'https://images.unsplash.com/photo-1633383718081-22ac93e3dbf1?q=80&w=150'},
        {name: 'برجر', img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=150'},
        {name: 'بيتزا', img: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=150'},
        {name: 'مكرونة', img: 'https://images.unsplash.com/photo-1551183053-bf91a1d81141?q=80&w=150'}
    ];

    function init() {
        document.getElementById('cat-list').innerHTML = categories.map(c => `
            <div class="cat-item" onclick="filterMenu('${c.name}', event)">
                <img src="${c.img}">
                <span>${c.name}</span>
            </div>
        `).join('');
        renderProducts(products);
    }

    function renderProducts(items) {
        document.getElementById('food-grid').innerHTML = items.map(p => `
            <div class="food-card">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p>${p.d}</p>
                <div class="food-footer">
                    <span class="price">${p.price} ج.م</span>
                    <button class="add-btn" onclick="addToCart(${p.id}, event)"><i class="fas fa-plus"></i></button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id, e) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCartUI();
        
        // أنيميشن طيران بسيط
        const circle = document.createElement('div');
        circle.className = 'fly-circle';
        circle.style.left = e.clientX + 'px';
        circle.style.top = e.clientY + 'px';
        document.body.appendChild(circle);

        const target = document.querySelector('.cart-top-left').getBoundingClientRect();
        setTimeout(() => {
            circle.style.left = target.left + 25 + 'px';
            circle.style.top = target.top + 25 + 'px';
            circle.style.opacity = '0';
        }, 50);
        setTimeout(() => circle.remove(), 700);
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = 0;
        document.getElementById('cart-items-container').innerHTML = cart.map(i => {
            total += i.price;
            return `<div class="cart-list-item"><span>${i.name}</span><b>${i.price} ج.م</b></div>`;
        }).join('');
        document.getElementById('total-val').innerText = total + " ج.م";
    }

    function toggleCart() {
        document.getElementById('ios-cart-overlay').classList.toggle('show');
    }

    function filterMenu(c, e) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        e.currentTarget.classList.add('active');
        renderProducts(products.filter(p => p.cat === c));
    }

    function sendToRestaurant() {
        const name = document.getElementById('cust-name').value;
        const address = document.getElementById('cust-address').value;
        if(!name || cart.length === 0) return alert("من فضلك أدخل الاسم والطلبات");
        
        let msg = `*طلب جديد من مطعم إبن سوريا*%0A*الاسم:* ${name}%0A*العنوان:* ${address}%0A---%0A`;
        cart.forEach(i => msg += `- ${i.name} (${i.price} ج.م)%0A`);
        msg += `---%0A*الإجمالي:* ${document.getElementById('total-val').innerText}`;
        
        window.open(`https://wa.me/201016991319?text=${msg}`);
    }

    init();
</script>

</body>
</html>
