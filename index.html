<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الدكتور جابر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #F8FAFC; color: #1E293B; }
        .premium-card { 
            background: white;
            border-radius: 28px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(241, 245, 249, 1);
            transition: all 0.3s ease;
        }
        .premium-card:active { transform: scale(0.97); background: #F1F5F9; }
        .icon-box {
            width: 56px; height: 56px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
        }
        .chevron {
            width: 34px; height: 34px;
            background: #F1F5F9;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #64748B;
        }
        .logo-container {
            width: 110px; height: 110px;
            background: white;
            border-radius: 35px;
            padding: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            border: 1px solid #F1F5F9;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        
        <div class="flex flex-col items-center mb-10 mt-6">
            <div class="logo-container">
                <img src="https://ui-avatars.com/api/?name=Dr+Gaber&background=1e293b&color=fff&size=200" class="w-full h-full rounded-[30px] object-cover">
            </div>
            <h1 class="text-2xl font-black tracking-tight">مطعم الدكتور جابر</h1>
            <p class="text-gray-400 text-sm font-bold mt-1">طعم الأصالة في كل لقمة</p>
        </div>

        <div class="space-y-4">
            
            <div class="premium-card">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-orange-50">🍖</div>
                    <div>
                        <h2 class="font-black text-[17px]">قسم المشويات</h2>
                        <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">كباب، كفتة، طواجن</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

            <div class="premium-card">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-green-50">🥗</div>
                    <div>
                        <h2 class="font-black text-[17px]">المقبلات والسلطات</h2>
                        <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">أصناف تفتح الشهية</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

            <div class="premium-card" style="border-right: 4px solid #3B82F6;">
                <div class="flex items-center gap-4">
                    <div class="icon-box bg-blue-50 text-blue-600">📱</div>
                    <div>
                        <h2 class="font-black text-[17px]">تواصل معنا</h2>
                        <p class="text-[11px] text-gray-400 font-bold uppercase tracking-wider">واتساب وهاتف مباشر</p>
                    </div>
                </div>
                <div class="chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </div>
            </div>

        </div>

        <div class="mt-20 text-center">
            <p class="text-[9px] font-black text-gray-300 tracking-[0.4em] uppercase">Built with Precision</p>
        </div>

    </div>

</body>
</html>
